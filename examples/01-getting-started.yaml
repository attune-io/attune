# Getting Started: minimal RightSizePolicy in Recommend mode
#
# This is the safest starting point. The operator watches your workloads,
# queries Prometheus for usage data, and writes recommendations into the
# policy's status. No pods are modified.
#
# Prerequisites:
#   - Kubernetes 1.33+ with In-Place Pod Resize enabled
#   - Prometheus reachable at the address below
#   - kube-rightsize operator installed (helm install kube-rightsize ...)
#
# Apply:
#   kubectl apply -f examples/01-getting-started.yaml
#
# Check recommendations:
#   kubectl get rightsizepolicies -n my-app
#   kubectl rightsize recommendations -n my-app
---
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: my-first-policy
  namespace: my-app
spec:
  targetRef:
    kind: Deployment
    name: my-api
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
  cpu:
    percentile: 95
    safetyMargin: "1.2"
    bounds:
      min: "50m"
      max: "4000m"
  memory:
    percentile: 99
    safetyMargin: "1.3"
    bounds:
      min: "64Mi"
      max: "8Gi"
  updateStrategy:
    mode: Recommend
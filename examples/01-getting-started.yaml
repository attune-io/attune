# Getting Started: minimal AttunePolicy in Recommend mode
#
# This is the safest starting point. The operator watches your workloads,
# queries Prometheus for usage data, and writes recommendations into the
# policy's status. No pods are modified.
#
# All fields except targetRef and metricsSource.prometheus.address are
# optional. The operator applies sensible built-in defaults (P95 CPU,
# P99 memory, 20% overhead, Recommend mode). Override only what
# you need.
#
# Prerequisites:
#   - Kubernetes 1.32+ with In-Place Pod Resize enabled (1.32 requires InPlacePodVerticalScaling feature gate)
#   - Prometheus reachable at the address below
#   - attune operator installed (helm install attune ...)
#
# Apply:
#   kubectl apply -f examples/01-getting-started.yaml
#
# Check progress:
#   kubectl attune status -n my-app
#   kubectl attune recommendations -n my-app
#
# For a faster first look (~1 hour instead of ~4 hours), uncomment:
#   minimumDataPoints: 12
#
# See examples/01b-getting-started-full.yaml for all available options.
---
apiVersion: attune.io/v1alpha1
kind: AttunePolicy
metadata:
  name: my-first-policy
  namespace: my-app
spec:
  targetRef:
    kind: Deployment
    name: my-api
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
    # minimumDataPoints: 12   # uncomment for faster initial evaluation
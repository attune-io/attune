# Namespace Defaults: override cluster defaults for a specific namespace
#
# AttuneNamespaceDefaults provides namespace-level defaults that
# override cluster-scoped AttuneDefaults. Policies in this namespace
# inherit these values unless they specify their own.
#
# Precedence: policy spec > namespace defaults > cluster defaults
#
# Apply:
#   kubectl apply -f examples/11-namespace-defaults.yaml
---
apiVersion: attune.io/v1alpha1
kind: AttuneNamespaceDefaults
metadata:
  name: production-defaults
  namespace: production
spec:
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
    historyWindow: 168h
    minimumDataPoints: 168
  cpu:
    percentile: 99
    overhead: "30"
  memory:
    percentile: 99
    overhead: "50"
    allowDecrease: false
  updateStrategy:
    type: Canary
    cooldown: 2h
    autoRevert: true
---
# Staging namespace: more aggressive settings for faster iteration
apiVersion: attune.io/v1alpha1
kind: AttuneNamespaceDefaults
metadata:
  name: staging-defaults
  namespace: staging
spec:
  metricsSource:
    minimumDataPoints: 24
  cpu:
    percentile: 95
    overhead: "10"
  memory:
    percentile: 95
    overhead: "20"
  updateStrategy:
    type: Auto
    cooldown: 30m

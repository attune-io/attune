# Namespace Defaults: override cluster defaults for a specific namespace
#
# RightSizeNamespaceDefaults provides namespace-level defaults that
# override cluster-scoped RightSizeDefaults. Policies in this namespace
# inherit these values unless they specify their own.
#
# Precedence: policy spec > namespace defaults > cluster defaults
#
# Apply:
#   kubectl apply -f examples/11-namespace-defaults.yaml
---
apiVersion: rightsize.io/v1alpha1
kind: RightSizeNamespaceDefaults
metadata:
  name: production-defaults
  namespace: production
spec:
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
    historyWindow: 168h
    minimumDataPoints: 168
  cpu:
    percentile: 99
    safetyMargin: "1.3"
  memory:
    percentile: 99
    safetyMargin: "1.5"
    allowDecrease: false
  updateStrategy:
    mode: Canary
    cooldown: 2h
    autoRevert: true
---
# Staging namespace: more aggressive settings for faster iteration
apiVersion: rightsize.io/v1alpha1
kind: RightSizeNamespaceDefaults
metadata:
  name: staging-defaults
  namespace: staging
spec:
  metricsSource:
    minimumDataPoints: 24
  cpu:
    percentile: 95
    safetyMargin: "1.1"
  memory:
    percentile: 95
    safetyMargin: "1.2"
  updateStrategy:
    mode: Auto
    cooldown: 30m

---
# Observe Mode: collect and validate metrics without generating recommendations.
# Use Observe when first connecting a workload. The operator queries
# Prometheus and populates status.workloads.discovered, but does not
# generate recommendations or resize anything. Switch to Recommend
# once you've confirmed the operator can reach your metrics.
#
# Apply:
#   kubectl apply -f examples/08-observe-mode.yaml
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: api-observe
  namespace: staging
spec:
  targetRef:
    kind: Deployment
    name: api-server
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
  cpu:
    percentile: 95
  memory:
    percentile: 99
  updateStrategy:
    type: Observe
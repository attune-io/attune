# Multi-Datasource: Prometheus variants, Datadog, and CloudWatch
#
# kube-rightsize works with Prometheus (plus Thanos/Mimir), Datadog, and
# CloudWatch Container Insights. Only one metrics source can be set per
# policy. Use headers for multi-tenant Prometheus backends and
# bearerTokenSecret for authenticated endpoints.
#
# Apply:
#   kubectl apply -f examples/13-multi-datasource.yaml
---
# Example 1: Grafana Mimir with tenant ID header
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: api-services-mimir
  namespace: production
spec:
  targetRef:
    kind: Deployment
    selector:
      matchLabels:
        tier: api
  metricsSource:
    prometheus:
      address: "http://mimir-query-frontend.monitoring:8080/prometheus"
      headers:
        X-Scope-OrgID: "production-tenant"
  cpu:
    percentile: 95
    safetyMargin: "1.2"
  memory:
    percentile: 99
    safetyMargin: "1.3"
  updateStrategy:
    type: Recommend
---
# Example 2: Thanos with custom headers
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: api-services-thanos
  namespace: production
spec:
  targetRef:
    kind: Deployment
    selector:
      matchLabels:
        tier: api
  metricsSource:
    prometheus:
      address: "http://thanos-query.monitoring:9090"
      headers:
        X-Custom-Header: "my-value"
  cpu:
    percentile: 95
    safetyMargin: "1.2"
  memory:
    percentile: 99
    safetyMargin: "1.3"
  updateStrategy:
    type: Recommend
---
# Example 3: Authenticated Prometheus with bearer token from Secret
#
# First create the Secret:
#   kubectl create secret generic prom-token \
#     --from-literal=token=<your-bearer-token> \
#     -n production
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: api-services-auth
  namespace: production
spec:
  targetRef:
    kind: Deployment
    selector:
      matchLabels:
        tier: api
  metricsSource:
    prometheus:
      address: "https://prometheus.example.com"
      bearerTokenSecret:
        name: prom-token
        key: token
  cpu:
    percentile: 95
    safetyMargin: "1.2"
  memory:
    percentile: 99
    safetyMargin: "1.3"
  updateStrategy:
    type: Recommend
---
# Example 4: Dev environment with self-signed TLS certificate
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: api-services-dev
  namespace: dev
spec:
  targetRef:
    kind: Deployment
    selector:
      matchLabels:
        tier: api
  metricsSource:
    prometheus:
      address: "https://prometheus-dev.internal:9090"
      tls:
        insecureSkipVerify: true
  cpu:
    percentile: 95
    safetyMargin: "1.2"
  memory:
    percentile: 99
    safetyMargin: "1.3"
  updateStrategy:
    type: Recommend
---
# Example 5: Datadog metrics backend
#
# First create a Secret with your Datadog API key and (optional) app key:
#   kubectl create secret generic datadog-keys \
#     --from-literal=api-key=<your-api-key> \
#     --from-literal=app-key=<your-app-key> \
#     -n production
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: api-services-datadog
  namespace: production
spec:
  targetRef:
    kind: Deployment
    selector:
      matchLabels:
        tier: api
  metricsSource:
    datadog:
      site: datadoghq.com          # or datadoghq.eu, us5.datadoghq.com, etc.
      apiKeySecretRef:
        name: datadog-keys
        key: api-key
  cpu:
    percentile: 95
    safetyMargin: "1.2"
  memory:
    percentile: 99
    safetyMargin: "1.3"
  updateStrategy:
    type: Recommend
---
# Example 6: CloudWatch Container Insights backend (EKS)
#
# Requires:
# - Container Insights enabled on the EKS cluster
# - The operator's ServiceAccount annotated for IRSA/Pod Identity
#   with cloudwatch:GetMetricData permission, or specify a roleArn
#   for cross-account access
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: api-services-cloudwatch
  namespace: production
spec:
  targetRef:
    kind: Deployment
    selector:
      matchLabels:
        tier: api
  metricsSource:
    cloudwatch:
      region: us-east-1
      clusterName: my-eks-cluster
      # roleArn: arn:aws:iam::123456789012:role/CloudWatchReadOnly  # optional
  cpu:
    percentile: 95
    safetyMargin: "1.2"
  memory:
    percentile: 99
    safetyMargin: "1.3"
  updateStrategy:
    type: Recommend

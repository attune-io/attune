# Multi-Datasource: connect to Thanos, Mimir, or authenticated Prometheus
#
# kube-rightsize works with any Prometheus-compatible query API.
# Use headers for multi-tenant backends and bearerTokenSecret for
# authenticated endpoints.
#
# Apply:
#   kubectl apply -f examples/13-multi-datasource.yaml
---
# Example 1: Grafana Mimir with tenant ID header
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: api-services-mimir
  namespace: production
spec:
  targetRef:
    kind: Deployment
    selector:
      matchLabels:
        tier: api
  metricsSource:
    prometheus:
      address: "http://mimir-query-frontend.monitoring:8080/prometheus"
      headers:
        X-Scope-OrgID: "production-tenant"
  cpu:
    percentile: 95
    safetyMargin: "1.2"
  memory:
    percentile: 99
    safetyMargin: "1.3"
  updateStrategy:
    mode: Recommend
---
# Example 2: Thanos with custom headers
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: api-services-thanos
  namespace: production
spec:
  targetRef:
    kind: Deployment
    selector:
      matchLabels:
        tier: api
  metricsSource:
    prometheus:
      address: "http://thanos-query.monitoring:9090"
      headers:
        X-Custom-Header: "my-value"
  cpu:
    percentile: 95
    safetyMargin: "1.2"
  memory:
    percentile: 99
    safetyMargin: "1.3"
  updateStrategy:
    mode: Recommend
---
# Example 3: Authenticated Prometheus with bearer token from Secret
#
# First create the Secret:
#   kubectl create secret generic prom-token \
#     --from-literal=token=<your-bearer-token> \
#     -n production
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: api-services-auth
  namespace: production
spec:
  targetRef:
    kind: Deployment
    selector:
      matchLabels:
        tier: api
  metricsSource:
    prometheus:
      address: "https://prometheus.example.com"
      bearerTokenSecret:
        name: prom-token
        key: token
  cpu:
    percentile: 95
    safetyMargin: "1.2"
  memory:
    percentile: 99
    safetyMargin: "1.3"
  updateStrategy:
    mode: Recommend
---
# Example 4: Dev environment with self-signed TLS certificate
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: api-services-dev
  namespace: dev
spec:
  targetRef:
    kind: Deployment
    selector:
      matchLabels:
        tier: api
  metricsSource:
    prometheus:
      address: "https://prometheus-dev.internal:9090"
      tls:
        insecureSkipVerify: true
  cpu:
    percentile: 95
    safetyMargin: "1.2"
  memory:
    percentile: 99
    safetyMargin: "1.3"
  updateStrategy:
    mode: Recommend

# Scheduled Auto Mode: resize only during off-peak hours on weekdays
#
# Recommendations are computed continuously. Resizes are applied only
# during the configured time windows. Budget caps limit total resource
# increase per cycle to prevent cluster-wide spikes.
#
# Apply:
#   kubectl apply -f examples/12-scheduled-auto-mode.yaml
---
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: api-services-auto
  namespace: production
spec:
  targetRef:
    kind: Deployment
    selector:
      matchLabels:
        tier: api
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
  cpu:
    percentile: 95
    safetyMargin: "1.2"
    minAllowed: "50m"
    maxAllowed: "4000m"
  memory:
    percentile: 99
    safetyMargin: "1.3"
    minAllowed: "64Mi"
    maxAllowed: "8Gi"
  updateStrategy:
    type: Auto
    cooldown: 1h
    autoRevert: true
    # Resize only during off-peak hours on weekdays
    schedule:
      windows:
        - start: "02:00"
          end: "06:00"
      daysOfWeek: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"]
      timezone: "America/New_York"
    # Limit total resource increase per cycle
    maxTotalCpuIncrease: "2000m"
    maxTotalMemoryIncrease: "4Gi"
    # Process up to 10 pods in parallel
    maxConcurrentResizes: 10
    # Fall back to eviction if in-place fails
    resizeMethod: InPlaceOrRecreate

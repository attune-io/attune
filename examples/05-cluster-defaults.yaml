# Cluster Defaults: set organization-wide baselines
#
# AttuneDefaults is a cluster-scoped resource that provides
# defaults inherited by all AttunePolicy resources. Individual
# policies only need to specify what differs from the defaults.
#
# Apply:
#   kubectl apply -f examples/05-cluster-defaults.yaml
---
apiVersion: attune.io/v1alpha1
kind: AttuneDefaults
metadata:
  name: default
spec:
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
    historyWindow: 168h
    minimumDataPoints: 168
  cpu:
    percentile: 95
    overhead: "20"
    controlledValues: RequestsAndLimits
  memory:
    percentile: 99
    overhead: "30"
    controlledValues: RequestsAndLimits
    allowDecrease: false
  updateStrategy:
    type: Recommend
    cooldown: 1h
    autoRevert: true
  # Cost pricing for EstimatedMonthlySavings (optional).
  # Adjust to match your cloud provider or reserved instance pricing.
  costPricing:
    cpuPerCoreHour: "0.031"     # USD per vCPU-hour (default)
    memoryPerGiBHour: "0.004"   # USD per GiB-hour (default)
---
# With defaults set, policies become much simpler:
apiVersion: attune.io/v1alpha1
kind: AttunePolicy
metadata:
  name: api-services
  namespace: production
spec:
  targetRef:
    kind: Deployment
    selector:
      matchLabels:
        tier: api
  cpu:
    minAllowed: "50m"
    maxAllowed: "4000m"
  memory:
    minAllowed: "64Mi"
    maxAllowed: "8Gi"
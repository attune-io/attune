# Cluster Defaults: set organization-wide baselines
#
# RightSizeDefaults is a cluster-scoped resource that provides
# defaults inherited by all RightSizePolicy resources. Individual
# policies only need to specify what differs from the defaults.
#
# Apply:
#   kubectl apply -f 05-cluster-defaults.yaml
---
apiVersion: rightsize.io/v1alpha1
kind: RightSizeDefaults
metadata:
  name: default
spec:
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
    historyWindow: 168h
    minimumDataPoints: 168
  cpu:
    percentile: 95
    safetyMargin: "1.2"
    controlledValues: RequestsAndLimits
  memory:
    percentile: 99
    safetyMargin: "1.3"
    controlledValues: RequestsAndLimits
    allowDecrease: false
  updateStrategy:
    mode: Recommend
    cooldown: 1h
    autoRevert: true
  # Cost pricing for EstimatedMonthlySavings (optional).
  # Adjust to match your cloud provider or reserved instance pricing.
  costPricing:
    cpuPerCoreHour: "0.031"     # USD per vCPU-hour (default)
    memoryPerGiBHour: "0.004"   # USD per GiB-hour (default)
---
# With defaults set, policies become much simpler:
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: api-services
  namespace: production
spec:
  targetRef:
    kind: Deployment
    selector:
      matchLabels:
        tier: api
  cpu:
    bounds:
      min: "50m"
      max: "4000m"
  memory:
    bounds:
      min: "64Mi"
      max: "8Gi"
# HPA Coexistence: right-size base requests without breaking HPA
#
# kube-rightsize adjusts the absolute resource request.
# HPA scales replicas based on percentage utilization.
# These two don't conflict because kube-rightsize changes the base,
# while HPA scales the number of pods.
#
# Pair this policy with an HPA targeting the same deployment.
#
# Apply:
#   kubectl apply -f examples/04-hpa-coexistence.yaml
---
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: api-with-hpa
  namespace: production
spec:
  targetRef:
    kind: Deployment
    name: api-server
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
    historyWindow: 168h
    minimumDataPoints: 168
  cpu:
    percentile: 95
    overhead: "30"       # extra margin since HPA relies on headroom
    minAllowed: "100m"
    maxAllowed: "2000m"
    controlledValues: RequestsOnly   # don't touch limits (HPA needs stable ratio)
  memory:
    percentile: 99
    overhead: "40"
    minAllowed: "128Mi"
    maxAllowed: "4Gi"
    controlledValues: RequestsOnly
    allowDecrease: false
  updateStrategy:
    type: Recommend            # start with Recommend when HPA is involved
    cooldown: 2h
---
# Companion HPA (for reference)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-server
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-server
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
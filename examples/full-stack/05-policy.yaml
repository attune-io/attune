apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: api-server
  namespace: myapp
spec:
  targetRef:
    kind: Deployment
    name: api-server
  cpu:
    maxChangePercent: 50
  memory:
    maxChangePercent: 30
  updateStrategy:
    type: Canary
    cooldown: 1h
    autoRevert: true
    canary:
      percentage: 10
      observationPeriod: 30m
apiVersion: rightsize.io/v1alpha1
kind: RightSizeDefaults
metadata:
  name: org-defaults
spec:
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
    historyWindow: 168h
    minimumDataPoints: 168
  cpu:
    percentile: 95
    safetyMargin: "1.2"
    bounds:
      min: "50m"
      max: "4000m"
    controlledValues: RequestsAndLimits
  memory:
    percentile: 99
    safetyMargin: "1.3"
    bounds:
      min: "64Mi"
      max: "8Gi"
    controlledValues: RequestsAndLimits
    allowDecrease: false
  costPricing:
    cpuPerCoreHour: "0.031"
    memoryPerGiBHour: "0.004"
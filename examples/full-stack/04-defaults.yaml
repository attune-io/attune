apiVersion: attune.io/v1alpha1
kind: AttuneDefaults
metadata:
  name: org-defaults
spec:
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
    historyWindow: 168h
    minimumDataPoints: 168
  cpu:
    percentile: 95
    overhead: "20"
    minAllowed: "50m"
    maxAllowed: "4000m"
    controlledValues: RequestsAndLimits
  memory:
    percentile: 99
    overhead: "30"
    minAllowed: "64Mi"
    maxAllowed: "8Gi"
    controlledValues: RequestsAndLimits
    allowDecrease: false
  costPricing:
    cpuPerCoreHour: "0.031"
    memoryPerGiBHour: "0.004"
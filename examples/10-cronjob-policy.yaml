# CronJob Policy: recommend right-sized resources for batch workloads
#
# CronJobs and Jobs are recommend-only. The operator monitors historical
# usage from completed pod runs and writes recommendations to the policy
# status. No in-place resizes are performed (batch pods complete and
# cannot be resized).
#
# Use the recommendations to update your CronJob's resource requests
# for future runs.
#
# Apply:
#   kubectl apply -f examples/10-cronjob-policy.yaml
#
# Check recommendations:
#   kubectl rightsize recommendations -n batch-jobs
---
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: nightly-reports
  namespace: batch-jobs
spec:
  targetRef:
    kind: CronJob
    name: nightly-etl
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
    minimumDataPoints: 24
  cpu:
    percentile: 95
    safetyMargin: "1.2"
    bounds:
      min: "100m"
      max: "2000m"
  memory:
    percentile: 99
    safetyMargin: "1.3"
    bounds:
      min: "128Mi"
      max: "4Gi"
  updateStrategy:
    mode: Recommend

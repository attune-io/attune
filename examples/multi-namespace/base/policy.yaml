apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: api-servers
spec:
  targetRef:
    kind: Deployment
    selector:
      matchLabels:
        tier: api
  cpu:
    percentile: 95
    overhead: "20"
  memory:
    percentile: 99
    overhead: "30"
  updateStrategy:
    type: Recommend
    cooldown: 1h
    autoRevert: true
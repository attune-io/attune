# Dev: aggressive settings, fast feedback loop
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: api-servers
spec:
  cpu:
    percentile: 90
    overhead: "10"
    maxChangePercent: 100
  memory:
    percentile: 95
    overhead: "10"
    maxChangePercent: 100
  updateStrategy:
    type: Auto
    cooldown: 30m
# Staging: moderate settings, 25% canary
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: api-servers
spec:
  cpu:
    percentile: 95
    overhead: "20"
  memory:
    percentile: 99
    overhead: "20"
  updateStrategy:
    type: Canary
    cooldown: 1h
    maxCpuChangePercent: 50
    maxMemoryChangePercent: 50
    canary:
      percentage: 25
      observationPeriod: 15m
# Production: conservative settings, 10% canary, long cooldown
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: api-servers
spec:
  cpu:
    percentile: 99
    safetyMargin: "1.3"
  memory:
    percentile: 99
    safetyMargin: "1.5"
  updateStrategy:
    mode: Canary
    cooldown: 2h
    maxCpuChangePercent: 30
    maxMemoryChangePercent: 30
    canary:
      percentage: 10
      observationPeriod: 30m
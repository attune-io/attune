# Auto Mode: fully automated right-sizing for trusted workloads
#
# All pods matching the selector are resized in-place.
# Use this for workloads where you have high confidence in the
# operator's recommendations (e.g., after weeks of Canary mode).
#
# Apply:
#   kubectl apply -f examples/03-auto-mode.yaml
---
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: batch-workers-auto
  namespace: batch
spec:
  targetRef:
    kind: Deployment
    selector:
      matchLabels:
        tier: worker
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
    historyWindow: 168h
    minimumDataPoints: 168
  cpu:
    percentile: 95
    overhead: "15"
    minAllowed: "200m"
    maxAllowed: "16000m"
    controlledValues: RequestsAndLimits
  memory:
    percentile: 99
    overhead: "25"
    minAllowed: "256Mi"
    maxAllowed: "32Gi"
    controlledValues: RequestsAndLimits
    allowDecrease: false
  updateStrategy:
    type: Auto
    maxCpuChangePercent: 30
    maxMemoryChangePercent: 20
    cooldown: 4h
    autoRevert: true
    # safetyObservationPeriod: 5m  # how long to watch each pod after resize (default: 5m, min: 1m)
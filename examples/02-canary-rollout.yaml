# Canary Rollout: resize 10% of pods first, observe, then expand
#
# After running in Recommend mode and trusting the recommendations,
# switch to Canary. The operator resizes a small percentage of pods,
# watches them for the observation period, and auto-reverts if any
# pod becomes unhealthy (OOMKilled, CPU-throttled, restart spikes, NotReady).
#
# Apply:
#   kubectl apply -f examples/02-canary-rollout.yaml
#
# Watch progress:
#   kubectl rightsize status -n production
---
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: api-canary
  namespace: production
spec:
  targetRef:
    kind: Deployment
    selector:
      matchLabels:
        tier: api
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
    historyWindow: 336h        # 2 weeks of data
    minimumDataPoints: 336
  cpu:
    percentile: 95
    overhead: "20"
    minAllowed: "100m"
    maxAllowed: "8000m"
    controlledValues: RequestsAndLimits
  memory:
    percentile: 99
    overhead: "30"
    minAllowed: "128Mi"
    maxAllowed: "16Gi"
    controlledValues: RequestsAndLimits
    allowDecrease: false       # never shrink memory (OOMKill risk)
  updateStrategy:
    type: Canary
    canary:
      percentage: 10           # resize 10% of pods first
      observationPeriod: 30m   # watch for 30 minutes
    maxCpuChangePercent: 50    # cap per-resize CPU change
    maxMemoryChangePercent: 30 # cap per-resize memory change
    cooldown: 2h
    autoRevert: true           # revert if unhealthy
---
# OneShot Mode: resize exactly one pod per reconcile cycle.
# The safest automated mode. Each cycle resizes at most one pod,
# then waits for the cooldown before touching another. Ideal for
# StatefulSets or workloads where you want human-speed rollout.
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: db-oneshot
  namespace: production
spec:
  targetRef:
    kind: StatefulSet
    name: postgres
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:9090
    historyWindow: 336h
    minimumDataPoints: 336
  cpu:
    percentile: 95
    safetyMargin: "1.3"
    bounds:
      min: "500m"
      max: "8000m"
  memory:
    percentile: 99
    safetyMargin: "1.4"
    bounds:
      min: "1Gi"
      max: "32Gi"
    allowDecrease: false
  updateStrategy:
    mode: OneShot
    cooldown: 4h
    autoRevert: true
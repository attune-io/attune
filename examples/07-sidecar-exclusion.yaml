# Sidecar Exclusion: right-size app containers without touching service mesh proxies
#
# Well-known mesh/sidecar names (istio-proxy, linkerd-proxy, etc.) are
# auto-excluded by default (excludeKnownSidecars: true). Use
# excludedContainers for extra custom agents. Set excludeKnownSidecars:
# false only if you intentionally want Attune to right-size known proxies.
#
# Apply:
#   kubectl apply -f examples/07-sidecar-exclusion.yaml
#
# Verify:
#   kubectl get ap web-with-sidecars -n production
---
apiVersion: attune.io/v1alpha1
kind: AttunePolicy
metadata:
  name: web-with-sidecars
  namespace: production
spec:
  targetRef:
    kind: Deployment
    name: web-frontend
  # excludeKnownSidecars: true   # default: skips istio-proxy, linkerd-proxy, ...
  excludedContainers:
    - my-company-agent     # extra skip beyond the known list
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
    historyWindow: 168h
  cpu:
    percentile: 95
    overhead: "20"
    minAllowed: "100m"
    maxAllowed: "2000m"
  memory:
    percentile: 99
    overhead: "30"
    minAllowed: "128Mi"
    maxAllowed: "4Gi"
    allowDecrease: false
  updateStrategy:
    type: Recommend
    cooldown: 1h
# Sidecar Exclusion: right-size app containers without touching service mesh proxies
#
# When pods include sidecar containers injected by a service mesh (Istio,
# Linkerd, Cilium), those containers have their own resource management.
# Use excludedContainers to skip them entirely.
#
# Apply:
#   kubectl apply -f examples/07-sidecar-exclusion.yaml
#
# Verify:
#   kubectl get rsp web-with-sidecars -n production
---
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: web-with-sidecars
  namespace: production
spec:
  targetRef:
    kind: Deployment
    name: web-frontend
  excludedContainers:
    - istio-proxy          # Istio sidecar
    - linkerd-proxy        # Linkerd sidecar
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
    historyWindow: 168h
  cpu:
    percentile: 95
    safetyMargin: "1.2"
    minAllowed: "100m"
    maxAllowed: "2000m"
  memory:
    percentile: 99
    safetyMargin: "1.3"
    minAllowed: "128Mi"
    maxAllowed: "4Gi"
    allowDecrease: false
  updateStrategy:
    type: Recommend
    cooldown: 1h
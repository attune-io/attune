# Getting Started: full configuration example
#
# This shows all commonly used fields with their default values.
# Most users should start with examples/01-getting-started.yaml (minimal)
# and override only what they need.
---
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: my-first-policy
  namespace: my-app
spec:
  targetRef:
    kind: Deployment
    name: my-api
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
    historyWindow: 168h        # query the last 7 days
    minimumDataPoints: 48      # ~4 hours at the default queryStep
    queryStep: 5m              # Prometheus range query step
  cpu:
    percentile: 95
    overhead: "20"
    minAllowed: "50m"
    maxAllowed: "4000m"
    maxChangePercent: 50
  memory:
    percentile: 99
    overhead: "30"
    minAllowed: "64Mi"
    maxAllowed: "8Gi"
    maxChangePercent: 30
  updateStrategy:
    type: Recommend            # safe default; switch to Canary or Auto later
    cooldown: 1h
# Multi-Workload Selector: one policy for many deployments
#
# Instead of targeting a single deployment by name, use a label
# selector to match all deployments with a common label.
# The operator discovers matching workloads automatically.
#
# Apply:
#   kubectl apply -f examples/06-multi-workload-selector.yaml
---
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: all-microservices
  namespace: production
spec:
  targetRef:
    kind: Deployment
    selector:
      matchLabels:
        managed-by: platform-team
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
    historyWindow: 168h
    minimumDataPoints: 168
  cpu:
    percentile: 95
    safetyMargin: "1.2"
    minAllowed: "50m"
    maxAllowed: "4000m"
    controlledValues: RequestsAndLimits
  memory:
    percentile: 99
    safetyMargin: "1.3"
    minAllowed: "64Mi"
    maxAllowed: "8Gi"
    controlledValues: RequestsAndLimits
    allowDecrease: false
  updateStrategy:
    type: Recommend
    cooldown: 1h
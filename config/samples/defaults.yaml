# Example: Cluster-scoped defaults
# Sets global defaults so individual RightSizePolicy resources
# can be simpler (only override what differs).
apiVersion: rightsize.io/v1alpha1
kind: RightSizeDefaults
metadata:
  name: default
spec:
  metricsSource:
    prometheus:
      address: http://prometheus.monitoring:9090
    historyWindow: 7d
    minimumDataPoints: 168
  cpu:
    percentile: 95
    safetyMargin: 1.2
    controlledValues: RequestsAndLimits
  memory:
    percentile: 99
    safetyMargin: 1.3
    controlledValues: RequestsAndLimits
    allowDecrease: false
  updateStrategy:
    mode: Recommend
    cooldown: 1h
    autoRevert: true

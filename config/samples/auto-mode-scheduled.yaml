---
# Example: Auto mode with schedule windows
# Resizes only occur during the configured time windows.
# Recommendations are always computed; only execution is gated.
apiVersion: attune.io/v1alpha1
kind: AttunePolicy
metadata:
  name: scheduled-resize
  namespace: production
spec:
  targetRef:
    kind: Deployment
    name: api-server
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
  cpu:
    percentile: 95
    overhead: "20"
    minAllowed: "100m"
    maxAllowed: "4000m"
  memory:
    percentile: 99
    overhead: "30"
    minAllowed: "128Mi"
    maxAllowed: "8Gi"
  updateStrategy:
    type: Auto
    autoRevert: true
    schedule:
      windows:
        - start: "02:00"
          end: "06:00"
      daysOfWeek:
        - Monday
        - Tuesday
        - Wednesday
        - Thursday
        - Friday
      timezone: America/New_York

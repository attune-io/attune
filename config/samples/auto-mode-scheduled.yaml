---
# Example: Auto mode with schedule windows
# Resizes only occur during the configured time windows.
# Recommendations are always computed; only execution is gated.
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: scheduled-resize
  namespace: production
spec:
  targetRef:
    kind: Deployment
    name: api-server
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
  cpu:
    percentile: 95
    safetyMargin: "1.2"
    bounds:
      min: "100m"
      max: "4000m"
  memory:
    percentile: 99
    safetyMargin: "1.3"
    bounds:
      min: "128Mi"
      max: "8Gi"
  updateStrategy:
    mode: Auto
    autoRevert: true
    schedule:
      windows:
        - start: "02:00"
          end: "06:00"
      daysOfWeek:
        - Monday
        - Tuesday
        - Wednesday
        - Thursday
        - Friday
      timezone: America/New_York

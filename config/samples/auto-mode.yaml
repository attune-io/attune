---
# Example: Auto mode (fully automated right-sizing)
# Applies in-place resizes to all matching pods with safety guardrails.
# Use after validating recommendations in Recommend or Canary mode.
apiVersion: attune.io/v1alpha1
kind: AttunePolicy
metadata:
  name: batch-workers
  namespace: production
spec:
  targetRef:
    kind: Deployment
    selector:
      matchLabels:
        tier: worker
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
    historyWindow: 168h
    minimumDataPoints: 168
  cpu:
    percentile: 95
    overhead: "15"
    minAllowed: "100m"
    maxAllowed: "8000m"
    controlledValues: RequestsAndLimits
    maxChangePercent: 50
  memory:
    percentile: 99
    overhead: "25"
    minAllowed: "128Mi"
    maxAllowed: "16Gi"
    controlledValues: RequestsAndLimits
    allowDecrease: false
    maxChangePercent: 30
  updateStrategy:
    type: Auto
    cooldown: 2h
    autoRevert: true

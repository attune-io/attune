# Example: Recommend mode (safe, no changes applied)
# Generates recommendations in status without modifying any pods.
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: api-services
  namespace: production
spec:
  targetRef:
    kind: Deployment
    selector:
      matchLabels:
        tier: api
  metricsSource:
    prometheus:
      address: http://prometheus.monitoring:9090
    historyWindow: 168h
    minimumDataPoints: 168
  cpu:
    percentile: 95
    safetyMargin: "1.2"
    bounds:
      min: "50m"
      max: "4000m"
    controlledValues: RequestsAndLimits
  memory:
    percentile: 99
    safetyMargin: "1.3"
    bounds:
      min: "64Mi"
      max: "8Gi"
    controlledValues: RequestsAndLimits
    allowDecrease: false
  updateStrategy:
    mode: Recommend
    cooldown: 1h

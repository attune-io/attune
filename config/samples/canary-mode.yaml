---
# Example: Canary mode (resize 10% of pods first, then the rest)
# Applies in-place resizes with graduated rollout and auto-revert.
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: worker-fleet
  namespace: production
spec:
  targetRef:
    kind: Deployment
    name: worker
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
    historyWindow: 336h
    minimumDataPoints: 336
  cpu:
    percentile: 95
    safetyMargin: "1.2"
    minAllowed: "100m"
    maxAllowed: "8000m"
  memory:
    percentile: 99
    safetyMargin: "1.3"
    minAllowed: "128Mi"
    maxAllowed: "16Gi"
    allowDecrease: false
  updateStrategy:
    type: Canary
    canary:
      percentage: 10
      observationPeriod: 30m
    maxCpuChangePercent: 50
    maxMemoryChangePercent: 30
    cooldown: 2h
    autoRevert: true
  weight: 100

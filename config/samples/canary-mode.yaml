---
# Example: Canary mode (resize 10% of pods first, then the rest)
# Applies in-place resizes with graduated rollout and auto-revert.
apiVersion: attune.io/v1alpha1
kind: AttunePolicy
metadata:
  name: worker-fleet
  namespace: production
spec:
  targetRef:
    kind: Deployment
    name: worker
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
    historyWindow: 336h
    minimumDataPoints: 336
  cpu:
    percentile: 95
    overhead: "20"
    minAllowed: "100m"
    maxAllowed: "8000m"
    maxChangePercent: 50
  memory:
    percentile: 99
    overhead: "30"
    minAllowed: "128Mi"
    maxAllowed: "16Gi"
    allowDecrease: false
    maxChangePercent: 30
  updateStrategy:
    type: Canary
    canary:
      percentage: 10
      observationPeriod: 30m
    cooldown: 2h
    autoRevert: true
  weight: 100

---
# Example: OneShot mode (resize one pod per cycle)
# The safest automated mode. Each cycle resizes at most one pod,
# then waits for the cooldown before touching another.
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: db-oneshot
  namespace: production
spec:
  targetRef:
    kind: StatefulSet
    name: postgres
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
    historyWindow: 336h
    minimumDataPoints: 336
  cpu:
    percentile: 95
    safetyMargin: "1.3"
    minAllowed: "500m"
    maxAllowed: "8000m"
  memory:
    percentile: 99
    safetyMargin: "1.4"
    minAllowed: "1Gi"
    maxAllowed: "32Gi"
    allowDecrease: false
  updateStrategy:
    type: OneShot
    cooldown: 4h
    autoRevert: true

---
# Example: Auto mode with sidecar container exclusion
# Known mesh/sidecar names (istio-proxy, linkerd-proxy, ...) are skipped
# automatically (excludeKnownSidecars defaults to true). List extra names
# in excludedContainers if needed.
apiVersion: attune.io/v1alpha1
kind: AttunePolicy
metadata:
  name: app-with-sidecar
  namespace: production
spec:
  targetRef:
    kind: Deployment
    name: my-app
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
  cpu:
    percentile: 95
    overhead: "20"
    minAllowed: "50m"
    maxAllowed: "4000m"
  memory:
    percentile: 99
    overhead: "30"
    minAllowed: "64Mi"
    maxAllowed: "8Gi"
  # excludeKnownSidecars: true  # default
  excludedContainers:
    - my-company-agent
  updateStrategy:
    type: Auto
    autoRevert: true

---
# Example: Auto mode with sidecar container exclusion
# Excludes service mesh sidecars from right-sizing so they remain
# managed by their respective controllers (e.g., istio-proxy by Istio).
apiVersion: rightsize.io/v1alpha1
kind: RightSizePolicy
metadata:
  name: app-with-sidecar
  namespace: production
spec:
  targetRef:
    kind: Deployment
    name: my-app
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
  cpu:
    percentile: 95
    safetyMargin: "1.2"
    minAllowed: "50m"
    maxAllowed: "4000m"
  memory:
    percentile: 99
    safetyMargin: "1.3"
    minAllowed: "64Mi"
    maxAllowed: "8Gi"
  excludedContainers:
    - istio-proxy
    - linkerd-proxy
  updateStrategy:
    mode: Auto
    autoRevert: true

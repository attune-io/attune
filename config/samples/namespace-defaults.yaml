---
# Example: Namespace-scoped defaults
# Overrides cluster-scoped RightSizeDefaults for this namespace.
# Policies inherit these values unless they specify their own.
# Precedence: policy spec > namespace defaults > cluster defaults
apiVersion: rightsize.io/v1alpha1
kind: RightSizeNamespaceDefaults
metadata:
  name: production-defaults
  namespace: production
spec:
  metricsSource:
    prometheus:
      address: http://prometheus-server.monitoring:80
    historyWindow: 168h
    minimumDataPoints: 168
  cpu:
    percentile: 99
    overhead: "30"
  memory:
    percentile: 99
    overhead: "50"
    allowDecrease: false
  updateStrategy:
    type: Canary
    cooldown: 2h
    autoRevert: true

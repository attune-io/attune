---
version: 2
builds:
  - id: manager
    main: ./cmd/manager
    binary: manager
    goos: [linux]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
  - id: kubectl-attune
    main: ./cmd/kubectl-attune
    binary: kubectl-attune
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
archives:
  - id: kubectl-plugin
    builds: [kubectl-attune]
    name_template: "kubectl-attune_{{ .Os }}_{{ .Arch }}"
changelog:
  use: github-native
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: namespace-defaults
spec:
  description: Verify that RightSizeNamespaceDefaults overrides cluster-scoped RightSizeDefaults
  timeouts:
    apply: 30s
    assert: 2m
    delete: 30s
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-namespace-defaults
        - apply:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizeDefaults
              metadata:
                name: e2e-cluster-defaults
              spec:
                metricsSource:
                  prometheus:
                    address: http://wrong-address:9090
                cpu:
                  percentile: 90
                  safetyMargin: "1.5"
                memory:
                  percentile: 95
                  safetyMargin: "1.4"
                updateStrategy:
                  mode: Recommend
        - apply:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizeNamespaceDefaults
              metadata:
                name: ns-defaults
                namespace: e2e-namespace-defaults
              spec:
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                cpu:
                  percentile: 95
                  safetyMargin: "1.2"
                memory:
                  percentile: 99
                  safetyMargin: "1.3"
                updateStrategy:
                  mode: Recommend
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: ns-defaults-app
                namespace: e2e-namespace-defaults
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: ns-defaults-app
                template:
                  metadata:
                    labels:
                      app: ns-defaults-app
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resources:
                          requests:
                            cpu: 100m
                            memory: 128Mi
                          limits:
                            cpu: 200m
                            memory: 256Mi
        - apply:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: ns-defaults-test
                namespace: e2e-namespace-defaults
              spec:
                targetRef:
                  kind: Deployment
                  name: ns-defaults-app
                metricsSource:
                  minimumDataPoints: 1
                  historyWindow: 1h
                updateStrategy:
                  mode: Recommend
                  cooldown: 1m
    - name: verify-policy-uses-namespace-defaults
      try:
        - assert:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: ns-defaults-test
                namespace: e2e-namespace-defaults
              status:
                conditions:
                  - type: Ready
                    status: "False"
                    reason: InsufficientData
                workloads:
                  discovered: 1
  catch:
    - describe:
        apiVersion: rightsize.io/v1alpha1
        kind: RightSizePolicy
        namespace: e2e-namespace-defaults
    - describe:
        apiVersion: rightsize.io/v1alpha1
        kind: RightSizeNamespaceDefaults
        namespace: e2e-namespace-defaults
    - describe:
        apiVersion: rightsize.io/v1alpha1
        kind: RightSizeDefaults
    - podLogs:
        namespace: kube-rightsize-system
        selector: app.kubernetes.io/name=kube-rightsize

apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: namespace-defaults
spec:
  description: Verify that AttuneNamespaceDefaults overrides cluster-scoped AttuneDefaults
  timeouts:
    apply: 60s
    assert: 2m
    delete: 30s
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-namespace-defaults
        - apply:
            resource:
              apiVersion: attune.io/v1alpha1
              kind: AttuneDefaults
              metadata:
                name: zzz-e2e-wrong-defaults
              spec:
                metricsSource:
                  prometheus:
                    address: http://wrong-address:9090
                cpu:
                  percentile: 90
                  overhead: "50"
                memory:
                  percentile: 95
                  overhead: "40"
                updateStrategy:
                  type: Recommend
        - apply:
            resource:
              apiVersion: attune.io/v1alpha1
              kind: AttuneNamespaceDefaults
              metadata:
                name: ns-defaults
                namespace: e2e-namespace-defaults
              spec:
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                cpu:
                  percentile: 95
                  overhead: "20"
                memory:
                  percentile: 99
                  overhead: "30"
                updateStrategy:
                  type: Recommend
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: ns-defaults-app
                namespace: e2e-namespace-defaults
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: ns-defaults-app
                template:
                  metadata:
                    labels:
                      app: ns-defaults-app
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resources:
                          requests:
                            cpu: 100m
                            memory: 128Mi
                          limits:
                            cpu: 200m
                            memory: 256Mi
        - apply:
            resource:
              apiVersion: attune.io/v1alpha1
              kind: AttunePolicy
              metadata:
                name: ns-defaults-test
                namespace: e2e-namespace-defaults
              spec:
                targetRef:
                  kind: Deployment
                  name: ns-defaults-app
                metricsSource:
                  minimumDataPoints: 1
                  historyWindow: 1h
                cpu:
                  percentile: 95
                  overhead: "20"
                memory:
                  percentile: 99
                  overhead: "30"
                updateStrategy:
                  type: Recommend
                  cooldown: 1m
    - name: verify-policy-uses-namespace-defaults
      try:
        - script:
            timeout: 2m
            content: |
              for i in $(seq 1 24); do
                REASON=$(kubectl get attunepolicy ns-defaults-test -n e2e-namespace-defaults \
                  -o jsonpath='{.status.conditions[?(@.type=="Ready")].reason}' 2>/dev/null)
                DISCOVERED=$(kubectl get attunepolicy ns-defaults-test -n e2e-namespace-defaults \
                  -o jsonpath='{.status.workloads.discovered}' 2>/dev/null)
                if [ "$DISCOVERED" = "1" ] && { [ "$REASON" = "InsufficientData" ] || [ "$REASON" = "Monitoring" ]; }; then
                  echo "Policy reconciled with namespace defaults (reason: $REASON, discovered: $DISCOVERED)"
                  exit 0
                fi
                sleep 5
              done
              echo "Timed out waiting for policy to reconcile with namespace defaults"
              kubectl get attunepolicy ns-defaults-test -n e2e-namespace-defaults -o yaml
              exit 1
  catch:
    - describe:
        apiVersion: attune.io/v1alpha1
        kind: AttunePolicy
        namespace: e2e-namespace-defaults
    - describe:
        apiVersion: attune.io/v1alpha1
        kind: AttuneNamespaceDefaults
        namespace: e2e-namespace-defaults
    - describe:
        apiVersion: attune.io/v1alpha1
        kind: AttuneDefaults
    - podLogs:
        namespace: attune-system
        selector: app.kubernetes.io/name=attune

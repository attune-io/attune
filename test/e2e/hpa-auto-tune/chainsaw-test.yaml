apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: hpa-auto-tune
spec:
  description: Verify that HPA target utilization is auto-tuned when the auto-tune annotation is set
  timeouts:
    apply: 30s
    assert: 3m
    delete: 30s
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-hpa-auto-tune
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: tune-app
                namespace: e2e-hpa-auto-tune
              spec:
                replicas: 2
                selector:
                  matchLabels:
                    app: tune-app
                template:
                  metadata:
                    labels:
                      app: tune-app
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resizePolicy:
                          - resourceName: cpu
                            restartPolicy: NotRequired
                          - resourceName: memory
                            restartPolicy: NotRequired
                        resources:
                          requests:
                            cpu: 2000m
                            memory: 256Mi
                          limits:
                            cpu: 4000m
                            memory: 512Mi
        - apply:
            resource:
              apiVersion: autoscaling/v2
              kind: HorizontalPodAutoscaler
              metadata:
                name: tune-app
                namespace: e2e-hpa-auto-tune
                annotations:
                  rightsize.io/auto-tune: "true"
              spec:
                scaleTargetRef:
                  apiVersion: apps/v1
                  kind: Deployment
                  name: tune-app
                minReplicas: 2
                maxReplicas: 10
                metrics:
                  - type: Resource
                    resource:
                      name: cpu
                      target:
                        type: Utilization
                        averageUtilization: 70
        - apply:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: tune-test
                namespace: e2e-hpa-auto-tune
              spec:
                targetRef:
                  kind: Deployment
                  name: tune-app
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                  minimumDataPoints: 1
                  historyWindow: 1h
                  queryStep: 1m
                cpu:
                  percentile: 95
                  safetyMargin: "1.2"
                  bounds:
                    min: 50m
                    max: "4000m"
                memory:
                  percentile: 99
                  safetyMargin: "1.3"
                  bounds:
                    min: 64Mi
                    max: 8Gi
                updateStrategy:
                  mode: Auto
                  cooldown: 1m
                  maxCpuChangePercent: 100
                  maxMemoryChangePercent: 100
    - name: verify-deployment-ready
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: tune-app
                namespace: e2e-hpa-auto-tune
              status:
                readyReplicas: 2
    - name: verify-policy-discovers-workload
      try:
        - assert:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: tune-test
                namespace: e2e-hpa-auto-tune
              status:
                workloads:
                  discovered: 1
    - name: verify-hpa-original-annotation
      try:
        - script:
            timeout: 5m
            content: |
              for i in $(seq 1 60); do
                ORIG=$(kubectl get hpa tune-app -n e2e-hpa-auto-tune \
                  -o jsonpath='{.metadata.annotations.rightsize\.io/original-target-cpu}' 2>/dev/null)
                if [ -n "$ORIG" ]; then
                  echo "HPA original-target-cpu annotation found: $ORIG"
                  CURRENT=$(kubectl get hpa tune-app -n e2e-hpa-auto-tune \
                    -o jsonpath='{.spec.metrics[0].resource.target.averageUtilization}' 2>/dev/null)
                  echo "Current averageUtilization: $CURRENT"
                  exit 0
                fi
                sleep 5
              done
              echo "HPA auto-tune annotation not found"
              kubectl get hpa tune-app -n e2e-hpa-auto-tune -o yaml
              kubectl get rightsizepolicy tune-test -n e2e-hpa-auto-tune -o yaml
              exit 1
  catch:
    - describe:
        apiVersion: rightsize.io/v1alpha1
        kind: RightSizePolicy
        namespace: e2e-hpa-auto-tune
    - describe:
        apiVersion: autoscaling/v2
        kind: HorizontalPodAutoscaler
        namespace: e2e-hpa-auto-tune
    - podLogs:
        namespace: kube-rightsize-system
        selector: app.kubernetes.io/name=kube-rightsize

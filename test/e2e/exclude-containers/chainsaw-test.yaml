apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: exclude-containers
spec:
  description: Verify that excludedContainers skips sidecar containers in multi-container pods
  timeouts:
    apply: 30s
    assert: 2m
    delete: 30s
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-exclude-containers
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: multi-container-app
                namespace: e2e-exclude-containers
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: multi-container-app
                template:
                  metadata:
                    labels:
                      app: multi-container-app
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resources:
                          requests:
                            cpu: 250m
                            memory: 256Mi
                          limits:
                            cpu: 500m
                            memory: 512Mi
                      - name: istio-proxy
                        image: registry.k8s.io/pause:3.9
                        resources:
                          requests:
                            cpu: 100m
                            memory: 128Mi
                          limits:
                            cpu: 200m
                            memory: 256Mi
        - apply:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: exclude-sidecar
                namespace: e2e-exclude-containers
              spec:
                targetRef:
                  kind: Deployment
                  name: multi-container-app
                excludedContainers:
                  - istio-proxy
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                  minimumDataPoints: 1
                  historyWindow: 1h
                cpu:
                  percentile: 95
                  safetyMargin: "1.2"
                memory:
                  percentile: 99
                  safetyMargin: "1.3"
                updateStrategy:
                  type: Recommend
                  cooldown: 1m
    - name: verify-deployment-ready
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: multi-container-app
                namespace: e2e-exclude-containers
              status:
                readyReplicas: 1
    - name: verify-policy-discovers-workload
      try:
        - assert:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: exclude-sidecar
                namespace: e2e-exclude-containers
              status:
                workloads:
                  discovered: 1
  catch:
    - describe:
        apiVersion: rightsize.io/v1alpha1
        kind: RightSizePolicy
        namespace: e2e-exclude-containers
    - podLogs:
        namespace: kube-rightsize-system
        selector: app.kubernetes.io/name=kube-rightsize
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: canary-rollout
spec:
  description: Verify that a RightSizePolicy in Canary mode with 33% percentage reaches Ready condition
  timeouts:
    apply: 30s
    assert: 2m
    delete: 30s
  steps:
    - name: create-deployment
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-canary-rollout
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: canary-app
                namespace: e2e-canary-rollout
                labels:
                  app: canary-app
                  tier: api
              spec:
                replicas: 3
                selector:
                  matchLabels:
                    app: canary-app
                template:
                  metadata:
                    labels:
                      app: canary-app
                      tier: api
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resizePolicy:
                          - resourceName: cpu
                            restartPolicy: NotRequired
                          - resourceName: memory
                            restartPolicy: NotRequired
                        resources:
                          requests:
                            cpu: 500m
                            memory: 512Mi
                          limits:
                            cpu: "1"
                            memory: 1Gi
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: canary-app
                namespace: e2e-canary-rollout
              status:
                readyReplicas: 3
    - name: wait-for-metrics
      try:
        - script:
            timeout: 2m
            content: |
              PROM_POD=$(kubectl get pods -n monitoring -l app.kubernetes.io/name=prometheus,app.kubernetes.io/component=server -o name | head -1)
              NS="e2e-canary-rollout"
              ENCODED_QUERY="container_cpu_usage_seconds_total%7Bnamespace%3D%22${NS}%22%2Ccontainer%21%3D%22%22%7D"
              for i in $(seq 1 24); do
                result=$(kubectl exec -n monitoring "$PROM_POD" -- \
                  wget -qO- "http://localhost:9090/api/v1/query?query=${ENCODED_QUERY}" 2>/dev/null || true)
                if echo "$result" | grep -q '"result":\[{'; then
                  echo "cAdvisor metrics available for namespace $NS after ${i}x5s"
                  exit 0
                fi
                sleep 5
              done
              echo "WARNING: No cAdvisor metrics for $NS after 120s, proceeding"
    - name: create-policy
      try:
        - apply:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: canary-test
                namespace: e2e-canary-rollout
              spec:
                targetRef:
                  kind: Deployment
                  selector:
                    matchLabels:
                      tier: api
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                  minimumDataPoints: 1
                  historyWindow: 1h
                  queryStep: 1m
                  rateWindow: 5m
                cpu:
                  percentile: 95
                  safetyMargin: "1.2"
                  bounds:
                    min: 50m
                    max: "4000m"
                  controlledValues: RequestsAndLimits
                memory:
                  percentile: 99
                  safetyMargin: "1.3"
                  allowDecrease: true
                  bounds:
                    min: 64Mi
                    max: 8Gi
                  controlledValues: RequestsAndLimits
                updateStrategy:
                  mode: Canary
                  cooldown: 1m
                  maxCpuChangePercent: 100
                  maxMemoryChangePercent: 100
                  canary:
                    percentage: 33
                    observationPeriod: 5m
    - name: verify-policy-status
      try:
        - script:
            timeout: 2m
            content: |
              for i in $(seq 1 24); do
                STATUS=$(kubectl get rightsizepolicy canary-test -n e2e-canary-rollout \
                  -o jsonpath='{.status.workloads.discovered}' 2>/dev/null)
                if [ "$STATUS" -ge 1 ] 2>/dev/null; then
                  echo "Policy discovered $STATUS workload(s)"
                  exit 0
                fi
                sleep 5
              done
              echo "Timed out waiting for policy to discover workloads"
              kubectl get rightsizepolicy canary-test -n e2e-canary-rollout -o yaml
              exit 1
    - name: verify-resize-occurred
      try:
        - script:
            timeout: 5m
            content: |
              for i in $(seq 1 60); do
                RESIZED=$(kubectl get rightsizepolicy canary-test -n e2e-canary-rollout \
                  -o jsonpath='{.status.workloads.resized}' 2>/dev/null)
                if [ "$RESIZED" -ge 1 ] 2>/dev/null; then
                  echo "Resize confirmed: $RESIZED pod(s) resized"
                  exit 0
                fi
                sleep 5
              done
              echo "No resize occurred within timeout"
              kubectl get rightsizepolicy canary-test -n e2e-canary-rollout -o yaml
              exit 1
  catch:
    - describe:
        apiVersion: rightsize.io/v1alpha1
        kind: RightSizePolicy
        namespace: e2e-canary-rollout
    - describe:
        apiVersion: apps/v1
        kind: Deployment
        namespace: e2e-canary-rollout
    - podLogs:
        namespace: kube-rightsize-system
        selector: app.kubernetes.io/name=kube-rightsize


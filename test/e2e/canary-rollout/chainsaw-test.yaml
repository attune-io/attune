apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: canary-rollout
spec:
  description: Verify that a RightSizePolicy in Canary mode with 33% percentage reaches Ready condition
  timeouts:
    apply: 30s
    assert: 2m
    delete: 30s
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-canary-rollout
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: canary-app
                namespace: e2e-canary-rollout
                labels:
                  app: canary-app
                  tier: api
              spec:
                replicas: 3
                selector:
                  matchLabels:
                    app: canary-app
                template:
                  metadata:
                    labels:
                      app: canary-app
                      tier: api
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resources:
                          requests:
                            cpu: 500m
                            memory: 512Mi
                          limits:
                            cpu: "1"
                            memory: 1Gi
        - apply:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: canary-test
                namespace: e2e-canary-rollout
              spec:
                targetRef:
                  kind: Deployment
                  selector:
                    matchLabels:
                      tier: api
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:9090
                  historyWindow: 168h
                  minimumDataPoints: 1
                cpu:
                  percentile: 95
                  safetyMargin: "1.2"
                  bounds:
                    min: 50m
                    max: "4000m"
                  controlledValues: RequestsAndLimits
                memory:
                  percentile: 99
                  safetyMargin: "1.3"
                  bounds:
                    min: 64Mi
                    max: 8Gi
                  controlledValues: RequestsAndLimits
                updateStrategy:
                  mode: Canary
                  cooldown: 1h
                  canary:
                    percentage: 33
                    observationPeriod: 5m
    - name: verify-deployment-ready
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: canary-app
                namespace: e2e-canary-rollout
              status:
                readyReplicas: 3
    - name: verify-policy-status
      try:
        - assert:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: canary-test
                namespace: e2e-canary-rollout
              status:
                conditions:
                  - type: Ready
                    status: "False"
                    reason: InsufficientData
  catch:
    - describe:
        apiVersion: rightsize.io/v1alpha1
        kind: RightSizePolicy
        namespace: e2e-canary-rollout
    - describe:
        apiVersion: apps/v1
        kind: Deployment
        namespace: e2e-canary-rollout
    - podLogs:
        namespace: e2e-canary-rollout
        selector: app=canary-app


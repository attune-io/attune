apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: hpa-conflict
spec:
  description: Verify that a AttunePolicy coexists with an HPA on the same Deployment (warning only, not blocking)
  timeouts:
    apply: 30s
    assert: 2m
    delete: 30s
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-hpa-conflict
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: hpa-app
                namespace: e2e-hpa-conflict
              spec:
                replicas: 2
                selector:
                  matchLabels:
                    app: hpa-app
                template:
                  metadata:
                    labels:
                      app: hpa-app
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resources:
                          requests:
                            cpu: 100m
                            memory: 128Mi
                          limits:
                            cpu: 200m
                            memory: 256Mi
        - apply:
            resource:
              apiVersion: autoscaling/v2
              kind: HorizontalPodAutoscaler
              metadata:
                name: hpa-app
                namespace: e2e-hpa-conflict
              spec:
                scaleTargetRef:
                  apiVersion: apps/v1
                  kind: Deployment
                  name: hpa-app
                minReplicas: 2
                maxReplicas: 10
                metrics:
                  - type: Resource
                    resource:
                      name: cpu
                      target:
                        type: Utilization
                        averageUtilization: 70
        - apply:
            resource:
              apiVersion: attune.io/v1alpha1
              kind: AttunePolicy
              metadata:
                name: hpa-conflict-test
                namespace: e2e-hpa-conflict
              spec:
                targetRef:
                  kind: Deployment
                  name: hpa-app
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                  minimumDataPoints: 1
                  historyWindow: 1h
                cpu:
                  percentile: 95
                  overhead: "20"
                memory:
                  percentile: 99
                  overhead: "30"
                updateStrategy:
                  type: Recommend
                  cooldown: 1m
    - name: verify-deployment-ready
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: hpa-app
                namespace: e2e-hpa-conflict
              status:
                readyReplicas: 2
    - name: verify-policy-reconciles-despite-hpa
      try:
        - assert:
            resource:
              apiVersion: attune.io/v1alpha1
              kind: AttunePolicy
              metadata:
                name: hpa-conflict-test
                namespace: e2e-hpa-conflict
              status:
                workloads:
                  discovered: 1
  catch:
    - describe:
        apiVersion: attune.io/v1alpha1
        kind: AttunePolicy
        namespace: e2e-hpa-conflict
    - describe:
        apiVersion: autoscaling/v2
        kind: HorizontalPodAutoscaler
        namespace: e2e-hpa-conflict
    - podLogs:
        namespace: attune-system
        selector: app.kubernetes.io/name=attune

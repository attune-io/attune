apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: health-probes
spec:
  description: Verify that the operator health and readiness endpoints return 200
  timeouts:
    apply: 30s
    assert: 1m
    delete: 30s
  steps:
    - name: check-health-endpoints
      try:
        - script:
            timeout: 60s
            content: |
              # Use wget (available in distroless/static via busybox) or port-forward
              POD=$(kubectl get pods -n kube-rightsize-system -l app.kubernetes.io/name=kube-rightsize \
                -o jsonpath='{.items[0].metadata.name}')
              echo "Operator pod: ${POD}"
              # Port-forward and curl from localhost
              kubectl port-forward -n kube-rightsize-system "pod/${POD}" 18081:8081 &
              PF_PID=$!
              sleep 2
              curl -sf http://localhost:18081/healthz && echo "healthz OK"
              curl -sf http://localhost:18081/readyz && echo "readyz OK"
              kill $PF_PID 2>/dev/null || true
              echo "Health probes OK"
      catch:
        - script:
            content: |
              kubectl logs -n kube-rightsize-system -l app.kubernetes.io/name=kube-rightsize --tail=20
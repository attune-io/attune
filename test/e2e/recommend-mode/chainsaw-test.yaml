apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: recommend-mode
spec:
  description: Verify that a RightSizePolicy in Recommend mode discovers workloads and reaches Ready condition
  timeouts:
    apply: 30s
    assert: 2m
    delete: 30s
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-recommend-mode
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: test-app
                namespace: e2e-recommend-mode
                labels:
                  app: test-app
                  tier: api
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: test-app
                template:
                  metadata:
                    labels:
                      app: test-app
                      tier: api
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resources:
                          requests:
                            cpu: 500m
                            memory: 512Mi
                          limits:
                            cpu: "1"
                            memory: 1Gi
        - apply:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: recommend-test
                namespace: e2e-recommend-mode
              spec:
                targetRef:
                  kind: Deployment
                  selector:
                    matchLabels:
                      tier: api
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:9090
                  historyWindow: 7d
                  minimumDataPoints: 1
                cpu:
                  percentile: 95
                  safetyMargin: "1.2"
                  bounds:
                    min: 50m
                    max: "4000m"
                  controlledValues: RequestsAndLimits
                memory:
                  percentile: 99
                  safetyMargin: "1.3"
                  bounds:
                    min: 64Mi
                    max: 8Gi
                  controlledValues: RequestsAndLimits
                updateStrategy:
                  mode: Recommend
                  cooldown: 1h
    - name: verify-deployment-ready
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: test-app
                namespace: e2e-recommend-mode
              status:
                readyReplicas: 1
    - name: verify-status
      try:
        - assert:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: recommend-test
                namespace: e2e-recommend-mode
              status:
                conditions:
                  - type: Ready
                    status: "True"
                workloads:
                  (discovered >= `1`): true
  catch:
    - describe:
        apiVersion: rightsize.io/v1alpha1
        kind: RightSizePolicy
        namespace: e2e-recommend-mode
    - describe:
        apiVersion: apps/v1
        kind: Deployment
        namespace: e2e-recommend-mode
    - podLogs:
        namespace: e2e-recommend-mode
        selector: app=test-app
  finally:
    - delete:
        ref:
          apiVersion: v1
          kind: Namespace
          name: e2e-recommend-mode

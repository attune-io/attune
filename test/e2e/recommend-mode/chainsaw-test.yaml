apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: recommend-mode
spec:
  description: Verify that an AttunePolicy in Recommend mode discovers workloads and reaches Ready condition
  timeouts:
    apply: 30s
    assert: 2m
    delete: 30s
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-recommend-mode
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: test-app
                namespace: e2e-recommend-mode
                labels:
                  app: test-app
                  tier: api
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: test-app
                template:
                  metadata:
                    labels:
                      app: test-app
                      tier: api
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resources:
                          requests:
                            cpu: 500m
                            memory: 512Mi
                          limits:
                            cpu: "1"
                            memory: 1Gi
        - apply:
            resource:
              apiVersion: attune.io/v1alpha1
              kind: AttunePolicy
              metadata:
                name: recommend-test
                namespace: e2e-recommend-mode
              spec:
                targetRef:
                  kind: Deployment
                  selector:
                    matchLabels:
                      tier: api
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                  minimumDataPoints: 1
                  historyWindow: 1h

                cpu:
                  percentile: 95
                  overhead: "20"
                  minAllowed: 50m
                  maxAllowed: "4000m"
                  controlledValues: RequestsAndLimits
                memory:
                  percentile: 99
                  overhead: "30"
                  minAllowed: 64Mi
                  maxAllowed: 8Gi
                  controlledValues: RequestsAndLimits
                updateStrategy:
                  type: Recommend
                  cooldown: 1m
    - name: verify-deployment-ready
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: test-app
                namespace: e2e-recommend-mode
              status:
                readyReplicas: 1
    - name: verify-status
      try:
        - script:
            timeout: 3m
            content: |
              # The operator may transition quickly from InsufficientData to Monitoring
              # when minimumDataPoints is 1 and Prometheus scrapes fast. Accept either
              # state as valid — both prove the policy discovered the workload and
              # the controller reconciled it.
              for i in $(seq 1 36); do
                reason=$(kubectl get attunepolicy recommend-test -n e2e-recommend-mode \
                  -o jsonpath='{.status.conditions[?(@.type=="Ready")].reason}' 2>/dev/null)
                discovered=$(kubectl get attunepolicy recommend-test -n e2e-recommend-mode \
                  -o jsonpath='{.status.workloads.discovered}' 2>/dev/null)
                if [ "$discovered" = "1" ]; then
                  if [ "$reason" = "InsufficientData" ] || [ "$reason" = "Monitoring" ]; then
                    echo "OK: workloads discovered=$discovered, Ready reason=$reason"
                    exit 0
                  fi
                fi
                echo "Waiting... discovered=$discovered reason=$reason"
                sleep 5
              done
              echo "FAIL: timed out waiting for policy to discover workloads"
              kubectl get attunepolicy recommend-test -n e2e-recommend-mode -o yaml
              exit 1
    - name: verify-no-resizes
      try:
        - assert:
            resource:
              apiVersion: attune.io/v1alpha1
              kind: AttunePolicy
              metadata:
                name: recommend-test
                namespace: e2e-recommend-mode
              status:
                workloads:
                  resized: 0
  catch:
    - describe:
        apiVersion: attune.io/v1alpha1
        kind: AttunePolicy
        namespace: e2e-recommend-mode
    - describe:
        apiVersion: apps/v1
        kind: Deployment
        namespace: e2e-recommend-mode
    - podLogs:
        namespace: attune-system
        selector: app.kubernetes.io/name=attune

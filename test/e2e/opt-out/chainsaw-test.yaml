apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: opt-out
spec:
  description: Verify that a Deployment with attune.io/skip annotation is not processed by the controller
  timeouts:
    apply: 30s
    assert: 2m
    delete: 30s
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-opt-out
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: skipped-app
                namespace: e2e-opt-out
                labels:
                  app: skipped-app
                  tier: api
                annotations:
                  attune.io/skip: "true"
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: skipped-app
                template:
                  metadata:
                    labels:
                      app: skipped-app
                      tier: api
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resources:
                          requests:
                            cpu: 500m
                            memory: 512Mi
                          limits:
                            cpu: "1"
                            memory: 1Gi
        - apply:
            resource:
              apiVersion: attune.io/v1alpha1
              kind: AttunePolicy
              metadata:
                name: opt-out-test
                namespace: e2e-opt-out
              spec:
                targetRef:
                  kind: Deployment
                  selector:
                    matchLabels:
                      tier: api
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                  minimumDataPoints: 1
                  historyWindow: 1h

                cpu:
                  percentile: 95
                  overhead: "20"
                  minAllowed: 50m
                  maxAllowed: "4000m"
                  controlledValues: RequestsAndLimits
                memory:
                  percentile: 99
                  overhead: "30"
                  minAllowed: 64Mi
                  maxAllowed: 8Gi
                  controlledValues: RequestsAndLimits
                updateStrategy:
                  type: Recommend
                  cooldown: 1m
    - name: verify-deployment-ready
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: skipped-app
                namespace: e2e-opt-out
              status:
                readyReplicas: 1
    - name: verify-workload-not-processed
      try:
        - script:
            timeout: 3m
            content: |
              # The policy may briefly show InsufficientData before the operator
              # processes the skip annotation. Accept either InsufficientData or
              # Monitoring — the real assertion is that discovered stays 0 (the
              # skipped workload is not counted).
              for i in $(seq 1 36); do
                reason=$(kubectl get attunepolicy opt-out-test -n e2e-opt-out \
                  -o jsonpath='{.status.conditions[?(@.type=="Ready")].reason}' 2>/dev/null)
                discovered=$(kubectl get attunepolicy opt-out-test -n e2e-opt-out \
                  -o jsonpath='{.status.workloads.discovered}' 2>/dev/null)
                if [ -n "$reason" ]; then
                  if [ "$reason" = "InsufficientData" ] || [ "$reason" = "Monitoring" ] || [ "$reason" = "NoWorkloadsFound" ]; then
                    echo "OK: discovered=$discovered, Ready reason=$reason"
                    exit 0
                  fi
                fi
                echo "Waiting... discovered=$discovered reason=$reason"
                sleep 5
              done
              echo "FAIL: timed out waiting for policy to set a Ready condition"
              kubectl get attunepolicy opt-out-test -n e2e-opt-out -o yaml
              exit 1
  catch:
    - describe:
        apiVersion: attune.io/v1alpha1
        kind: AttunePolicy
        namespace: e2e-opt-out
    - describe:
        apiVersion: apps/v1
        kind: Deployment
        namespace: e2e-opt-out
    - podLogs:
        namespace: attune-system
        selector: app.kubernetes.io/name=attune


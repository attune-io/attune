apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: query-parameters
spec:
  description: Verify that queryParameters on PrometheusConfig are accepted and do not break query execution
  timeouts:
    apply: 30s
    assert: 2m
    delete: 30s
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-query-parameters
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: qp-app
                namespace: e2e-query-parameters
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: qp-app
                template:
                  metadata:
                    labels:
                      app: qp-app
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resources:
                          requests:
                            cpu: 100m
                            memory: 128Mi
        - apply:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: qp-test
                namespace: e2e-query-parameters
              spec:
                targetRef:
                  kind: Deployment
                  name: qp-app
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                    queryParameters:
                      dedup: "true"
                      partial_response: "true"
                  minimumDataPoints: 1
                  historyWindow: 1h
                cpu:
                  percentile: 95
                  safetyMargin: "1.2"
                memory:
                  percentile: 99
                  safetyMargin: "1.3"
                updateStrategy:
                  mode: Recommend
                  cooldown: 1m
    - name: verify-deployment-ready
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: qp-app
                namespace: e2e-query-parameters
              status:
                readyReplicas: 1
    - name: verify-policy-discovers-workload
      try:
        - assert:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: qp-test
                namespace: e2e-query-parameters
              status:
                workloads:
                  discovered: 1
  catch:
    - describe:
        apiVersion: rightsize.io/v1alpha1
        kind: RightSizePolicy
        namespace: e2e-query-parameters
    - podLogs:
        namespace: kube-rightsize-system
        selector: app.kubernetes.io/name=kube-rightsize

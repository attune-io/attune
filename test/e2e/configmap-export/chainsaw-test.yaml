apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: configmap-export
spec:
  description: Verify that recommendations are exported to a ConfigMap when export.configMap is enabled
  timeouts:
    apply: 30s
    assert: 3m
    delete: 30s
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-configmap-export
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: export-app
                namespace: e2e-configmap-export
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: export-app
                template:
                  metadata:
                    labels:
                      app: export-app
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resources:
                          requests:
                            cpu: 100m
                            memory: 128Mi
        - apply:
            resource:
              apiVersion: attune.io/v1alpha1
              kind: AttunePolicy
              metadata:
                name: export-test
                namespace: e2e-configmap-export
              spec:
                targetRef:
                  kind: Deployment
                  name: export-app
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                  minimumDataPoints: 1
                  historyWindow: 1h
                cpu:
                  percentile: 95
                  overhead: "20"
                memory:
                  percentile: 99
                  overhead: "30"
                updateStrategy:
                  type: Recommend
                  cooldown: 1m
                  export:
                    configMap: true
    - name: verify-deployment-ready
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: export-app
                namespace: e2e-configmap-export
              status:
                readyReplicas: 1
    - name: verify-configmap-created
      try:
        - script:
            timeout: 3m
            content: |
              for i in $(seq 1 36); do
                CM=$(kubectl get configmap -n e2e-configmap-export \
                  -l attune.io/policy=export-test \
                  -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
                if [ -n "$CM" ]; then
                  echo "ConfigMap found: $CM"
                  # Verify it has recommendation data keys
                  DATA=$(kubectl get configmap "$CM" -n e2e-configmap-export -o json)
                  if echo "$DATA" | grep -q "confidence"; then
                    echo "ConfigMap contains recommendation data"
                    # Verify owner reference
                    OWNER=$(echo "$DATA" | python3 -c "import sys,json; d=json.load(sys.stdin); refs=d.get('metadata',{}).get('ownerReferences',[]); print(refs[0]['kind'] if refs else '')" 2>/dev/null)
                    if [ "$OWNER" = "AttunePolicy" ]; then
                      echo "OwnerReference set correctly"
                    fi
                    exit 0
                  fi
                fi
                sleep 5
              done
              echo "No recommendation ConfigMap found"
              kubectl get configmap -n e2e-configmap-export -o yaml
              kubectl get attunepolicy export-test -n e2e-configmap-export -o yaml
              exit 1
  catch:
    - describe:
        apiVersion: attune.io/v1alpha1
        kind: AttunePolicy
        namespace: e2e-configmap-export
    - podLogs:
        namespace: attune-system
        selector: app.kubernetes.io/name=attune

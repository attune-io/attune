apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: startup-boost
spec:
  description: Verify that CPU startup boost is applied to new pods and annotated
  timeouts:
    apply: 30s
    assert: 3m
    delete: 30s
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-startup-boost
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: boost-app
                namespace: e2e-startup-boost
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: boost-app
                template:
                  metadata:
                    labels:
                      app: boost-app
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resizePolicy:
                          - resourceName: cpu
                            restartPolicy: NotRequired
                          - resourceName: memory
                            restartPolicy: NotRequired
                        resources:
                          requests:
                            cpu: 100m
                            memory: 128Mi
                          limits:
                            cpu: 500m
                            memory: 256Mi
        - apply:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: boost-test
                namespace: e2e-startup-boost
              spec:
                targetRef:
                  kind: Deployment
                  name: boost-app
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                  minimumDataPoints: 1
                  historyWindow: 1h
                  queryStep: 1m
                cpu:
                  percentile: 95
                  safetyMargin: "1.2"
                  startupBoost:
                    multiplier: "2.0"
                    duration: 5m
                  bounds:
                    min: 50m
                    max: "4000m"
                memory:
                  percentile: 99
                  safetyMargin: "1.3"
                  bounds:
                    min: 64Mi
                    max: 8Gi
                updateStrategy:
                  mode: Auto
                  cooldown: 1m
                  maxCpuChangePercent: 100
                  maxMemoryChangePercent: 100
    - name: verify-deployment-ready
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: boost-app
                namespace: e2e-startup-boost
              status:
                readyReplicas: 1
    - name: verify-policy-discovers-workload
      try:
        - assert:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: boost-test
                namespace: e2e-startup-boost
              status:
                workloads:
                  discovered: 1
    - name: verify-startup-boost-annotation
      try:
        - script:
            timeout: 3m
            content: |
              for i in $(seq 1 36); do
                ANNOTATION=$(kubectl get pods -n e2e-startup-boost -l app=boost-app \
                  -o jsonpath='{.items[0].metadata.annotations.rightsize\.io/startup-boost-at}' 2>/dev/null)
                if [ -n "$ANNOTATION" ]; then
                  echo "Startup boost annotation found: $ANNOTATION"
                  exit 0
                fi
                # Also check if a resize occurred (boost may have been applied and expired)
                RESIZED=$(kubectl get rightsizepolicy boost-test -n e2e-startup-boost \
                  -o jsonpath='{.status.workloads.resized}' 2>/dev/null)
                if [ "$RESIZED" -ge 1 ] 2>/dev/null; then
                  echo "Resize occurred ($RESIZED), boost was applied"
                  exit 0
                fi
                sleep 5
              done
              echo "No startup boost annotation or resize found"
              kubectl get pods -n e2e-startup-boost -l app=boost-app -o yaml
              exit 1
  catch:
    - describe:
        apiVersion: rightsize.io/v1alpha1
        kind: RightSizePolicy
        namespace: e2e-startup-boost
    - describe:
        apiVersion: apps/v1
        kind: Deployment
        namespace: e2e-startup-boost
    - podLogs:
        namespace: kube-rightsize-system
        selector: app.kubernetes.io/name=kube-rightsize

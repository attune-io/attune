apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: daemonset-target
spec:
  description: Verify that a AttunePolicy can target a DaemonSet workload
  timeouts:
    apply: 30s
    assert: 2m
    delete: 30s
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-daemonset-target
        - apply:
            resource:
              apiVersion: apps/v1
              kind: DaemonSet
              metadata:
                name: log-agent
                namespace: e2e-daemonset-target
                labels:
                  app: log-agent
              spec:
                selector:
                  matchLabels:
                    app: log-agent
                template:
                  metadata:
                    labels:
                      app: log-agent
                  spec:
                    containers:
                      - name: agent
                        image: registry.k8s.io/pause:3.9
                        resources:
                          requests:
                            cpu: 100m
                            memory: 128Mi
                          limits:
                            cpu: 200m
                            memory: 256Mi
        - apply:
            resource:
              apiVersion: attune.io/v1alpha1
              kind: AttunePolicy
              metadata:
                name: daemonset-test
                namespace: e2e-daemonset-target
              spec:
                targetRef:
                  kind: DaemonSet
                  name: log-agent
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                  minimumDataPoints: 1
                  historyWindow: 1h
                cpu:
                  percentile: 95
                  overhead: "20"
                memory:
                  percentile: 99
                  overhead: "30"
                updateStrategy:
                  type: Recommend
                  cooldown: 1m
    - name: verify-daemonset-ready
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: DaemonSet
              metadata:
                name: log-agent
                namespace: e2e-daemonset-target
              status:
                numberReady: 1
    - name: verify-policy-discovers-workload
      try:
        - assert:
            resource:
              apiVersion: attune.io/v1alpha1
              kind: AttunePolicy
              metadata:
                name: daemonset-test
                namespace: e2e-daemonset-target
              status:
                workloads:
                  discovered: 1
  catch:
    - describe:
        apiVersion: attune.io/v1alpha1
        kind: AttunePolicy
        namespace: e2e-daemonset-target
    - describe:
        apiVersion: apps/v1
        kind: DaemonSet
        namespace: e2e-daemonset-target
    - podLogs:
        namespace: attune-system
        selector: app.kubernetes.io/name=attune

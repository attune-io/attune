apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: statefulset-target
spec:
  description: Verify that an AttunePolicy can target a StatefulSet workload
  timeouts:
    apply: 30s
    assert: 2m
    delete: 30s
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-statefulset-target
        - apply:
            resource:
              apiVersion: apps/v1
              kind: StatefulSet
              metadata:
                name: db
                namespace: e2e-statefulset-target
                labels:
                  app: db
              spec:
                serviceName: db
                replicas: 1
                selector:
                  matchLabels:
                    app: db
                template:
                  metadata:
                    labels:
                      app: db
                  spec:
                    containers:
                      - name: postgres
                        image: registry.k8s.io/pause:3.9
                        resources:
                          requests:
                            cpu: 500m
                            memory: 1Gi
                          limits:
                            cpu: "2"
                            memory: 2Gi
        - apply:
            resource:
              apiVersion: attune.io/v1alpha1
              kind: AttunePolicy
              metadata:
                name: statefulset-test
                namespace: e2e-statefulset-target
              spec:
                targetRef:
                  kind: StatefulSet
                  name: db
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                  minimumDataPoints: 1
                  historyWindow: 1h
                cpu:
                  percentile: 95
                  overhead: "20"
                memory:
                  percentile: 99
                  overhead: "30"
                  allowDecrease: false
                updateStrategy:
                  type: Recommend
                  cooldown: 1m
    - name: verify-statefulset-ready
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: StatefulSet
              metadata:
                name: db
                namespace: e2e-statefulset-target
              status:
                readyReplicas: 1
    - name: verify-policy-discovers-workload
      try:
        - assert:
            resource:
              apiVersion: attune.io/v1alpha1
              kind: AttunePolicy
              metadata:
                name: statefulset-test
                namespace: e2e-statefulset-target
              status:
                workloads:
                  discovered: 1
  catch:
    - describe:
        apiVersion: attune.io/v1alpha1
        kind: AttunePolicy
        namespace: e2e-statefulset-target
    - describe:
        apiVersion: apps/v1
        kind: StatefulSet
        namespace: e2e-statefulset-target
    - podLogs:
        namespace: attune-system
        selector: app.kubernetes.io/name=attune

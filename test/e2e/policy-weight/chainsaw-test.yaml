apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: policy-weight
spec:
  description: Verify that a higher-weight policy takes precedence over a lower-weight policy on the same workload
  timeouts:
    apply: 30s
    assert: 2m
    delete: 30s
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-policy-weight
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: weight-app
                namespace: e2e-policy-weight
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: weight-app
                template:
                  metadata:
                    labels:
                      app: weight-app
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resources:
                          requests:
                            cpu: 100m
                            memory: 128Mi
                          limits:
                            cpu: 200m
                            memory: 256Mi
        - apply:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: high-weight
                namespace: e2e-policy-weight
              spec:
                targetRef:
                  kind: Deployment
                  name: weight-app
                weight: 200
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                  minimumDataPoints: 1
                  historyWindow: 1h
                cpu:
                  percentile: 95
                  safetyMargin: "1.2"
                memory:
                  percentile: 99
                  safetyMargin: "1.3"
                updateStrategy:
                  mode: Recommend
                  cooldown: 1m
        - apply:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: low-weight
                namespace: e2e-policy-weight
              spec:
                targetRef:
                  kind: Deployment
                  name: weight-app
                weight: 50
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                  minimumDataPoints: 1
                  historyWindow: 1h
                cpu:
                  percentile: 95
                  safetyMargin: "1.2"
                memory:
                  percentile: 99
                  safetyMargin: "1.3"
                updateStrategy:
                  mode: Recommend
                  cooldown: 1m
    - name: verify-high-weight-discovers
      try:
        - assert:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: high-weight
                namespace: e2e-policy-weight
              status:
                workloads:
                  discovered: 1
    - name: verify-low-weight-skips
      try:
        - assert:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: low-weight
                namespace: e2e-policy-weight
              status:
                workloads:
                  discovered: 1
  catch:
    - describe:
        apiVersion: rightsize.io/v1alpha1
        kind: RightSizePolicy
        namespace: e2e-policy-weight
    - podLogs:
        namespace: kube-rightsize-system
        selector: app.kubernetes.io/name=kube-rightsize

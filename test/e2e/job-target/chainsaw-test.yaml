apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: job-target
spec:
  description: Verify that a AttunePolicy targeting a standalone Job discovers it
  timeouts:
    apply: 30s
    assert: 2m
    delete: 30s
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-job-target
        - apply:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                name: data-import
                namespace: e2e-job-target
              spec:
                template:
                  spec:
                    containers:
                      - name: worker
                        image: registry.k8s.io/pause:3.9
                        resources:
                          requests:
                            cpu: 500m
                            memory: 512Mi
                          limits:
                            cpu: "1"
                            memory: 1Gi
                    restartPolicy: Never
                backoffLimit: 0
        - apply:
            resource:
              apiVersion: attune.io/v1alpha1
              kind: AttunePolicy
              metadata:
                name: job-test
                namespace: e2e-job-target
              spec:
                targetRef:
                  kind: Job
                  name: data-import
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                  minimumDataPoints: 1
                  historyWindow: 1h
                cpu:
                  percentile: 95
                  overhead: "20"
                memory:
                  percentile: 99
                  overhead: "30"
                updateStrategy:
                  type: Recommend
                  cooldown: 1m
    - name: verify-policy-discovers-job
      try:
        - assert:
            resource:
              apiVersion: attune.io/v1alpha1
              kind: AttunePolicy
              metadata:
                name: job-test
                namespace: e2e-job-target
              status:
                workloads:
                  discovered: 1
  catch:
    - describe:
        apiVersion: attune.io/v1alpha1
        kind: AttunePolicy
        namespace: e2e-job-target
    - podLogs:
        namespace: attune-system
        selector: app.kubernetes.io/name=attune

apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: requests-only
spec:
  description: Verify that a RightSizePolicy with controlledValues RequestsOnly is accepted and reconciles
  timeouts:
    apply: 30s
    assert: 2m
    delete: 30s
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-requests-only
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: reqonly-app
                namespace: e2e-requests-only
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: reqonly-app
                template:
                  metadata:
                    labels:
                      app: reqonly-app
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resources:
                          requests:
                            cpu: 500m
                            memory: 512Mi
                          limits:
                            cpu: 500m
                            memory: 512Mi
        - apply:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: reqonly-test
                namespace: e2e-requests-only
              spec:
                targetRef:
                  kind: Deployment
                  name: reqonly-app
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                  minimumDataPoints: 1
                  historyWindow: 1h
                cpu:
                  percentile: 95
                  safetyMargin: "1.2"
                  controlledValues: RequestsOnly
                memory:
                  percentile: 99
                  safetyMargin: "1.3"
                  controlledValues: RequestsOnly
                updateStrategy:
                  mode: Recommend
                  cooldown: 1m
    - name: verify-deployment-ready
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: reqonly-app
                namespace: e2e-requests-only
              status:
                readyReplicas: 1
    - name: verify-policy-reconciles
      try:
        - assert:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: reqonly-test
                namespace: e2e-requests-only
              status:
                conditions:
                  - type: Ready
                workloads:
                  discovered: 1
  catch:
    - describe:
        apiVersion: rightsize.io/v1alpha1
        kind: RightSizePolicy
        namespace: e2e-requests-only
    - podLogs:
        namespace: kube-rightsize-system
        selector: app.kubernetes.io/name=kube-rightsize

apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: webhook-defaulting
spec:
  description: >-
    Verify that the mutating webhook applies the weight default and that
    the API server accepts a minimal policy with all other fields omitted
    (those are defaulted by the controller at reconcile time, not the webhook).
  timeouts:
    apply: 30s
    assert: 30s
    delete: 30s
  steps:
    - name: create-namespace
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-webhook-defaulting
    - name: create-minimal-policy
      try:
        - apply:
            resource:
              apiVersion: attune.io/v1alpha1
              kind: AttunePolicy
              metadata:
                name: minimal-policy
                namespace: e2e-webhook-defaulting
              spec:
                targetRef:
                  kind: Deployment
                  name: my-app
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                cpu:
                  percentile: 95
                memory:
                  percentile: 99
    - name: verify-webhook-default-applied
      try:
        - assert:
            resource:
              apiVersion: attune.io/v1alpha1
              kind: AttunePolicy
              metadata:
                name: minimal-policy
                namespace: e2e-webhook-defaulting
              spec:
                # Weight is the only field the webhook still defaults.
                weight: 100
  catch:
    - describe:
        apiVersion: attune.io/v1alpha1
        kind: AttunePolicy
        namespace: e2e-webhook-defaulting

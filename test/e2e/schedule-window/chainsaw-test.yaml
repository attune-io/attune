apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: schedule-window
spec:
  description: Verify that a RightSizePolicy with schedule windows is accepted and discovers workloads
  timeouts:
    apply: 30s
    assert: 2m
    delete: 30s
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-schedule-window
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: scheduled-app
                namespace: e2e-schedule-window
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: scheduled-app
                template:
                  metadata:
                    labels:
                      app: scheduled-app
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resources:
                          requests:
                            cpu: 100m
                            memory: 128Mi
                          limits:
                            cpu: 200m
                            memory: 256Mi
        - apply:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: schedule-test
                namespace: e2e-schedule-window
              spec:
                targetRef:
                  kind: Deployment
                  name: scheduled-app
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                  minimumDataPoints: 1
                  historyWindow: 1h
                cpu:
                  percentile: 95
                  safetyMargin: "1.2"
                memory:
                  percentile: 99
                  safetyMargin: "1.3"
                updateStrategy:
                  mode: Auto
                  cooldown: 1m
                  schedule:
                    windows:
                      - start: "00:00"
                        end: "23:59"
                    daysOfWeek:
                      - Monday
                      - Tuesday
                      - Wednesday
                      - Thursday
                      - Friday
                      - Saturday
                      - Sunday
                    timezone: UTC
    - name: verify-deployment-ready
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: scheduled-app
                namespace: e2e-schedule-window
              status:
                readyReplicas: 1
    - name: verify-policy-reconciles
      try:
        - assert:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: schedule-test
                namespace: e2e-schedule-window
              status:
                workloads:
                  discovered: 1
  catch:
    - describe:
        apiVersion: rightsize.io/v1alpha1
        kind: RightSizePolicy
        namespace: e2e-schedule-window
    - podLogs:
        namespace: kube-rightsize-system
        selector: app.kubernetes.io/name=kube-rightsize

apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: schedule-window
spec:
  description: Verify that a RightSizePolicy with a schedule excluding today blocks resizes
  timeouts:
    apply: 30s
    assert: 2m
    delete: 30s
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-schedule-window
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: scheduled-app
                namespace: e2e-schedule-window
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: scheduled-app
                template:
                  metadata:
                    labels:
                      app: scheduled-app
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resizePolicy:
                          - resourceName: cpu
                            restartPolicy: NotRequired
                          - resourceName: memory
                            restartPolicy: NotRequired
                        resources:
                          requests:
                            cpu: 500m
                            memory: 256Mi
                          limits:
                            cpu: 1000m
                            memory: 512Mi
        - script:
            timeout: 30s
            content: |
              # Build daysOfWeek list excluding today so the window blocks resizes.
              TODAY=$(date -u +%A)
              ALL_DAYS="Monday Tuesday Wednesday Thursday Friday Saturday Sunday"
              DAYS_YAML=""
              for d in $ALL_DAYS; do
                if [ "$d" != "$TODAY" ]; then
                  DAYS_YAML="${DAYS_YAML}        - ${d}
              "
                fi
              done
              cat <<EOF | kubectl apply -f -
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: schedule-test
                namespace: e2e-schedule-window
              spec:
                targetRef:
                  kind: Deployment
                  name: scheduled-app
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                  minimumDataPoints: 1
                  historyWindow: 1h
                cpu:
                  percentile: 95
                  safetyMargin: "1.2"
                memory:
                  percentile: 99
                  safetyMargin: "1.3"
                  allowDecrease: true
                updateStrategy:
                  mode: Auto
                  cooldown: 1m
                  maxCpuChangePercent: 100
                  maxMemoryChangePercent: 100
                  schedule:
                    windows:
                      - start: "00:00"
                        end: "23:59"
                    daysOfWeek:
              ${DAYS_YAML}      timezone: UTC
              EOF
              echo "Created policy with today ($TODAY) excluded from schedule"
    - name: verify-deployment-ready
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: scheduled-app
                namespace: e2e-schedule-window
              status:
                readyReplicas: 1
    - name: verify-policy-discovers-but-no-resize
      try:
        - script:
            timeout: 3m
            content: |
              # Wait for discovery, then verify no resize occurs.
              for i in $(seq 1 24); do
                DISC=$(kubectl get rightsizepolicy schedule-test -n e2e-schedule-window \
                  -o jsonpath='{.status.workloads.discovered}' 2>/dev/null)
                if [ "$DISC" = "1" ]; then
                  echo "Policy discovered workload"
                  break
                fi
                sleep 5
              done
              # Wait two full reconcile cycles (cooldown 1m) to confirm no resize.
              echo "Waiting 130s for two reconcile cycles..."
              sleep 130
              RESIZED=$(kubectl get rightsizepolicy schedule-test -n e2e-schedule-window \
                -o jsonpath='{.status.workloads.resized}' 2>/dev/null)
              if [ "$RESIZED" = "0" ] || [ -z "$RESIZED" ]; then
                echo "Schedule window correctly blocked resizes (resized=$RESIZED)"
                exit 0
              fi
              echo "FAIL: resize occurred despite today being excluded from schedule (resized=$RESIZED)"
              kubectl get rightsizepolicy schedule-test -n e2e-schedule-window -o yaml
              exit 1
  catch:
    - describe:
        apiVersion: rightsize.io/v1alpha1
        kind: RightSizePolicy
        namespace: e2e-schedule-window
    - podLogs:
        namespace: kube-rightsize-system
        selector: app.kubernetes.io/name=kube-rightsize

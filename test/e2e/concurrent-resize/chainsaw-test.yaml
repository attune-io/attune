apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: concurrent-resize
spec:
  description: Verify that a RightSizePolicy with maxConcurrentResizes is accepted and discovers workloads
  timeouts:
    apply: 30s
    assert: 2m
    delete: 30s
  steps:
    - name: create-deployment
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-concurrent-resize
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: concurrent-app
                namespace: e2e-concurrent-resize
              spec:
                replicas: 5
                selector:
                  matchLabels:
                    app: concurrent-app
                template:
                  metadata:
                    labels:
                      app: concurrent-app
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resizePolicy:
                          - resourceName: cpu
                            restartPolicy: NotRequired
                          - resourceName: memory
                            restartPolicy: NotRequired
                        resources:
                          requests:
                            cpu: 100m
                            memory: 128Mi
                          limits:
                            cpu: 200m
                            memory: 256Mi
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: concurrent-app
                namespace: e2e-concurrent-resize
              status:
                readyReplicas: 5
    - name: wait-for-metrics
      try:
        - script:
            timeout: 2m
            content: |
              PROM_POD=$(kubectl get pods -n monitoring -l app.kubernetes.io/name=prometheus,app.kubernetes.io/component=server -o name | head -1)
              NS="e2e-concurrent-resize"
              ENCODED_QUERY="container_cpu_usage_seconds_total%7Bnamespace%3D%22${NS}%22%2Ccontainer%21%3D%22%22%7D"
              for i in $(seq 1 24); do
                result=$(kubectl exec -n monitoring "$PROM_POD" -- \
                  wget -qO- "http://localhost:9090/api/v1/query?query=${ENCODED_QUERY}" 2>/dev/null || true)
                if echo "$result" | grep -q '"result":\[{'; then
                  echo "cAdvisor metrics available for namespace $NS after ${i}x5s"
                  exit 0
                fi
                sleep 5
              done
              echo "WARNING: No cAdvisor metrics for $NS after 120s, proceeding"
    - name: create-policy
      try:
        - apply:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: concurrent-test
                namespace: e2e-concurrent-resize
              spec:
                targetRef:
                  kind: Deployment
                  name: concurrent-app
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                  minimumDataPoints: 1
                  historyWindow: 1h
                  queryStep: 1m
                  rateWindow: 5m
                cpu:
                  percentile: 95
                  overhead: "20"
                  maxChangePercent: 100
                memory:
                  percentile: 99
                  overhead: "30"
                  allowDecrease: true
                  maxChangePercent: 100
                updateStrategy:
                  type: Auto
                  cooldown: 1m
                  maxConcurrentResizes: 3
    - name: verify-policy-reconciles
      try:
        - assert:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: concurrent-test
                namespace: e2e-concurrent-resize
              status:
                workloads:
                  discovered: 1
    - name: verify-resize-occurred
      try:
        - script:
            timeout: 5m
            content: |
              for i in $(seq 1 60); do
                RESIZED=$(kubectl get rightsizepolicy concurrent-test -n e2e-concurrent-resize \
                  -o jsonpath='{.status.workloads.resized}' 2>/dev/null)
                if [ "$RESIZED" -ge 1 ] 2>/dev/null; then
                  echo "Concurrent resize confirmed: $RESIZED workload(s) resized"
                  exit 0
                fi
                sleep 5
              done
              echo "No resize occurred within timeout"
              kubectl get rightsizepolicy concurrent-test -n e2e-concurrent-resize -o yaml
              exit 1
  catch:
    - describe:
        apiVersion: rightsize.io/v1alpha1
        kind: RightSizePolicy
        namespace: e2e-concurrent-resize
    - podLogs:
        namespace: kube-rightsize-system
        selector: app.kubernetes.io/name=kube-rightsize

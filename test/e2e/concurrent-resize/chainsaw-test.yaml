apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: concurrent-resize
spec:
  description: Verify that a RightSizePolicy with maxConcurrentResizes is accepted and discovers workloads
  timeouts:
    apply: 30s
    assert: 2m
    delete: 30s
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-concurrent-resize
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: concurrent-app
                namespace: e2e-concurrent-resize
              spec:
                replicas: 5
                selector:
                  matchLabels:
                    app: concurrent-app
                template:
                  metadata:
                    labels:
                      app: concurrent-app
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resizePolicy:
                          - resourceName: cpu
                            restartPolicy: NotRequired
                          - resourceName: memory
                            restartPolicy: NotRequired
                        resources:
                          requests:
                            cpu: 100m
                            memory: 128Mi
                          limits:
                            cpu: 200m
                            memory: 256Mi
        - apply:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: concurrent-test
                namespace: e2e-concurrent-resize
              spec:
                targetRef:
                  kind: Deployment
                  name: concurrent-app
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                  minimumDataPoints: 1
                  historyWindow: 1h
                cpu:
                  percentile: 95
                  safetyMargin: "1.2"
                memory:
                  percentile: 99
                  safetyMargin: "1.3"
                  allowDecrease: true
                updateStrategy:
                  mode: Auto
                  cooldown: 1m
                  maxCpuChangePercent: 100
                  maxMemoryChangePercent: 100
                  maxConcurrentResizes: 3
    - name: verify-deployment-ready
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: concurrent-app
                namespace: e2e-concurrent-resize
              status:
                readyReplicas: 5
    - name: verify-policy-reconciles
      try:
        - assert:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: concurrent-test
                namespace: e2e-concurrent-resize
              status:
                workloads:
                  discovered: 1
    - name: verify-resize-occurred
      try:
        - script:
            timeout: 5m
            content: |
              for i in $(seq 1 60); do
                RESIZED=$(kubectl get rightsizepolicy concurrent-test -n e2e-concurrent-resize \
                  -o jsonpath='{.status.workloads.resized}' 2>/dev/null)
                if [ "$RESIZED" -ge 1 ] 2>/dev/null; then
                  echo "Concurrent resize confirmed: $RESIZED workload(s) resized"
                  exit 0
                fi
                sleep 5
              done
              echo "No resize occurred within timeout"
              kubectl get rightsizepolicy concurrent-test -n e2e-concurrent-resize -o yaml
              exit 1
  catch:
    - describe:
        apiVersion: rightsize.io/v1alpha1
        kind: RightSizePolicy
        namespace: e2e-concurrent-resize
    - podLogs:
        namespace: kube-rightsize-system
        selector: app.kubernetes.io/name=kube-rightsize

apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: defaults-merge
spec:
  description: Verify that RightSizeDefaults values are merged into a policy that omits them
  timeouts:
    apply: 60s
    assert: 2m
    delete: 30s
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-defaults-merge
        - apply:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizeDefaults
              metadata:
                name: e2e-defaults
              spec:
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                cpu:
                  percentile: 90
                  overhead: "50"
                memory:
                  percentile: 95
                  overhead: "40"
                updateStrategy:
                  type: Recommend
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: defaults-app
                namespace: e2e-defaults-merge
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: defaults-app
                template:
                  metadata:
                    labels:
                      app: defaults-app
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resources:
                          requests:
                            cpu: 100m
                            memory: 128Mi
                          limits:
                            cpu: 200m
                            memory: 256Mi
        - apply:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: inherits-defaults
                namespace: e2e-defaults-merge
              spec:
                targetRef:
                  kind: Deployment
                  name: defaults-app
                metricsSource:
                  minimumDataPoints: 1
                  historyWindow: 1h
                # prometheus.address intentionally omitted: inherited from RightSizeDefaults
                cpu:
                  percentile: 95
                  overhead: "20"
                memory:
                  percentile: 99
                  overhead: "30"
                # type intentionally omitted: inherited from RightSizeDefaults (Recommend)
                updateStrategy:
                  cooldown: 1m
    - name: verify-policy-reconciles
      try:
        - assert:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: inherits-defaults
                namespace: e2e-defaults-merge
              status:
                workloads:
                  discovered: 1
    - name: verify-type-inherited
      description: Verify that type was inherited from defaults (Recommend) by checking the status condition
      try:
        - script:
            timeout: 2m
            content: |
              for i in $(seq 1 24); do
                REASON=$(kubectl get rightsizepolicy inherits-defaults -n e2e-defaults-merge \
                  -o jsonpath='{.status.conditions[?(@.type=="Ready")].reason}' 2>/dev/null)
                if [ "$REASON" = "InsufficientData" ] || [ "$REASON" = "Monitoring" ]; then
                  echo "Policy is in Recommend type (reason: $REASON)"
                  # Verify the policy spec does NOT have type set (it was inherited)
                  TYPE=$(kubectl get rightsizepolicy inherits-defaults -n e2e-defaults-merge \
                    -o jsonpath='{.spec.updateStrategy.type}' 2>/dev/null)
                  echo "Spec type value: '$TYPE'"
                  exit 0
                fi
                sleep 5
              done
              echo "Timed out waiting for Ready condition"
              kubectl get rightsizepolicy inherits-defaults -n e2e-defaults-merge -o yaml
              exit 1
  catch:
    - describe:
        apiVersion: rightsize.io/v1alpha1
        kind: RightSizePolicy
        namespace: e2e-defaults-merge
    - describe:
        apiVersion: rightsize.io/v1alpha1
        kind: RightSizeDefaults
    - podLogs:
        namespace: kube-rightsize-system
        selector: app.kubernetes.io/name=kube-rightsize
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: observe-mode
spec:
  description: Verify that an AttunePolicy in Observe mode reaches a condition without generating recommendations or performing resizes
  timeouts:
    apply: 30s
    assert: 2m
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-observe-mode
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: observe-app
                namespace: e2e-observe-mode
                labels:
                  app: observe-app
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: observe-app
                template:
                  metadata:
                    labels:
                      app: observe-app
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resources:
                          requests:
                            cpu: 500m
                            memory: 512Mi
                          limits:
                            cpu: "1"
                            memory: 1Gi
        - apply:
            resource:
              apiVersion: attune.io/v1alpha1
              kind: AttunePolicy
              metadata:
                name: observe-test
                namespace: e2e-observe-mode
              spec:
                targetRef:
                  kind: Deployment
                  name: observe-app
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                  minimumDataPoints: 1
                  historyWindow: 1h

                cpu:
                  percentile: 95
                  overhead: "20"
                memory:
                  percentile: 99
                  overhead: "30"
                updateStrategy:
                  type: Observe
                  cooldown: 1m
    - name: verify-deployment-ready
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: observe-app
                namespace: e2e-observe-mode
              status:
                readyReplicas: 1
    - name: verify-policy-has-condition
      try:
        - script:
            timeout: 3m
            content: |
              # The operator may transition quickly from InsufficientData to Monitoring
              # when minimumDataPoints is 1 and Prometheus scrapes fast. Accept either
              # state as valid — both prove the policy discovered the workload.
              for i in $(seq 1 36); do
                reason=$(kubectl get attunepolicy observe-test -n e2e-observe-mode \
                  -o jsonpath='{.status.conditions[?(@.type=="Ready")].reason}' 2>/dev/null)
                discovered=$(kubectl get attunepolicy observe-test -n e2e-observe-mode \
                  -o jsonpath='{.status.workloads.discovered}' 2>/dev/null)
                if [ "$discovered" = "1" ]; then
                  if [ "$reason" = "InsufficientData" ] || [ "$reason" = "Monitoring" ]; then
                    echo "OK: workloads discovered=$discovered, Ready reason=$reason"
                    exit 0
                  fi
                fi
                echo "Waiting... discovered=$discovered reason=$reason"
                sleep 5
              done
              echo "FAIL: timed out waiting for policy to discover workloads"
              kubectl get attunepolicy observe-test -n e2e-observe-mode -o yaml
              exit 1
    - name: verify-no-resizes
      try:
        - assert:
            resource:
              apiVersion: attune.io/v1alpha1
              kind: AttunePolicy
              metadata:
                name: observe-test
                namespace: e2e-observe-mode
              status:
                workloads:
                  resized: 0
  catch:
    - describe:
        apiVersion: attune.io/v1alpha1
        kind: AttunePolicy
        namespace: e2e-observe-mode
    - describe:
        apiVersion: apps/v1
        kind: Deployment
        namespace: e2e-observe-mode
    - podLogs:
        namespace: attune-system
        selector: app.kubernetes.io/name=attune

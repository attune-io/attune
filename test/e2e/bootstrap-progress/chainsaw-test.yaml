apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: bootstrap-progress
spec:
  description: Verify that InsufficientData status shows progress and ETA when below minimumDataPoints
  timeouts:
    apply: 30s
    assert: 2m
    delete: 30s
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-bootstrap-progress
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: bp-app
                namespace: e2e-bootstrap-progress
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: bp-app
                template:
                  metadata:
                    labels:
                      app: bp-app
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resources:
                          requests:
                            cpu: 100m
                            memory: 128Mi
        - apply:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: bp-test
                namespace: e2e-bootstrap-progress
              spec:
                targetRef:
                  kind: Deployment
                  name: bp-app
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                  minimumDataPoints: 200
                  historyWindow: 1h
                cpu:
                  percentile: 95
                  overhead: "20"
                memory:
                  percentile: 99
                  overhead: "30"
                updateStrategy:
                  type: Recommend
                  cooldown: 1m
    - name: verify-progress-message
      try:
        - script:
            timeout: 2m
            content: |
              for i in $(seq 1 24); do
                MSG=$(kubectl get rightsizepolicy bp-test -n e2e-bootstrap-progress \
                  -o jsonpath='{.status.conditions[?(@.type=="Ready")].message}' 2>/dev/null)
                if echo "$MSG" | grep -q "Collecting data:"; then
                  echo "Progress message found: $MSG"
                  if echo "$MSG" | grep -q "remaining"; then
                    echo "ETA present in message"
                    exit 0
                  fi
                fi
                sleep 5
              done
              echo "Timed out waiting for progress message"
              kubectl get rightsizepolicy bp-test -n e2e-bootstrap-progress -o yaml
              exit 1
  catch:
    - describe:
        apiVersion: rightsize.io/v1alpha1
        kind: RightSizePolicy
        namespace: e2e-bootstrap-progress
    - podLogs:
        namespace: kube-rightsize-system
        selector: app.kubernetes.io/name=kube-rightsize

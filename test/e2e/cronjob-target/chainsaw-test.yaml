apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: cronjob-target
spec:
  description: Verify that a RightSizePolicy targeting a CronJob discovers it and operates in recommend-only mode
  timeouts:
    apply: 30s
    assert: 2m
    delete: 30s
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-cronjob-target
        - apply:
            resource:
              apiVersion: batch/v1
              kind: CronJob
              metadata:
                name: batch-processor
                namespace: e2e-cronjob-target
              spec:
                schedule: "*/5 * * * *"
                jobTemplate:
                  spec:
                    template:
                      spec:
                        containers:
                          - name: worker
                            image: registry.k8s.io/pause:3.9
                            resources:
                              requests:
                                cpu: 500m
                                memory: 512Mi
                              limits:
                                cpu: "1"
                                memory: 1Gi
                        restartPolicy: OnFailure
        - apply:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: cronjob-test
                namespace: e2e-cronjob-target
              spec:
                targetRef:
                  kind: CronJob
                  name: batch-processor
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                  minimumDataPoints: 1
                  historyWindow: 1h
                cpu:
                  percentile: 95
                  safetyMargin: "1.2"
                memory:
                  percentile: 99
                  safetyMargin: "1.3"
                updateStrategy:
                  mode: Recommend
                  cooldown: 1m
    - name: verify-policy-discovers-cronjob
      try:
        - assert:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: cronjob-test
                namespace: e2e-cronjob-target
              status:
                conditions:
                  - type: Ready
                workloads:
                  discovered: 1
  catch:
    - describe:
        apiVersion: rightsize.io/v1alpha1
        kind: RightSizePolicy
        namespace: e2e-cronjob-target
    - describe:
        apiVersion: batch/v1
        kind: CronJob
        namespace: e2e-cronjob-target
    - podLogs:
        namespace: kube-rightsize-system
        selector: app.kubernetes.io/name=kube-rightsize

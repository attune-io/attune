apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: multi-selector
spec:
  description: Verify that a label selector discovers multiple matching Deployments
  timeouts:
    apply: 30s
    assert: 2m
    delete: 30s
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-multi-selector
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: api-1
                namespace: e2e-multi-selector
                labels:
                  tier: api
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: api-1
                template:
                  metadata:
                    labels:
                      app: api-1
                      tier: api
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resources:
                          requests:
                            cpu: 100m
                            memory: 128Mi
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: api-2
                namespace: e2e-multi-selector
                labels:
                  tier: api
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: api-2
                template:
                  metadata:
                    labels:
                      app: api-2
                      tier: api
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resources:
                          requests:
                            cpu: 200m
                            memory: 256Mi
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: api-3
                namespace: e2e-multi-selector
                labels:
                  tier: api
              spec:
                replicas: 1
                selector:
                  matchLabels:
                    app: api-3
                template:
                  metadata:
                    labels:
                      app: api-3
                      tier: api
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resources:
                          requests:
                            cpu: 300m
                            memory: 384Mi
        - apply:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: multi-selector-test
                namespace: e2e-multi-selector
              spec:
                targetRef:
                  kind: Deployment
                  selector:
                    matchLabels:
                      tier: api
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80

                cpu:
                  percentile: 95
                  safetyMargin: "1.2"
                memory:
                  percentile: 99
                  safetyMargin: "1.3"
                updateStrategy:
                  mode: Recommend
    - name: verify-all-deployments-ready
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: api-1
                namespace: e2e-multi-selector
              status:
                readyReplicas: 1
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: api-2
                namespace: e2e-multi-selector
              status:
                readyReplicas: 1
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: api-3
                namespace: e2e-multi-selector
              status:
                readyReplicas: 1
    - name: verify-discovered-3
      try:
        - assert:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: multi-selector-test
                namespace: e2e-multi-selector
              status:
                conditions:
                  - type: Ready
                workloads:
                  discovered: 3
  catch:
    - describe:
        apiVersion: rightsize.io/v1alpha1
        kind: RightSizePolicy
        namespace: e2e-multi-selector
    - podLogs:
        namespace: kube-rightsize-system
        selector: app.kubernetes.io/name=kube-rightsize
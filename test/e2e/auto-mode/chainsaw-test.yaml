apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: auto-mode
spec:
  description: Verify that a RightSizePolicy in Auto mode discovers workloads and reaches the expected status
  timeouts:
    apply: 30s
    assert: 2m
    delete: 30s
  steps:
    - name: create-deployment
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-auto-mode
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: auto-app
                namespace: e2e-auto-mode
                labels:
                  app: auto-app
              spec:
                replicas: 2
                selector:
                  matchLabels:
                    app: auto-app
                template:
                  metadata:
                    labels:
                      app: auto-app
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resizePolicy:
                          - resourceName: cpu
                            restartPolicy: NotRequired
                          - resourceName: memory
                            restartPolicy: NotRequired
                        resources:
                          requests:
                            cpu: 250m
                            memory: 256Mi
                          limits:
                            cpu: 500m
                            memory: 512Mi
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: auto-app
                namespace: e2e-auto-mode
              status:
                readyReplicas: 2
    - name: create-policy
      try:
        - apply:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: auto-test
                namespace: e2e-auto-mode
              spec:
                targetRef:
                  kind: Deployment
                  name: auto-app
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                  minimumDataPoints: 1
                  historyWindow: 1h
                cpu:
                  percentile: 95
                  safetyMargin: "1.2"
                  bounds:
                    min: 50m
                    max: "4000m"
                memory:
                  percentile: 99
                  safetyMargin: "1.3"
                  allowDecrease: true
                  bounds:
                    min: 64Mi
                    max: 8Gi
                updateStrategy:
                  mode: Auto
                  cooldown: 1m
                  autoRevert: true
                  maxCpuChangePercent: 100
                  maxMemoryChangePercent: 100
    - name: verify-policy-status
      try:
        - script:
            timeout: 2m
            content: |
              for i in $(seq 1 24); do
                STATUS=$(kubectl get rightsizepolicy auto-test -n e2e-auto-mode \
                  -o jsonpath='{.status.workloads.discovered}' 2>/dev/null)
                if [ "$STATUS" = "1" ]; then
                  echo "Policy discovered 1 workload"
                  READY=$(kubectl get rightsizepolicy auto-test -n e2e-auto-mode \
                    -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
                  echo "Ready condition: $READY"
                  exit 0
                fi
                sleep 5
              done
              echo "Timed out waiting for policy to discover workloads"
              kubectl get rightsizepolicy auto-test -n e2e-auto-mode -o yaml
              exit 1
  catch:
    - describe:
        apiVersion: rightsize.io/v1alpha1
        kind: RightSizePolicy
        namespace: e2e-auto-mode
    - describe:
        apiVersion: apps/v1
        kind: Deployment
        namespace: e2e-auto-mode
    - podLogs:
        namespace: kube-rightsize-system
        selector: app.kubernetes.io/name=kube-rightsize

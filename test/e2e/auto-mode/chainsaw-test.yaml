apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: auto-mode
spec:
  description: Verify that a RightSizePolicy in Auto mode discovers workloads and reaches the expected status
  timeouts:
    apply: 30s
    assert: 2m
    delete: 30s
  steps:
    - name: create-resources
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-auto-mode
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: auto-app
                namespace: e2e-auto-mode
                labels:
                  app: auto-app
              spec:
                replicas: 2
                selector:
                  matchLabels:
                    app: auto-app
                template:
                  metadata:
                    labels:
                      app: auto-app
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resources:
                          requests:
                            cpu: 250m
                            memory: 256Mi
                          limits:
                            cpu: 500m
                            memory: 512Mi
        - apply:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: auto-test
                namespace: e2e-auto-mode
              spec:
                targetRef:
                  kind: Deployment
                  name: auto-app
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:9090
                  historyWindow: 168h
                  minimumDataPoints: 1
                cpu:
                  percentile: 95
                  safetyMargin: "1.2"
                  bounds:
                    min: 50m
                    max: "4000m"
                memory:
                  percentile: 99
                  safetyMargin: "1.3"
                  bounds:
                    min: 64Mi
                    max: 8Gi
                updateStrategy:
                  mode: Auto
                  cooldown: 5m
                  autoRevert: true
    - name: verify-deployment-ready
      try:
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: auto-app
                namespace: e2e-auto-mode
              status:
                readyReplicas: 2
    - name: verify-policy-status
      try:
        - assert:
            resource:
              apiVersion: rightsize.io/v1alpha1
              kind: RightSizePolicy
              metadata:
                name: auto-test
                namespace: e2e-auto-mode
              status:
                conditions:
                  - type: Ready
                    status: "False"
                    reason: InsufficientData
                workloads:
                  discovered: 1
  catch:
    - describe:
        apiVersion: rightsize.io/v1alpha1
        kind: RightSizePolicy
        namespace: e2e-auto-mode
    - describe:
        apiVersion: apps/v1
        kind: Deployment
        namespace: e2e-auto-mode
    - podLogs:
        namespace: kube-rightsize-system
        selector: control-plane=controller-manager

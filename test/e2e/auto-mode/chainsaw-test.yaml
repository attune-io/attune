apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: auto-mode
spec:
  description: Verify that a AttunePolicy in Auto mode discovers workloads and reaches the expected status
  timeouts:
    apply: 30s
    assert: 2m
    delete: 30s
  steps:
    - name: create-deployment
      try:
        - apply:
            resource:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: e2e-auto-mode
        - apply:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: auto-app
                namespace: e2e-auto-mode
                labels:
                  app: auto-app
              spec:
                replicas: 2
                selector:
                  matchLabels:
                    app: auto-app
                template:
                  metadata:
                    labels:
                      app: auto-app
                  spec:
                    containers:
                      - name: app
                        image: registry.k8s.io/pause:3.9
                        resizePolicy:
                          - resourceName: cpu
                            restartPolicy: NotRequired
                          - resourceName: memory
                            restartPolicy: NotRequired
                        resources:
                          requests:
                            cpu: 500m
                            memory: 256Mi
                          limits:
                            cpu: 1000m
                            memory: 512Mi
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: auto-app
                namespace: e2e-auto-mode
              status:
                readyReplicas: 2
    - name: wait-for-metrics
      try:
        - script:
            timeout: 2m
            content: |
              PROM_POD=$(kubectl get pods -n monitoring -l app.kubernetes.io/name=prometheus,app.kubernetes.io/component=server -o name | head -1)
              NS="e2e-auto-mode"
              ENCODED_QUERY="container_cpu_usage_seconds_total%7Bnamespace%3D%22${NS}%22%2Ccontainer%21%3D%22%22%7D"
              for i in $(seq 1 24); do
                result=$(kubectl exec -n monitoring "$PROM_POD" -- \
                  wget -qO- "http://localhost:9090/api/v1/query?query=${ENCODED_QUERY}" 2>/dev/null || true)
                if echo "$result" | grep -q '"result":\[{'; then
                  echo "cAdvisor metrics available for namespace $NS after ${i}x5s"
                  exit 0
                fi
                sleep 5
              done
              echo "WARNING: No cAdvisor metrics for $NS after 120s, proceeding"
    - name: create-policy
      try:
        - apply:
            resource:
              apiVersion: attune.io/v1alpha1
              kind: AttunePolicy
              metadata:
                name: auto-test
                namespace: e2e-auto-mode
              spec:
                targetRef:
                  kind: Deployment
                  name: auto-app
                metricsSource:
                  prometheus:
                    address: http://prometheus-server.monitoring:80
                  minimumDataPoints: 1
                  historyWindow: 1h
                  queryStep: 1m
                  rateWindow: 5m
                cpu:
                  percentile: 95
                  overhead: "20"
                  minAllowed: 50m
                  maxAllowed: "4000m"
                  maxChangePercent: 100
                memory:
                  percentile: 99
                  overhead: "30"
                  allowDecrease: true
                  minAllowed: 64Mi
                  maxAllowed: 8Gi
                  maxChangePercent: 100
                updateStrategy:
                  type: Auto
                  cooldown: 1m
                  autoRevert: true
    - name: verify-policy-status
      try:
        - script:
            timeout: 2m
            content: |
              for i in $(seq 1 24); do
                STATUS=$(kubectl get attunepolicy auto-test -n e2e-auto-mode \
                  -o jsonpath='{.status.workloads.discovered}' 2>/dev/null)
                if [ "$STATUS" = "1" ]; then
                  echo "Policy discovered 1 workload"
                  READY=$(kubectl get attunepolicy auto-test -n e2e-auto-mode \
                    -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
                  echo "Ready condition: $READY"
                  exit 0
                fi
                sleep 5
              done
              echo "Timed out waiting for policy to discover workloads"
              kubectl get attunepolicy auto-test -n e2e-auto-mode -o yaml
              exit 1
    - name: verify-resize-occurred
      try:
        - script:
            timeout: 5m
            content: |
              for i in $(seq 1 60); do
                RESIZED=$(kubectl get attunepolicy auto-test -n e2e-auto-mode \
                  -o jsonpath='{.status.workloads.resized}' 2>/dev/null)
                if [ "$RESIZED" -ge 1 ] 2>/dev/null; then
                  echo "Resize confirmed: $RESIZED pod(s) resized"
                  exit 0
                fi
                sleep 5
              done
              echo "No resize occurred within timeout"
              kubectl get attunepolicy auto-test -n e2e-auto-mode -o yaml
              exit 1
  catch:
    - describe:
        apiVersion: attune.io/v1alpha1
        kind: AttunePolicy
        namespace: e2e-auto-mode
    - describe:
        apiVersion: apps/v1
        kind: Deployment
        namespace: e2e-auto-mode
    - podLogs:
        namespace: attune-system
        selector: app.kubernetes.io/name=attune

apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: attune-validating
webhooks:
  - name: validation.attune.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: webhook-service
        namespace: system
        path: /validate-attune-io-v1alpha1-attunepolicy
    failurePolicy: Fail
    rules:
      - apiGroups: ["attune.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["attunepolicies"]
    sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: attune-mutating
webhooks:
  - name: defaulting.attune.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: webhook-service
        namespace: system
        path: /mutate-attune-io-v1alpha1-attunepolicy
    failurePolicy: Fail
    rules:
      - apiGroups: ["attune.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["attunepolicies"]
    sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1

apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: kube-rightsize-validating
webhooks:
  - name: validation.rightsize.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: webhook-service
        namespace: system
        path: /validate-rightsize-io-v1alpha1-rightsizepolicy
    failurePolicy: Fail
    rules:
      - apiGroups: ["rightsize.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["rightsizepolicies"]
    sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: kube-rightsize-mutating
webhooks:
  - name: defaulting.rightsize.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: webhook-service
        namespace: system
        path: /mutate-rightsize-io-v1alpha1-rightsizepolicy
    failurePolicy: Fail
    rules:
      - apiGroups: ["rightsize.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["rightsizepolicies"]
    sideEffects: None

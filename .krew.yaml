apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: attune
spec:
  version: "{{ .TagName }}"
  homepage: https://github.com/attune-io/attune
  shortDescription: Inspect and explain Attune pod right-sizing policies
  description: |
    The kubectl-attune plugin provides visibility into Attune, a Kubernetes
    operator for safe, in-place pod resource right-sizing. View policy status,
    savings estimates, per-container recommendations, and resize history.
  caveats: |
    Requires the Attune operator to be installed in the cluster.
  platforms:
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    {{addURIAndSha "https://github.com/attune-io/attune/releases/download/{{ .TagName }}/kubectl-attune_linux_amd64.tar.gz" .TagName }}
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    {{addURIAndSha "https://github.com/attune-io/attune/releases/download/{{ .TagName }}/kubectl-attune_linux_arm64.tar.gz" .TagName }}
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: arm
    {{addURIAndSha "https://github.com/attune-io/attune/releases/download/{{ .TagName }}/kubectl-attune_linux_arm.tar.gz" .TagName }}
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: linux
        arch: ppc64le
    {{addURIAndSha "https://github.com/attune-io/attune/releases/download/{{ .TagName }}/kubectl-attune_linux_ppc64le.tar.gz" .TagName }}
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    {{addURIAndSha "https://github.com/attune-io/attune/releases/download/{{ .TagName }}/kubectl-attune_darwin_amd64.tar.gz" .TagName }}
    bin: kubectl-attune
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    {{addURIAndSha "https://github.com/attune-io/attune/releases/download/{{ .TagName }}/kubectl-attune_darwin_arm64.tar.gz" .TagName }}
    bin: kubectl-attune

version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      k8s:
        patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/*"
      go-minor:
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /docs
    schedule:
      interval: monthly
    labels:
      - dependencies
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
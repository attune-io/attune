name: E2E Nightly

on:
  schedule:
    # Run at 3:00 AM UTC every day
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: e2e-nightly
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"
  K3D_VERSION: "v5.8.3"
  CERT_MANAGER_VERSION: "v1.17.2"
  PROMETHEUS_IMAGE: "quay.io/prometheus/prometheus:v3.4.1"

jobs:
  test-e2e:
    name: E2E (K8s ${{ matrix.k8s-version }})
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    timeout-minutes: 30
    strategy:
      max-parallel: 1
      matrix:
        include:
          - k8s-version: "v1.33"
            k3s-image: "v1.33.11-k3s1"
          - k8s-version: "v1.34"
            k3s-image: "v1.34.7-k3s1"
          - k8s-version: "v1.35"
            k3s-image: "v1.35.4-k3s1"
      fail-fast: false
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Install k3d
        shell: bash -Eeuo pipefail -x {0}
        run: |
          if command -v k3d &>/dev/null; then
            echo "k3d already installed: $(k3d version)"
          else
            curl -s https://raw.githubusercontent.com/k3d-io/k3d/${{ env.K3D_VERSION }}/install.sh | K3D_INSTALL_DIR="$HOME/.local/bin" USE_SUDO=false bash
          fi

      - name: Docker cleanup (prevent containerd lease errors)
        shell: bash -Eeuo pipefail -x {0}
        run: |
          docker builder prune -f || true
          docker system prune -f || true

      - name: Pre-pull cert-manager and Prometheus images
        shell: bash -Eeuo pipefail -x {0}
        run: |
          images=(
            "quay.io/jetstack/cert-manager-controller:${{ env.CERT_MANAGER_VERSION }}"
            "quay.io/jetstack/cert-manager-webhook:${{ env.CERT_MANAGER_VERSION }}"
            "quay.io/jetstack/cert-manager-cainjector:${{ env.CERT_MANAGER_VERSION }}"
            "${{ env.PROMETHEUS_IMAGE }}"
          )
          # Pull sequentially with retry to avoid containerd lease races
          # from concurrent pulls on self-hosted runners.
          for img in "${images[@]}"; do
            for attempt in 1 2 3; do
              if docker pull "$img"; then
                break
              fi
              echo "Pull attempt $attempt failed for $img, retrying in 5s..."
              sleep 5
            done
          done
          # Verify all images exist in the local daemon before k3d import.
          for img in "${images[@]}"; do
            docker image inspect "$img" > /dev/null
          done

      - name: Create k3d cluster
        shell: bash -Eeuo pipefail -x {0}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          k3d cluster delete e2e-${{ matrix.k8s-version }} 2>/dev/null || true
          k3d cluster create e2e-${{ matrix.k8s-version }} \
            --image rancher/k3s:${{ matrix.k3s-image }} \
            --k3s-arg "--disable=traefik,servicelb@server:*" \
            --wait --timeout 120s

      - name: Wait for node Ready
        shell: bash -Eeuo pipefail -x {0}
        run: kubectl wait --for=condition=Ready nodes --all --timeout=360s

      - name: Load cert-manager images into cluster
        shell: bash -Eeuo pipefail -x {0}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          k3d image import \
            quay.io/jetstack/cert-manager-controller:${{ env.CERT_MANAGER_VERSION }} \
            quay.io/jetstack/cert-manager-webhook:${{ env.CERT_MANAGER_VERSION }} \
            quay.io/jetstack/cert-manager-cainjector:${{ env.CERT_MANAGER_VERSION }} \
            -c e2e-${{ matrix.k8s-version }}

      - name: Install cert-manager
        shell: bash -Eeuo pipefail -x {0}
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/${{ env.CERT_MANAGER_VERSION }}/cert-manager.yaml
          kubectl wait --for=condition=Available deployment/cert-manager -n cert-manager --timeout=120s
          kubectl wait --for=condition=Available deployment/cert-manager-webhook -n cert-manager --timeout=120s
          kubectl wait --for=condition=Available deployment/cert-manager-cainjector -n cert-manager --timeout=120s

      - name: Load Prometheus image into cluster
        shell: bash -Eeuo pipefail -x {0}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          k3d image import ${{ env.PROMETHEUS_IMAGE }} -c e2e-${{ matrix.k8s-version }}

      - name: Install Prometheus
        shell: bash -Eeuo pipefail -x {0}
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update
          helm install prometheus prometheus-community/prometheus \
            --namespace monitoring --create-namespace \
            --set server.persistentVolume.enabled=false \
            --set alertmanager.enabled=false \
            --set prometheus-pushgateway.enabled=false \
            --wait --timeout 5m

      - name: Build and load operator image
        shell: bash -Eeuo pipefail -x {0}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          make docker-build IMG=kube-rightsize:e2e
          k3d image import kube-rightsize:e2e -c e2e-${{ matrix.k8s-version }}

      - name: Install operator via Helm
        shell: bash -Eeuo pipefail -x {0}
        run: |
          helm install kube-rightsize ./charts/kube-rightsize \
            --namespace kube-rightsize-system --create-namespace \
            --set image.repository=kube-rightsize \
            --set image.tag=e2e \
            --set image.pullPolicy=Never \
            --set webhooks.enabled=true \
            --set metrics.enabled=true \
            --set leaderElection.enabled=false \
            --wait --timeout 3m

      - name: Install Chainsaw
        uses: kyverno/action-install-chainsaw@1223ef75bedeb59c4e7b5455463d4316e76dff01 # v0.2.15
      - shell: bash -Eeuo pipefail -x {0}
        run: chainsaw test test/e2e/ --config .chainsaw.yaml

      - name: Run Go E2E tests
        shell: bash -Eeuo pipefail -x {0}
        env:
          E2E_NIGHTLY: "true"
        run: go test -tags=e2e ./test/e2e-go/... -race -count=1 -timeout=15m -v

      - name: Collect debug info on failure
        if: failure()
        shell: bash -Eeuo pipefail {0}
        run: |
          echo "=== cert-manager pods ==="
          kubectl get pods -n cert-manager
          echo "=== Operator logs ==="
          kubectl logs -n kube-rightsize-system -l app.kubernetes.io/name=kube-rightsize --tail=100 || true
          echo "=== Pod status ==="
          kubectl get pods -A
          echo "=== Events ==="
          kubectl get events -A --sort-by='.lastTimestamp' | tail -30

      - name: Cleanup k3d cluster
        if: always()
        shell: bash -Eeuo pipefail {0}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          k3d cluster delete e2e-${{ matrix.k8s-version }} 2>/dev/null || true

  report:
    name: Nightly Results
    runs-on: self-hosted
    timeout-minutes: 5
    needs: test-e2e
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Summary
        shell: bash -Eeuo pipefail {0}
        run: |
          result="${{ needs.test-e2e.result }}"
          if [[ "$result" == "success" ]]; then
            echo "All K8s version E2E tests passed"
          else
            echo "::error::E2E nightly failed (result: $result)"
            exit 1
          fi

      - name: Create issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash -Eeuo pipefail {0}
        run: |
          # Only create if no open issue with this label already exists.
          existing=$(gh issue list --label e2e-nightly-failure --state open --json number --jq 'length')
          if [[ "$existing" -gt 0 ]]; then
            echo "Open nightly failure issue already exists, skipping creation"
            exit 0
          fi
          gh issue create \
            --title "E2E nightly failed on $(date -u +%Y-%m-%d)" \
            --label e2e-nightly-failure \
            --body "The [E2E nightly run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) failed.

**Result:** \`${{ needs.test-e2e.result }}\`

Check the workflow run for details on which K8s version(s) failed."
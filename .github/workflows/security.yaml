name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6am UTC

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # CodeQL requires GitHub Advanced Security (paid) for private repos.
  # Re-enable if the repo becomes public or GHAS is purchased.
  govulncheck:
    name: Govulncheck
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Run govulncheck
        shell: bash -Eeuo pipefail -x {0}
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  trivy:
    name: Trivy
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  gitleaks:
    name: Gitleaks
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        shell: bash -Eeuo pipefail -x {0}
        run: |
          if command -v gitleaks &>/dev/null; then
            echo "gitleaks already installed: $(gitleaks version)"
          else
            VER=$(curl -sL https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
              | jq -r '.tag_name' | sed 's/^v//')
            mkdir -p "$HOME/.local/bin"
            curl -sfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
              | tar xz -C "$HOME/.local/bin" gitleaks
          fi

      - name: Detect secrets
        shell: bash -Eeuo pipefail -x {0}
        run: gitleaks detect --source . --exit-code 1

  # Dependency Review requires GitHub Advanced Security (paid) for private repos.
  # Trivy and Govulncheck already cover dependency vulnerability scanning.
  # Re-enable if the repo becomes public or GHAS is purchased.

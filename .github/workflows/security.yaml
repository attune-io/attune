name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6am UTC

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # CodeQL requires GitHub Advanced Security (paid) for private repos.
  # Re-enable if the repo becomes public or GHAS is purchased.
  govulncheck:
    name: Govulncheck
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: false

      - name: Run govulncheck
        shell: bash -Eeuo pipefail -x {0}
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          govulncheck ./...

  trivy:
    name: Trivy
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-clean-docker-config

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  trivy-image:
    name: Trivy Image Scan
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: false

      - uses: ./.github/actions/setup-clean-docker-config

      - name: Build image for scanning
        shell: bash -Eeuo pipefail -x {0}
        run: |
          # Export directly to tarball via buildx. Avoids "docker save" which
          # can fail with "No such image" when Docker uses the containerd image
          # store (default in Docker Desktop v29+).
          docker buildx build \
            --output "type=docker,dest=/tmp/kube-rightsize-scan.tar" \
            -t kube-rightsize:scan .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          input: /tmp/kube-rightsize-scan.tar
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Cleanup scan artifacts
        if: always()
        run: rm -f /tmp/kube-rightsize-scan.tar

  gitleaks:
    name: Gitleaks
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        shell: bash -Eeuo pipefail -x {0}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if command -v gitleaks &>/dev/null; then
            echo "gitleaks already installed: $(gitleaks version)"
          else
            VER="8.30.1"
            mkdir -p "$HOME/.local/bin"
            curl -sfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
              | tar xz -C "$HOME/.local/bin" gitleaks
          fi

      - name: Detect secrets
        shell: bash -Eeuo pipefail -x {0}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          gitleaks detect --source . --exit-code 1

  # Dependency Review requires GitHub Advanced Security (paid) for private repos.
  # Trivy and Govulncheck already cover dependency vulnerability scanning.
  # Re-enable if the repo becomes public or GHAS is purchased.
  # dependency-review:
  #   name: Dependency Review
  #   runs-on: self-hosted
  #   if: github.event_name == 'pull_request'
  #   steps:
  #     - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2
  #       with:
  #         egress-policy: audit
  #     - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
  #     - uses: actions/dependency-review-action@v5
  #       with:
  #         fail-on-severity: high

name: Push Helm charts to Docker Hub
on: workflow_dispatch
jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: v4.1.4

      - name: Login to GHCR
        shell: bash -Eeuo pipefail -x {0}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username ${{ github.actor }} --password-stdin

      - name: Login to Docker Hub
        shell: bash -Eeuo pipefail -x {0}
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | helm registry login registry-1.docker.io \
            --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Login to Docker Hub (cosign)
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull from GHCR and push to Docker Hub
        shell: bash -Eeuo pipefail -x {0}
        run: |
          for VERSION in 0.1.0 0.1.2 0.1.3 0.1.4; do
            echo "=== Processing v${VERSION} ==="
            helm pull oci://ghcr.io/attune-io/charts/attune --version "${VERSION}"
            helm push "attune-${VERSION}.tgz" oci://registry-1.docker.io/attuneio
            cosign sign --yes "docker.io/attuneio/attune:${VERSION}"
            rm -f "attune-${VERSION}.tgz"
          done
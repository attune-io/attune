name: Re-push Helm Chart
on:
  workflow_dispatch: {}
jobs:
  repush:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2
        with:
          version: v4.1.4
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin
      - name: Re-push all chart versions with corrected metadata
        run: |
          for VERSION in 0.1.0 0.1.2 0.1.3 0.1.4; do
            sed -i "s/^version:.*/version: ${VERSION}/" charts/attune/Chart.yaml
            sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/attune/Chart.yaml
            helm package charts/attune
            helm push attune-${VERSION}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
            rm -f attune-${VERSION}.tgz
            git checkout charts/attune/Chart.yaml
          done
      - name: Push Artifact Hub metadata
        run: |
          ORAS_VERSION="1.3.2"
          curl -sLO "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz"
          tar -xzf "oras_${ORAS_VERSION}_linux_amd64.tar.gz" oras
          echo "${{ secrets.GITHUB_TOKEN }}" | ./oras login ghcr.io --username ${{ github.actor }} --password-stdin
          ./oras push ghcr.io/${{ github.repository_owner }}/charts/attune:artifacthub.io \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml

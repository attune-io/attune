name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  # Cancel in-progress PR runs but never cancel main (prevents cache corruption).
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  GO_VERSION: "1.26"
  GOLANGCI_LINT_VERSION: "v2.12.2"

jobs:
  # Detect which files changed so downstream jobs can skip irrelevant work.
  # Docs-only or YAML-only PRs skip all Go CI (lint, test, build).
  changes:
    name: Detect Changes
    runs-on: self-hosted
    outputs:
      go: ${{ steps.filter.outputs.go }}
      helm: ${{ steps.filter.outputs.helm }}
      yaml: ${{ steps.filter.outputs.yaml }}
    steps:
      - uses: actions/checkout@v6
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - 'Dockerfile'
            helm:
              - 'charts/**'
            yaml:
              - 'config/**'
              - '.github/workflows/**'

  lint:
    name: Lint
    runs-on: self-hosted
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m

      - name: YAML lint
        shell: bash -Eeuo pipefail {0}
        run: |
          command -v yamllint || pip install --break-system-packages yamllint 2>/dev/null
          cat > /tmp/yamllint-config.yaml <<'EOF'
          extends: default
          rules:
            line-length:
              max: 200
            truthy:
              check-keys: false
            indentation:
              spaces: 2
              indent-sequences: whatever
          EOF
          yamllint -c /tmp/yamllint-config.yaml \
            config/ charts/kube-rightsize/Chart.yaml charts/kube-rightsize/values.yaml charts/kube-rightsize/ci/

  test-unit:
    name: Unit Tests
    runs-on: self-hosted
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install gotestsum
        shell: bash -Eeuo pipefail {0}
        run: go install gotest.tools/gotestsum@latest

      - name: Run unit tests
        shell: bash -Eeuo pipefail -x {0}
        run: |
          gotestsum --format pkgname \
            --junitfile test-results/unit.xml \
            --rerun-fails --rerun-fails-max-failures=5 \
            --packages="./api/... ./cmd/... ./internal/..." \
            -- -race -timeout=10m \
            -coverpkg=./internal/... \
            -coverprofile=coverage.out \
            -covermode=atomic

      - name: Check coverage threshold
        shell: bash -Eeuo pipefail {0}
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total: | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 75" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below 75% threshold"
            exit 1
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results/
          retention-days: 7

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false

  test-integration:
    name: Integration Tests
    runs-on: self-hosted
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install gotestsum
        shell: bash -Eeuo pipefail {0}
        run: go install gotest.tools/gotestsum@latest

      - name: Setup envtest
        shell: bash -Eeuo pipefail -x {0}
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          echo "KUBEBUILDER_ASSETS=$(setup-envtest use -p path)" >> "$GITHUB_ENV"

      - name: Run integration tests
        shell: bash -Eeuo pipefail -x {0}
        run: |
          gotestsum --format pkgname \
            --junitfile test-results/integration.xml \
            --rerun-fails --rerun-fails-max-failures=3 \
            --packages="./test/integration/..." \
            -- -race -timeout=15m \
            -tags=integration

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: test-results/
          retention-days: 7

  test-e2e:
    name: E2E Tests (K8s ${{ matrix.k8s-version }})
    runs-on: self-hosted
    needs: [changes, lint, test-unit]
    if: needs.changes.outputs.go == 'true'
    strategy:
      matrix:
        k8s-version: ["v1.33.7", "v1.34.3", "v1.35.0"]
      fail-fast: false
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          node_image: kindest/node:${{ matrix.k8s-version }}
          cluster_name: e2e-test

      - name: Install cert-manager
        shell: bash -Eeuo pipefail -x {0}
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.17.2/cert-manager.yaml
          kubectl wait --for=condition=Available deployment/cert-manager-webhook -n cert-manager --timeout=120s

      - name: Install Prometheus
        shell: bash -Eeuo pipefail -x {0}
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update
          helm install prometheus prometheus-community/prometheus \
            --namespace monitoring --create-namespace \
            --set server.persistentVolume.enabled=false \
            --set alertmanager.enabled=false \
            --set prometheus-pushgateway.enabled=false \
            --wait --timeout 3m

      - name: Build and load operator image
        shell: bash -Eeuo pipefail -x {0}
        run: |
          make docker-build IMG=kube-rightsize:e2e
          kind load docker-image kube-rightsize:e2e --name e2e-test

      - name: Install operator via Helm
        shell: bash -Eeuo pipefail -x {0}
        run: |
          helm install kube-rightsize ./charts/kube-rightsize \
            --namespace kube-rightsize-system --create-namespace \
            --set image.repository=kube-rightsize \
            --set image.tag=e2e \
            --set image.pullPolicy=Never \
            --set webhooks.enabled=true \
            --set metrics.enabled=true \
            --set leaderElection.enabled=false \
            --wait --timeout 3m

      - name: Install Chainsaw
        uses: kyverno/action-install-chainsaw@v0.2.15
      - shell: bash -Eeuo pipefail -x {0}
        run: chainsaw test test/e2e/ --config .chainsaw.yaml

      - name: Collect debug info on failure
        if: failure()
        shell: bash -Eeuo pipefail {0}
        run: |
          echo "=== Operator logs ==="
          kubectl logs -n kube-rightsize-system -l app.kubernetes.io/name=kube-rightsize --tail=100
          echo "=== Pod status ==="
          kubectl get pods -A
          echo "=== Events ==="
          kubectl get events -A --sort-by='.lastTimestamp' | tail -30

  # Aggregates all E2E matrix results into a single required status check.
  # Without this, branch protection must list each matrix entry individually.
  test-e2e-result:
    name: E2E Tests
    runs-on: self-hosted
    needs: [changes, test-e2e]
    if: always()
    steps:
      - name: Aggregate matrix results
        shell: bash -Eeuo pipefail {0}
        run: |
          if [[ "${{ needs.changes.outputs.go }}" != "true" ]]; then
            echo "Skipped: no Go changes"
            exit 0
          fi
          result="${{ needs.test-e2e.result }}"
          if [[ "$result" == "success" || "$result" == "skipped" ]]; then
            echo "E2E matrix passed (result: $result)"
          else
            echo "E2E matrix failed (result: $result)"
            exit 1
          fi

  crd-freshness:
    name: CRD Freshness Check
    runs-on: self-hosted
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Regenerate manifests
        shell: bash -Eeuo pipefail -x {0}
        run: make manifests

      - name: Check for drift
        shell: bash -Eeuo pipefail {0}
        run: |
          if ! git diff --exit-code config/crd/ charts/kube-rightsize/crds/; then
            echo "::error::CRD manifests are stale. Run 'make manifests' and commit."
            exit 1
          fi

  helm-lint:
    name: Helm Lint
    runs-on: self-hosted
    needs: changes
    if: needs.changes.outputs.helm == 'true' || needs.changes.outputs.go == 'true'
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Lint chart
        shell: bash -Eeuo pipefail -x {0}
        run: helm lint charts/kube-rightsize --kube-version v1.33.0

      - name: Template validation
        shell: bash -Eeuo pipefail -x {0}
        run: |
          for f in charts/kube-rightsize/ci/*.yaml; do
            echo "--- Testing with $f ---"
            helm template kube-rightsize charts/kube-rightsize -f "$f" \
              --kube-version v1.33.0 > /dev/null
          done

      - name: Run chart unit tests
        shell: bash -Eeuo pipefail -x {0}
        run: |
          # Remove stale helm-unittest plugins that conflict on self-hosted runners
          rm -rf "$(helm env HELM_PLUGINS)/helm-unittest.git" 2>/dev/null || true
          PLUGINS_DIR="$(helm env HELM_PLUGINS)/unittest"
          mkdir -p "$PLUGINS_DIR"
          curl -fsSL "https://github.com/helm-unittest/helm-unittest/releases/download/v0.7.2/helm-unittest-linux-amd64-0.7.2.tgz" \
            | tar xz -C "$PLUGINS_DIR"
          helm unittest charts/kube-rightsize

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Helm docs freshness
        shell: bash -Eeuo pipefail {0}
        run: |
          go install github.com/norwoodj/helm-docs/cmd/helm-docs@v1.14.2
          helm-docs --chart-search-root charts/
          if ! git diff --quiet --exit-code charts/kube-rightsize/README.md; then
            echo "::error::Helm README is stale. Run 'make helm-docs-gen' and commit."
            git diff charts/kube-rightsize/README.md
            exit 1
          fi

  build:
    name: Build
    runs-on: self-hosted
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binaries
        shell: bash -Eeuo pipefail -x {0}
        run: |
          go build -o bin/manager ./cmd/manager/
          go build -o bin/kubectl-rightsize ./cmd/kubectl-rightsize/

      - name: Build container image (no push)
        shell: bash -Eeuo pipefail -x {0}
        run: |
          make docker-build IMG=kube-rightsize:ci-${{ github.sha }}

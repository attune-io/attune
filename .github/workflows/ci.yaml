name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  # Cancel in-progress PR runs but never cancel main (prevents cache corruption).
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  GO_VERSION: "1.26"
  GOLANGCI_LINT_VERSION: "v2.12.2"
  GOTESTSUM_VERSION: "v1.13.0"
  K3D_VERSION: "v5.8.3"
  K3S_IMAGE: "rancher/k3s:v1.35.4-k3s1"
  ENVTEST_K8S_VERSION: "1.35.0"
  HELM_UNITTEST_VERSION: "v0.7.2"
  CERT_MANAGER_VERSION: "v1.17.2"
  PROMETHEUS_IMAGE: "quay.io/prometheus/prometheus:v3.4.1"
  PROMETHEUS_CHART_VERSION: "27.22.0"

jobs:
  # Detect which files changed so downstream jobs can skip irrelevant work.
  # Docs-only or YAML-only PRs skip all Go CI (lint, test, build).
  changes:
    name: Detect Changes
    runs-on: self-hosted
    timeout-minutes: 5
    outputs:
      go: ${{ steps.filter.outputs.go }}
      go-source: ${{ steps.filter.outputs.go-source }}
      helm: ${{ steps.filter.outputs.helm }}
      yaml: ${{ steps.filter.outputs.yaml }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - 'Dockerfile'
              - '.github/workflows/ci.yaml'
            go-source:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
            helm:
              - 'charts/**'
            yaml:
              - 'config/**'
              - '.github/workflows/**'
              - 'charts/kube-rightsize/Chart.yaml'
              - 'charts/kube-rightsize/values.yaml'
              - 'charts/kube-rightsize/ci/**'
            docs:
              - 'README.md'
              - 'CONTRIBUTING.md'
              - 'docs/**'
              - 'examples/**'
              - 'mkdocs.yml'
              - 'Makefile'
              - 'hack/verify-doc-defaults.sh'
              - 'hack/verify-doc-tool-versions.sh'
              - 'charts/kube-rightsize/README.md.gotmpl'

  lint:
    name: Lint
    runs-on: self-hosted
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m --allow-serial-runners

      - name: Check go mod tidy
        shell: bash -Eeuo pipefail {0}
        run: |
          go mod tidy
          if ! git diff --quiet --exit-code go.mod go.sum; then
            echo "::error::go.mod/go.sum are not tidy. Run 'go mod tidy' and commit."
            git diff go.mod go.sum
            exit 1
          fi

      - name: Check license boilerplate
        shell: bash -Eeuo pipefail {0}
        run: |
          missing=$(find . -name '*.go' -not -path './vendor/*' -not -name 'zz_generated.*' \
            -exec sh -c 'head -5 "$1" | grep -q "^Copyright" || echo "$1"' _ {} \;)
          if [ -n "$missing" ]; then
            echo "::error::Missing license header in: $missing"
            exit 1
          fi

      - name: Verify doc defaults consistency
        shell: bash -Eeuo pipefail {0}
        run: bash hack/verify-doc-defaults.sh

      - name: Verify dashboard metrics sync
        shell: bash -Eeuo pipefail {0}
        run: bash hack/verify-dashboard-metrics.sh

      - name: Verify supported tool version references
        shell: bash -Eeuo pipefail {0}
        run: bash hack/verify-doc-tool-versions.sh

  docs-check:
    name: Docs Check
    runs-on: self-hosted
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.helm == 'true'
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Install MkDocs
        shell: bash -Eeuo pipefail {0}
        run: pip install --user --break-system-packages mkdocs-material

      - name: Build docs site
        shell: bash -Eeuo pipefail {0}
        run: make docs-build

      - name: Check Helm README freshness
        shell: bash -Eeuo pipefail {0}
        run: make helm-docs-check

      - name: Verify supported tool version references
        shell: bash -Eeuo pipefail {0}
        run: bash hack/verify-doc-tool-versions.sh

  yaml-lint:
    name: YAML Lint
    runs-on: self-hosted
    timeout-minutes: 5
    needs: changes
    if: needs.changes.outputs.yaml == 'true'
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: YAML lint
        shell: bash -Eeuo pipefail {0}
        run: |
          command -v yamllint || pip install --break-system-packages yamllint 2>/dev/null
          yamllint_config="${RUNNER_TEMP:-/tmp}/yamllint-${GITHUB_RUN_ID}-${GITHUB_JOB}.yaml"
          cat > "$yamllint_config" <<'EOF'
          extends: default
          rules:
            line-length:
              max: 200
            truthy:
              check-keys: false
            indentation:
              spaces: 2
              indent-sequences: whatever
          EOF
          yamllint -c "$yamllint_config" \
            config/ charts/kube-rightsize/Chart.yaml charts/kube-rightsize/values.yaml charts/kube-rightsize/ci/

  test-unit:
    name: Unit Tests
    runs-on: self-hosted
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Install gotestsum
        shell: bash -Eeuo pipefail {0}
        run: go install gotest.tools/gotestsum@${{ env.GOTESTSUM_VERSION }}

      - name: Run unit tests
        shell: bash -Eeuo pipefail -x {0}
        run: |
          gotestsum --format pkgname \
            --junitfile test-results/unit.xml \
            --rerun-fails --rerun-fails-max-failures=5 \
            --packages="./api/... ./cmd/... ./internal/..." \
            -- -race -timeout=10m \
            -coverpkg=./internal/... \
            -coverprofile=coverage.out \
            -covermode=atomic

      - name: Check coverage threshold
        shell: bash -Eeuo pipefail {0}
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total: | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below 80% threshold"
            exit 1
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unit-test-results
          path: test-results/
          retention-days: 7

      - name: Upload coverage
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          files: coverage.out
          fail_ci_if_error: false

  test-fuzz-bench:
    name: Fuzz & Benchmark Tests
    runs-on: self-hosted
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Run fuzz tests (30s per target)
        shell: bash -Eeuo pipefail -x {0}
        run: |
          go test ./internal/recommendation/... -run='^$' -fuzz=FuzzPercentileEstimator -fuzztime=30s
          go test ./internal/recommendation/... -run='^$' -fuzz=FuzzRecommendationEngine -fuzztime=30s

      - name: Run benchmark tests
        shell: bash -Eeuo pipefail -x {0}
        run: go test ./internal/... -bench=. -benchmem -run='^$' -timeout=5m

  test-integration:
    name: Integration Tests
    runs-on: self-hosted
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Install gotestsum
        shell: bash -Eeuo pipefail {0}
        run: go install gotest.tools/gotestsum@${{ env.GOTESTSUM_VERSION }}

      - name: Setup envtest
        shell: bash -Eeuo pipefail -x {0}
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.24
          echo "KUBEBUILDER_ASSETS=$(setup-envtest use ${{ env.ENVTEST_K8S_VERSION }} -p path)" >> "$GITHUB_ENV"

      - name: Run integration tests
        shell: bash -Eeuo pipefail -x {0}
        run: |
          gotestsum --format pkgname \
            --junitfile test-results/integration.xml \
            --rerun-fails --rerun-fails-max-failures=3 \
            --packages="./test/integration/..." \
            -- -race -timeout=15m \
            -tags=integration

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: integration-test-results
          path: test-results/
          retention-days: 7

  # Single-version E2E on every push/PR. Full K8s version matrix runs nightly.
  # Skipped for Dockerfile-only and workflow-only changes (e.g. Dependabot
  # base-image or action version bumps) because build + unit tests already
  # verify compilation. The nightly E2E matrix catches runtime regressions.
  test-e2e:
    name: E2E Tests
    runs-on: self-hosted
    timeout-minutes: 45
    needs: [changes, lint, test-unit]
    if: needs.changes.outputs.go-source == 'true'
    env:
      K3D_CLUSTER_NAME: e2e-${{ github.run_id }}-${{ github.run_attempt }}
      KUBECONFIG_BASENAME: kube-rightsize-e2e-${{ github.run_id }}-${{ github.run_attempt }}.kubeconfig
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-clean-docker-config

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Install k3d
        shell: bash -Eeuo pipefail -x {0}
        run: |
          if command -v k3d &>/dev/null; then
            echo "k3d already installed: $(k3d version)"
          else
            curl -s https://raw.githubusercontent.com/k3d-io/k3d/${{ env.K3D_VERSION }}/install.sh | K3D_INSTALL_DIR="$HOME/.local/bin" USE_SUDO=false bash
          fi

      - name: Prepare isolated kubeconfig
        shell: bash -Eeuo pipefail -x {0}
        run: |
          kubeconfig_path="${RUNNER_TEMP:-/tmp}/${KUBECONFIG_BASENAME}"
          printf 'KUBECONFIG=%s\n' "$kubeconfig_path" >> "$GITHUB_ENV"

      - name: Cleanup stale k3d clusters and Docker resources
        shell: bash -Eeuo pipefail -x {0}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          for cluster in $(k3d cluster list -o json 2>/dev/null | jq -r '.[].name // empty'); do
            started=$(docker inspect --format '{{.State.StartedAt}}' "k3d-${cluster}-server-0" 2>/dev/null) || continue
            started_epoch=$(date -d "$started" +%s 2>/dev/null) || continue
            age=$(( $(date +%s) - started_epoch ))
            if (( age > 3600 )); then
              echo "Deleting stale k3d cluster '$cluster' (age: ${age}s)"
              k3d cluster delete "$cluster" || true
            fi
          done
          docker builder prune -f || true
          docker system prune -f || true

      - name: Pre-pull cert-manager and Prometheus images
        shell: bash -Eeuo pipefail -x {0}
        run: |
          images=(
            "quay.io/jetstack/cert-manager-controller:${{ env.CERT_MANAGER_VERSION }}"
            "quay.io/jetstack/cert-manager-webhook:${{ env.CERT_MANAGER_VERSION }}"
            "quay.io/jetstack/cert-manager-cainjector:${{ env.CERT_MANAGER_VERSION }}"
            "${{ env.PROMETHEUS_IMAGE }}"
          )
          # Pull sequentially with retry to avoid containerd lease races
          # from concurrent pulls on self-hosted runners.
          for img in "${images[@]}"; do
            for attempt in 1 2 3; do
              if docker pull "$img"; then
                break
              fi
              echo "Pull attempt $attempt failed for $img, retrying in 5s..."
              sleep 5
            done
          done
          # Verify all images exist in the local daemon before k3d import.
          for img in "${images[@]}"; do
            docker image inspect "$img" > /dev/null
          done

      - name: Create k3d cluster
        shell: bash -Eeuo pipefail -x {0}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          for attempt in 1 2 3; do
            if k3d cluster create "$K3D_CLUSTER_NAME" \
              --image ${{ env.K3S_IMAGE }} \
              --kubeconfig-update-default=false \
              --kubeconfig-switch-context=false \
              --k3s-arg "--disable=traefik,servicelb@server:*" \
              --wait --timeout 120s; then
              break
            fi
            echo "::warning::k3d cluster create attempt $attempt failed, retrying in 10s..."
            k3d cluster delete "$K3D_CLUSTER_NAME" 2>/dev/null || true
            sleep 10
            if (( attempt == 3 )); then
              echo "::error::k3d cluster creation failed after 3 attempts"
              exit 1
            fi
          done
          k3d kubeconfig write "$K3D_CLUSTER_NAME" --output "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"

      - name: Wait for node Ready
        shell: bash -Eeuo pipefail -x {0}
        run: |
          echo "Waiting for k3d node to become Ready..."
          kubectl wait --for=condition=Ready nodes --all --timeout=360s

      - name: Load cert-manager images into cluster
        shell: bash -Eeuo pipefail -x {0}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          k3d image import \
            quay.io/jetstack/cert-manager-controller:${{ env.CERT_MANAGER_VERSION }} \
            quay.io/jetstack/cert-manager-webhook:${{ env.CERT_MANAGER_VERSION }} \
            quay.io/jetstack/cert-manager-cainjector:${{ env.CERT_MANAGER_VERSION }} \
            -c "$K3D_CLUSTER_NAME"

      - name: Install cert-manager
        shell: bash -Eeuo pipefail -x {0}
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/${{ env.CERT_MANAGER_VERSION }}/cert-manager.yaml
          kubectl wait --for=condition=Available deployment/cert-manager -n cert-manager --timeout=120s
          kubectl wait --for=condition=Available deployment/cert-manager-webhook -n cert-manager --timeout=120s
          kubectl wait --for=condition=Available deployment/cert-manager-cainjector -n cert-manager --timeout=120s

      - name: Load Prometheus image into cluster
        shell: bash -Eeuo pipefail -x {0}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          k3d image import ${{ env.PROMETHEUS_IMAGE }} -c "$K3D_CLUSTER_NAME"

      - name: Install Prometheus
        shell: bash -Eeuo pipefail -x {0}
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update
          helm install prometheus prometheus-community/prometheus \
            --version ${{ env.PROMETHEUS_CHART_VERSION }} \
            --namespace monitoring --create-namespace \
            --set server.image.repository=quay.io/prometheus/prometheus \
            --set server.image.tag=v3.4.1 \
            --set server.persistentVolume.enabled=false \
            --set alertmanager.enabled=false \
            --set prometheus-pushgateway.enabled=false \
            --set server.global.scrape_interval=15s \
            --wait --timeout 5m

      - name: Wait for cAdvisor metrics in Prometheus
        shell: bash -Eeuo pipefail -x {0}
        run: |
          echo "Waiting for Prometheus to scrape cAdvisor metrics..."
          PROM_POD=$(kubectl get pods -n monitoring -l app.kubernetes.io/name=prometheus,app.kubernetes.io/component=server -o name | head -1)
          for i in $(seq 1 30); do
            result=$(kubectl exec -n monitoring "$PROM_POD" -- \
              wget -qO- 'http://localhost:9090/api/v1/query?query=container_cpu_usage_seconds_total' 2>/dev/null || true)
            if echo "$result" | grep -q '"result":\[{'; then
              echo "cAdvisor metrics available after ${i}x5s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "WARNING: cAdvisor metrics not found after 150s, proceeding anyway"
            fi
            sleep 5
          done

      - name: Build and load operator image
        shell: bash -Eeuo pipefail -x {0}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          make docker-build IMG=kube-rightsize:e2e
          k3d image import kube-rightsize:e2e -c "$K3D_CLUSTER_NAME"

      - name: Install operator via Helm
        shell: bash -Eeuo pipefail -x {0}
        run: |
          helm install kube-rightsize ./charts/kube-rightsize \
            --namespace kube-rightsize-system --create-namespace \
            --set image.repository=kube-rightsize \
            --set image.tag=e2e \
            --set image.pullPolicy=Never \
            --set webhooks.enabled=true \
            --set metrics.enabled=true \
            --set leaderElection.enabled=false \
            --set resources.limits.memory=512Mi \
            --set resources.requests.memory=256Mi \
            --wait --timeout 3m

      - name: Install Chainsaw
        uses: kyverno/action-install-chainsaw@1223ef75bedeb59c4e7b5455463d4316e76dff01 # v0.2.15
      - shell: bash -Eeuo pipefail -x {0}
        run: chainsaw test test/e2e/ --config .chainsaw.yaml

      - name: Run Go E2E tests
        shell: bash -Eeuo pipefail -x {0}
        run: go test -tags=e2e ./test/e2e-go/... -race -count=1 -timeout=15m -v

      - name: Collect debug info on failure
        if: failure()
        shell: bash -Eeuo pipefail {0}
        run: |
          echo "=== cert-manager pods ==="
          kubectl get pods -n cert-manager
          echo "=== Operator logs ==="
          kubectl logs -n kube-rightsize-system -l app.kubernetes.io/name=kube-rightsize --tail=100 || true
          echo "=== Pod status ==="
          kubectl get pods -A
          echo "=== Events ==="
          kubectl get events -A --sort-by='.lastTimestamp' | tail -30

      - name: Cleanup k3d cluster
        if: always()
        shell: bash -Eeuo pipefail {0}
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          k3d cluster delete "$K3D_CLUSTER_NAME" 2>/dev/null || true
          rm -f "$KUBECONFIG"

  crd-freshness:
    name: CRD Freshness Check
    runs-on: self-hosted
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Regenerate manifests and deepcopy
        shell: bash -Eeuo pipefail -x {0}
        run: make manifests generate

      - name: Check for drift
        shell: bash -Eeuo pipefail {0}
        run: |
          if ! git diff --exit-code config/crd/ charts/kube-rightsize/crds/ api/v1alpha1/zz_generated.deepcopy.go config/rbac/; then
            echo "::error::Generated files are stale. Run 'make manifests generate' and commit."
            exit 1
          fi

  helm-lint:
    name: Helm Lint
    runs-on: self-hosted
    timeout-minutes: 10
    needs: changes
    if: needs.changes.outputs.helm == 'true' || needs.changes.outputs.go == 'true'
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: v4.1.4

      - name: Lint chart
        shell: bash -Eeuo pipefail -x {0}
        run: helm lint charts/kube-rightsize --kube-version v1.33.0

      - name: Template validation
        shell: bash -Eeuo pipefail -x {0}
        run: |
          for f in charts/kube-rightsize/ci/*.yaml; do
            echo "--- Testing with $f ---"
            helm template kube-rightsize charts/kube-rightsize -f "$f" \
              --kube-version v1.33.0 \
              --api-versions cert-manager.io/v1 > /dev/null
          done

      - name: Run chart unit tests
        shell: bash -Eeuo pipefail -x {0}
        run: |
          # Remove stale helm-unittest plugins that conflict on self-hosted runners
          rm -rf "$(helm env HELM_PLUGINS)/helm-unittest.git" 2>/dev/null || true
          PLUGINS_DIR="$(helm env HELM_PLUGINS)/unittest"
          mkdir -p "$PLUGINS_DIR"
          HELM_UNITTEST_ASSET_VERSION="${HELM_UNITTEST_VERSION#v}"
          curl -fsSL "https://github.com/helm-unittest/helm-unittest/releases/download/${HELM_UNITTEST_VERSION}/helm-unittest-linux-amd64-${HELM_UNITTEST_ASSET_VERSION}.tgz" \
            | tar xz -C "$PLUGINS_DIR"
          helm unittest charts/kube-rightsize

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Helm docs freshness
        shell: bash -Eeuo pipefail {0}
        run: |
          go install github.com/norwoodj/helm-docs/cmd/helm-docs@v1.14.2
          helm-docs --chart-search-root charts/
          if ! git diff --quiet --exit-code charts/kube-rightsize/README.md; then
            echo "::error::Helm README is stale. Run 'make helm-docs-gen' and commit."
            git diff charts/kube-rightsize/README.md
            exit 1
          fi

      - name: Verify Helm RBAC matches kustomize
        shell: bash -Eeuo pipefail {0}
        run: bash hack/verify-helm-rbac.sh

  build:
    name: Build
    runs-on: self-hosted
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - uses: ./.github/actions/setup-clean-docker-config

      - name: Build binaries
        shell: bash -Eeuo pipefail -x {0}
        run: |
          go build -o bin/manager ./cmd/manager/
          go build -o bin/kubectl-rightsize ./cmd/kubectl-rightsize/

      - name: Build container image (no push)
        shell: bash -Eeuo pipefail -x {0}
        run: |
          make docker-build IMG=kube-rightsize:ci-${{ github.sha }}

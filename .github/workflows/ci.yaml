name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"
  GOLANGCI_LINT_VERSION: "v2.12.2"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m

      - name: YAML lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: config/ charts/
          config_data: |
            extends: default
            rules:
              line-length:
                max: 200
              truthy:
                check-keys: false

      - name: Actionlint
        uses: rhysd/actionlint-action@v1

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run unit tests
        shell: bash -Eeuo pipefail -x {0}
        run: |
          go test ./api/... ./internal/... \
            -race -count=1 -timeout=10m \
            -coverprofile=coverage.out \
            -covermode=atomic

      - name: Check coverage threshold
        shell: bash -Eeuo pipefail {0}
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total: | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below 70% threshold"
            exit 1
          fi

      - name: Upload coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup envtest
        shell: bash -Eeuo pipefail -x {0}
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          echo "KUBEBUILDER_ASSETS=$(setup-envtest use -p path)" >> "$GITHUB_ENV"

      - name: Run integration tests
        shell: bash -Eeuo pipefail -x {0}
        run: |
          go test ./test/integration/... \
            -race -count=1 -timeout=15m \
            -tags=integration

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    strategy:
      matrix:
        k8s-version: ["v1.35.0", "v1.36.0"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          node_image: kindest/node:${{ matrix.k8s-version }}
          cluster_name: e2e-test

      - name: Build and load operator image
        shell: bash -Eeuo pipefail -x {0}
        run: |
          make docker-build IMG=kube-rightsize:e2e
          kind load docker-image kube-rightsize:e2e --name e2e-test

      - name: Install CRDs and operator
        shell: bash -Eeuo pipefail -x {0}
        run: |
          make install
          make deploy IMG=kube-rightsize:e2e

      - name: Wait for operator ready
        shell: bash -Eeuo pipefail {0}
        run: |
          kubectl wait --for=condition=Available deployment/kube-rightsize-controller-manager \
            -n kube-rightsize-system --timeout=120s

      - name: Run Chainsaw tests
        uses: kyverno/action-install-chainsaw@v0.2
        with:
          verify: true
      - shell: bash -Eeuo pipefail -x {0}
        run: chainsaw test test/e2e/ --config .chainsaw.yaml

      - name: Collect debug info on failure
        if: failure()
        shell: bash -Eeuo pipefail {0}
        run: |
          echo "=== Operator logs ==="
          kubectl logs -n kube-rightsize-system deploy/kube-rightsize-controller-manager --tail=100
          echo "=== Pod status ==="
          kubectl get pods -A
          echo "=== Events ==="
          kubectl get events -A --sort-by='.lastTimestamp' | tail -30

  crd-freshness:
    name: CRD Freshness Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Regenerate manifests
        shell: bash -Eeuo pipefail -x {0}
        run: make manifests

      - name: Check for drift
        shell: bash -Eeuo pipefail {0}
        run: |
          if ! git diff --exit-code config/crd/; then
            echo "::error::CRD manifests are stale. Run 'make manifests' and commit."
            exit 1
          fi

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Lint chart
        shell: bash -Eeuo pipefail -x {0}
        run: helm lint charts/kube-rightsize

      - name: Template validation
        shell: bash -Eeuo pipefail -x {0}
        run: |
          for f in charts/kube-rightsize/ci/*.yaml; do
            echo "--- Testing with $f ---"
            helm template kube-rightsize charts/kube-rightsize -f "$f" > /dev/null
          done

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        shell: bash -Eeuo pipefail -x {0}
        run: go build -o bin/manager ./cmd/manager/

      - name: Build container image (no push)
        shell: bash -Eeuo pipefail -x {0}
        run: |
          make docker-build IMG=kube-rightsize:ci-${{ github.sha }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: govulncheck
        shell: bash -Eeuo pipefail -x {0}
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.31.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

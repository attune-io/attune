name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  # Cancel in-progress PR runs but never cancel main (prevents cache corruption).
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  GO_VERSION: "1.26"
  GOLANGCI_LINT_VERSION: "v2.12.2"

jobs:
  # Detect which files changed so downstream jobs can skip irrelevant work.
  # Docs-only or YAML-only PRs skip all Go CI (lint, test, build).
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      helm: ${{ steps.filter.outputs.helm }}
      yaml: ${{ steps.filter.outputs.yaml }}
    steps:
      - uses: actions/checkout@v6
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - 'Dockerfile'
            helm:
              - 'charts/**'
            yaml:
              - 'config/**'
              - '.github/workflows/**'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m

      - name: YAML lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: config/ charts/kube-rightsize/Chart.yaml charts/kube-rightsize/values.yaml charts/kube-rightsize/ci/
          config_data: |
            extends: default
            rules:
              line-length:
                max: 200
              truthy:
                check-keys: false
              indentation:
                spaces: 2
                indent-sequences: whatever

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install gotestsum
        shell: bash -Eeuo pipefail {0}
        run: go install gotest.tools/gotestsum@latest

      - name: Run unit tests
        shell: bash -Eeuo pipefail -x {0}
        run: |
          gotestsum --format pkgname \
            --junitfile test-results/unit.xml \
            --rerun-fails --rerun-fails-max-failures=5 \
            -- ./api/... ./cmd/... ./internal/... \
            -race -timeout=10m \
            -coverprofile=coverage.out \
            -covermode=atomic

      - name: Check coverage threshold
        shell: bash -Eeuo pipefail {0}
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total: | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 75" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below 75% threshold"
            exit 1
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results/
          retention-days: 7

      - name: Upload coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install gotestsum
        shell: bash -Eeuo pipefail {0}
        run: go install gotest.tools/gotestsum@latest

      - name: Setup envtest
        shell: bash -Eeuo pipefail -x {0}
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          echo "KUBEBUILDER_ASSETS=$(setup-envtest use -p path)" >> "$GITHUB_ENV"

      - name: Run integration tests
        shell: bash -Eeuo pipefail -x {0}
        run: |
          gotestsum --format pkgname \
            --junitfile test-results/integration.xml \
            --rerun-fails --rerun-fails-max-failures=3 \
            -- ./test/integration/... \
            -race -timeout=15m \
            -tags=integration

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: test-results/
          retention-days: 7

  test-e2e:
    name: E2E Tests (K8s ${{ matrix.k8s-version }})
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: [changes, lint, test-unit]
    if: needs.changes.outputs.go == 'true'
    strategy:
      matrix:
        k8s-version: ["v1.33.7", "v1.34.3", "v1.35.0"]
      fail-fast: false
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          node_image: kindest/node:${{ matrix.k8s-version }}
          cluster_name: e2e-test

      - name: Build and load operator image
        shell: bash -Eeuo pipefail -x {0}
        run: |
          make docker-build IMG=kube-rightsize:e2e
          kind load docker-image kube-rightsize:e2e --name e2e-test

      - name: Install CRDs and operator
        shell: bash -Eeuo pipefail -x {0}
        run: |
          make install
          make deploy IMG=kube-rightsize:e2e

      - name: Wait for operator ready
        shell: bash -Eeuo pipefail {0}
        run: |
          kubectl wait --for=condition=Available deployment/kube-rightsize-controller-manager \
            -n kube-rightsize-system --timeout=120s

      - name: Install Chainsaw
        uses: kyverno/action-install-chainsaw@v0.2.15
      - shell: bash -Eeuo pipefail -x {0}
        run: chainsaw test test/e2e/ --config .chainsaw.yaml

      - name: Collect debug info on failure
        if: failure()
        shell: bash -Eeuo pipefail {0}
        run: |
          echo "=== Operator logs ==="
          kubectl logs -n kube-rightsize-system deploy/kube-rightsize-controller-manager --tail=100
          echo "=== Pod status ==="
          kubectl get pods -A
          echo "=== Events ==="
          kubectl get events -A --sort-by='.lastTimestamp' | tail -30

  crd-freshness:
    name: CRD Freshness Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Regenerate manifests
        shell: bash -Eeuo pipefail -x {0}
        run: make manifests

      - name: Check for drift
        shell: bash -Eeuo pipefail {0}
        run: |
          if ! git diff --exit-code config/crd/ charts/kube-rightsize/crds/; then
            echo "::error::CRD manifests are stale. Run 'make manifests' and commit."
            exit 1
          fi

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.helm == 'true' || needs.changes.outputs.go == 'true'
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Lint chart
        shell: bash -Eeuo pipefail -x {0}
        run: helm lint charts/kube-rightsize --kube-version v1.33.0

      - name: Template validation
        shell: bash -Eeuo pipefail -x {0}
        run: |
          for f in charts/kube-rightsize/ci/*.yaml; do
            echo "--- Testing with $f ---"
            helm template kube-rightsize charts/kube-rightsize -f "$f" \
              --kube-version v1.33.0 > /dev/null
          done

      - name: Run chart unit tests
        shell: bash -Eeuo pipefail -x {0}
        run: |
          PLUGINS_DIR="$(helm env HELM_PLUGINS)/unittest"
          mkdir -p "$PLUGINS_DIR"
          curl -fsSL "https://github.com/helm-unittest/helm-unittest/releases/download/v0.7.2/helm-unittest-linux-amd64-0.7.2.tgz" \
            | tar xz -C "$PLUGINS_DIR"
          helm unittest charts/kube-rightsize

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.go == 'true'
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build binaries
        shell: bash -Eeuo pipefail -x {0}
        run: |
          go build -o bin/manager ./cmd/manager/
          go build -o bin/kubectl-rightsize ./cmd/kubectl-rightsize/

      - name: Build container image (no push)
        shell: bash -Eeuo pipefail -x {0}
        run: |
          make docker-build IMG=kube-rightsize:ci-${{ github.sha }}

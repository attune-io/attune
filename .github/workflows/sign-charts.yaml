name: Sign Helm Charts

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  sign:
    name: Sign Charts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      packages: write
      id-token: write
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign all chart versions
        shell: bash -Eeuo pipefail -x {0}
        run: |
          for VERSION in 0.1.0 0.1.2 0.1.3 0.1.4; do
            echo "Signing attune:${VERSION}..."
            cosign sign --yes \
              ghcr.io/attune-io/charts/attune:${VERSION}
          done
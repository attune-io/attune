name: Fix chart README
on: workflow_dispatch
jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install ORAS
        run: |
          ORAS_VERSION="1.3.2"
          curl -sLO "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz"
          tar -xzf "oras_${ORAS_VERSION}_linux_amd64.tar.gz" oras
          chmod +x oras

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Re-push charts with README
        run: |
          for version in 0.1.0 0.1.2 0.1.3 0.1.4; do
            echo "=== Re-pushing chart version $version ==="
            yq -i ".version = \"$version\"" charts/attune/Chart.yaml

            # Pull existing chart to get its appVersion
            case $version in
              0.1.0) yq -i '.appVersion = "0.1.0"' charts/attune/Chart.yaml ;;
              0.1.2) yq -i '.appVersion = "0.1.2"' charts/attune/Chart.yaml ;;
              0.1.3) yq -i '.appVersion = "0.1.3"' charts/attune/Chart.yaml ;;
              0.1.4) yq -i '.appVersion = "0.1.4"' charts/attune/Chart.yaml ;;
            esac

            helm package charts/attune/
            helm push attune-${version}.tgz oci://ghcr.io/attune-io/charts
            rm -f attune-${version}.tgz
          done

      - name: Sign all chart versions
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | cosign login ghcr.io -u ${{ github.actor }} --password-stdin
          for version in 0.1.0 0.1.2 0.1.3 0.1.4; do
            echo "=== Signing chart version $version ==="
            cosign sign --yes ghcr.io/attune-io/charts/attune:${version}
          done

      - name: Push Artifact Hub metadata
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | ./oras login ghcr.io -u ${{ github.actor }} --password-stdin
          ./oras push \
            ghcr.io/attune-io/charts/attune:artifacthub.io \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml

site_name: kube-rightsize
site_description: Safe, in-place Kubernetes pod resource right-sizing
site_url: https://sebtardiflabs.github.io/kube-rightsize/
repo_url: https://github.com/SebTardifLabs/kube-rightsize
repo_name: SebTardifLabs/kube-rightsize
docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Why kube-rightsize?: why-kube-rightsize.md
  - Savings Calculator: savings-calculator.md
  - Getting Started:
      - Core Concepts: getting-started/concepts.md
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Guides:
      - Recommend Mode: guides/recommend-mode.md
      - Canary Rollout: guides/canary-rollout.md
      - Auto Mode: guides/auto-mode.md
      - HPA Coexistence: guides/hpa-coexistence.md
      - Prometheus Setup: guides/prometheus-setup.md
      - Istio Integration: guides/istio-integration.md
      - GitOps Integration: guides/gitops-integration.md
      - Migrating from VPA: guides/migrating-from-vpa.md
      - Troubleshooting: guides/troubleshooting.md
  - Reference:
      - API Reference: reference/api.md
      - CLI Reference: reference/cli.md
      - Configuration: reference/configuration.md
      - Metrics: reference/metrics.md
  - Architecture:
      - Design: architecture/design.md
      - Algorithm: architecture/algorithm.md
      - Resize API: architecture/resize-api.md
      - Safety: architecture/safety.md
  - Contributing:
      - Development: contributing/development.md
      - Testing: contributing/testing.md
      - Releasing: contributing/releasing.md
apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: rightsize
spec:
  version: v0.1.0
  homepage: https://github.com/SebTardifLabs/kube-rightsize
  shortDescription: View and manage kube-rightsize policies
  description: |
    Shows policy status, savings estimates, per-container recommendations,
    recommendation reasoning, and resize history for kube-rightsize policies.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/SebTardifLabs/kube-rightsize/releases/download/v0.1.0/kubectl-rightsize_linux_amd64.tar.gz
      sha256: PLACEHOLDER
      bin: kubectl-rightsize
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/SebTardifLabs/kube-rightsize/releases/download/v0.1.0/kubectl-rightsize_linux_arm64.tar.gz
      sha256: PLACEHOLDER
      bin: kubectl-rightsize
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/SebTardifLabs/kube-rightsize/releases/download/v0.1.0/kubectl-rightsize_darwin_amd64.tar.gz
      sha256: PLACEHOLDER
      bin: kubectl-rightsize
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/SebTardifLabs/kube-rightsize/releases/download/v0.1.0/kubectl-rightsize_darwin_arm64.tar.gz
      sha256: PLACEHOLDER
      bin: kubectl-rightsize

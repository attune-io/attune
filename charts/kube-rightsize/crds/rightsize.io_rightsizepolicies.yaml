          spec:
            description: RightSizePolicySpec defines the desired state of RightSizePolicy.
            properties:
              cpu:
                description: CPU configures CPU resource recommendations.
                properties:
                  allowDecrease:
                    description: |-
                      AllowDecrease controls whether the resource value can be decreased.
                      Only applicable to memory resources.
                    type: boolean

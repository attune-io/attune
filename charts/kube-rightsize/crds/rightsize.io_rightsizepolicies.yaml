                        properties:
                          key:
                            description: Key within the Secret.
                            type: string
                          name:
                            description: Name of the Secret.
                            type: string
                        required:
                        - key
                        - name
                        type: object
                      headers:
                        additionalProperties:
                          type: string
                        description: |-
                          Headers are custom HTTP headers added to every query request.

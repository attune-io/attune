                  and should not be right-sized.
                items:
                  type: string
                type: array
              memory:
                description: Memory configures memory resource recommendations.
                properties:
                  allowDecrease:
                    description: |-
                      AllowDecrease controls whether the resource value can be decreased.
                      Only applicable to memory resources.
                    type: boolean
                  bounds:
                    description: Bounds defines the minimum and maximum allowed resource

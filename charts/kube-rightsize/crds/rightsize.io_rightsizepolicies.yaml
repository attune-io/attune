                    properties:
                      max:
                        anyOf:
                        - type: integer
                        - type: string
                        description: Max is the maximum allowed resource value.
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      min:
                        anyOf:
                        - type: integer
                        - type: string
                        description: Min is the minimum allowed resource value.
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                    required:
                    - max
                    - min
                    type: object
                  burstSensitivity:
                    description: |-
                      BurstSensitivity controls how much burst detection inflates the
                      recommendation. Expressed as a decimal string multiplied by
                      log2(burstMagnitude). Default "0.1" gives ~20% boost for magnitude 4,

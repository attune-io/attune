suite: rbac tests
templates:
  - templates/clusterrole.yaml
tests:
  - it: should render ClusterRole
    asserts:
      - isKind:
          of: ClusterRole

  - it: should include rightsizepolicies permissions
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - rightsize.io
            resources:
              - rightsizepolicies
            verbs:
              - get
              - list
              - watch
              - patch

  - it: should include pod resize permissions
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - pods/resize
            verbs:
              - update
              - patch

  - it: should include HPA read permissions for conflict detection
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - autoscaling
            resources:
              - horizontalpodautoscalers
            verbs:
              - get
              - list
              - watch

  - it: should include node read permissions for capacity pre-check
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - nodes
            verbs:
              - get
              - list
              - watch

  - it: should include service read permissions for Prometheus auto-discovery
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - services
            verbs:
              - get

  - it: should include namespace defaults read permissions
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - rightsize.io
            resources:
              - rightsizedefaults
              - rightsizenamespacedefaults
            verbs:
              - get
              - list
              - watch

  - it: should include batch workload read permissions
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - batch
            resources:
              - cronjobs
              - jobs
            verbs:
              - get
              - list
              - watch

  - it: should include secret read permissions for bearer token
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - secrets
            verbs:
              - get
              - list
              - watch

  - it: should include resourcequotas and limitranges read permissions
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - ""
            resources:
              - resourcequotas
              - limitranges
            verbs:
              - get
              - list
              - watch
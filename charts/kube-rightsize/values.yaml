---
# kube-rightsize Helm chart values

# -- Number of operator replicas (use 2 for HA with leader election)
replicaCount: 1

image:
  # -- Container image repository
  repository: ghcr.io/sebtardiflabs/kube-rightsize
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (defaults to Chart appVersion)
  tag: ""

# -- Image pull secrets
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""
# -- Override the full name
fullnameOverride: ""

serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- Annotations to add to the ServiceAccount
  annotations: {}
  # -- ServiceAccount name (generated if not set)
  name: ""

# -- Pod annotations
podAnnotations: {}

# -- Pod security context
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# -- Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532

# -- Operator pod resources
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# -- Priority class name for the operator pod (recommended: system-cluster-critical for production)
priorityClassName: ""

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules
affinity: {}

# -- Topology spread constraints
topologySpreadConstraints: []

# -- Leader election (enable for HA with replicaCount > 1)
leaderElection:
  enabled: true

# -- Prometheus address is configured per-policy in RightSizePolicy.spec.metricsSource.prometheus.address
# -- or globally via the RightSizeDefaults CRD. It is NOT a chart value.

# -- Metrics endpoint
metrics:
  enabled: true
  port: 8080
  serviceMonitor:
    # -- Create a ServiceMonitor for Prometheus Operator
    enabled: false
    # -- Additional labels for the ServiceMonitor
    additionalLabels: {}
    # -- Scrape interval
    interval: 30s

grafanaDashboard:
  # -- Create a ConfigMap with the Grafana dashboard (auto-discovered by Grafana sidecar)
  enabled: false
  # -- Additional labels for the dashboard ConfigMap (e.g., for folder selection)
  additionalLabels: {}

# -- Webhook configuration (requires cert-manager installed in the cluster)
webhooks:
  # -- Enable admission webhooks for defaulting and validation.
  # -- Requires cert-manager to be installed for TLS certificate provisioning.
  enabled: true

# -- NetworkPolicy configuration for operator ingress and egress ports
networkPolicy:
  # -- Enable NetworkPolicy for the operator pod
  enabled: true
  # -- TCP port allowed by NetworkPolicy for Prometheus backend pods
  prometheusPort: 9090

# -- Cluster-wide defaults (creates a RightSizeDefaults CR)
defaults:
  # -- Create a RightSizeDefaults resource with the values below
  enabled: false
  # -- Default update strategy applied to all policies that don't override it
  updateStrategy:
    # -- Resize mode: Observe, Recommend, OneShot, Canary, Auto
    mode: Recommend
    # -- Cooldown between resize cycles (Go duration, minimum 1m)
    cooldown: "1h"
    # -- Auto-revert unsafe resizes
    autoRevert: true
    # -- Resize method: InPlaceOnly or InPlaceOrEvict
    resizeMethod: InPlaceOnly
    # -- Max concurrent pod resizes per cycle (1-50)
    maxConcurrentResizes: 1
    # -- Schedule restrictions (optional)
    # schedule:
    #   windows:
    #     - start: "02:00"
    #       end: "06:00"
    #   daysOfWeek: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"]
    #   timezone: "UTC"
    # -- Per-cycle budget caps (optional)
    # maxTotalCpuIncrease: "2000m"
    # maxTotalMemoryIncrease: "4Gi"

# -- Collector cache TTL for unused Prometheus connections (Go duration, e.g. "10m", "1h")
collectorTTL: "10m"

# -- Logging configuration
logging:
  # -- Log level (debug, info, warn, error)
  level: info
  # -- Log format (json, text)
  format: json

{{- /* This dashboard must cover the same kube_rightsize_* metrics as
       deploy/grafana/dashboard.json. Run hack/verify-dashboard-metrics.sh
       (or make verify-dashboard-metrics) to check for drift. */ -}}
{{- if .Values.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kube-rightsize.fullname" . }}-dashboard
  labels:
    {{- include "kube-rightsize.labels" . | nindent 4 }}
    grafana_dashboard: "1"
    {{- with .Values.grafanaDashboard.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  kube-rightsize.json: |-
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "type": "row",
          "title": "Overview",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "collapsed": false,
          "panels": []
        },
        {
          "type": "stat",
          "title": "Total Resizes",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 1 },
          "targets": [{ "expr": "sum(kube_rightsize_resize_total)" }],
          "fieldConfig": { "defaults": { "thresholds": { "steps": [{ "color": "green", "value": null }] } } }
        },
        {
          "type": "stat",
          "title": "Total Reverts",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 1 },
          "targets": [{ "expr": "sum(kube_rightsize_reverts_total)" }],
          "fieldConfig": { "defaults": { "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 1 }] } } }
        },
        {
          "type": "stat",
          "title": "CPU Cores Saved",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 1 },
          "targets": [{ "expr": "sum(kube_rightsize_savings_cpu_cores_total)" }],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "type": "stat",
          "title": "Memory Saved",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 1 },
          "targets": [{ "expr": "sum(kube_rightsize_savings_memory_bytes_total)" }],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "type": "timeseries",
          "title": "Resize Operations by Result",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 5 },
          "targets": [{ "expr": "sum by (result) (rate(kube_rightsize_resize_total[5m]))", "legendFormat": "{{`{{result}}`}}" }]
        },
        {
          "type": "timeseries",
          "title": "Reverts by Reason",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 5 },
          "targets": [{ "expr": "sum by (reason) (rate(kube_rightsize_reverts_total[5m]))", "legendFormat": "{{`{{reason}}`}}" }]
        },
        {
          "type": "timeseries",
          "title": "Resize Method Breakdown",
          "description": "In-place resizes vs eviction fallback",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 13 },
          "targets": [{ "expr": "sum by (resource) (rate(kube_rightsize_resize_total{result=\"success\"}[5m]))", "legendFormat": "{{`{{resource}}`}}" }]
        },
        {
          "type": "stat",
          "title": "Estimated Monthly Savings",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 13 },
          "targets": [{ "expr": "sum(kube_rightsize_savings_estimated_monthly_dollars)" }],
          "fieldConfig": { "defaults": { "unit": "currencyUSD", "thresholds": { "steps": [{ "color": "green", "value": null }] } } }
        },
        {
          "type": "timeseries",
          "title": "Resize Duration (p99)",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 13 },
          "targets": [{ "expr": "histogram_quantile(0.99, rate(kube_rightsize_resize_duration_seconds_bucket[5m]))" }],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "type": "timeseries",
          "title": "Schedule Skips & Budget Exhaustion",
          "description": "Resize deferrals due to schedule windows or budget caps",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 21 },
          "targets": [
            { "expr": "sum(rate(kube_rightsize_schedule_skipped_total[5m]))", "legendFormat": "schedule skipped" },
            { "expr": "sum(rate(kube_rightsize_budget_exhausted_total[5m]))", "legendFormat": "budget exhausted" },
            { "expr": "sum(rate(kube_rightsize_infeasible_skipped_total[5m]))", "legendFormat": "infeasible skipped" }
          ]
        },
        {
          "type": "timeseries",
          "title": "Eviction Attempts",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 21 },
          "targets": [{ "expr": "sum by (result) (rate(kube_rightsize_eviction_total[5m]))", "legendFormat": "{{`{{result}}`}}" }]
        },
        {
          "type": "row",
          "title": "Webhook Health",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 29 },
          "collapsed": false,
          "panels": []
        },
        {
          "type": "timeseries",
          "title": "Webhook Validation Rate",
          "description": "Covers RightSizePolicy (validate_create, validate_update, defaulting) and RightSizeDefaults (defaults_validate_create, defaults_validate_update) webhooks.",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 30 },
          "targets": [{ "expr": "sum by (operation, result) (rate(kube_rightsize_webhook_validation_total[5m]))", "legendFormat": "{{`{{operation}}`}} {{`{{result}}`}}" }]
        },
        {
          "type": "timeseries",
          "title": "Webhook Duration (p99)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 30 },
          "targets": [
            { "expr": "histogram_quantile(0.99, sum by (le, operation) (rate(kube_rightsize_webhook_duration_seconds_bucket[5m])))", "legendFormat": "p99 {{`{{operation}}`}}" },
            { "expr": "histogram_quantile(0.50, sum by (le, operation) (rate(kube_rightsize_webhook_duration_seconds_bucket[5m])))", "legendFormat": "p50 {{`{{operation}}`}}" }
          ],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "type": "row",
          "title": "Recommendations",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 39 },
          "collapsed": false,
          "panels": []
        },
        {
          "type": "timeseries",
          "title": "Recommended CPU (cores)",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 40 },
          "targets": [{ "expr": "kube_rightsize_recommendation_cpu_cores", "legendFormat": "{{`{{workload}}`}}/{{`{{container}}`}}" }],
          "fieldConfig": { "defaults": { "unit": "short" } }
        },
        {
          "type": "timeseries",
          "title": "Recommended Memory",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 40 },
          "targets": [{ "expr": "kube_rightsize_recommendation_memory_bytes", "legendFormat": "{{`{{workload}}`}}/{{`{{container}}`}}" }],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "type": "gauge",
          "title": "Recommendation Confidence",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 48 },
          "targets": [{ "expr": "kube_rightsize_confidence", "legendFormat": "{{`{{workload}}`}}/{{`{{container}}`}}" }],
          "fieldConfig": { "defaults": { "min": 0, "max": 1, "thresholds": { "steps": [{ "color": "red", "value": null }, { "color": "yellow", "value": 0.5 }, { "color": "green", "value": 0.8 }] } } }
        },
        {
          "type": "timeseries",
          "title": "Burst Factor",
          "description": "Burst detection multiplier applied to recommendations (1.0 = no burst detected)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 48 },
          "targets": [{ "expr": "kube_rightsize_burst_factor", "legendFormat": "{{`{{workload}}`}}/{{`{{container}}`}} ({{`{{resource}}`}})" }],
          "fieldConfig": { "defaults": { "min": 1, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1.1 }, { "color": "orange", "value": 1.3 }] } } }
        },
        {
          "type": "row",
          "title": "Operator Health",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 56 },
          "collapsed": false,
          "panels": []
        },
        {
          "type": "timeseries",
          "title": "Reconcile Duration",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 57 },
          "targets": [{ "expr": "histogram_quantile(0.99, rate(kube_rightsize_reconcile_duration_seconds_bucket[5m]))" }],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "type": "timeseries",
          "title": "Prometheus Query Duration",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 57 },
          "targets": [{ "expr": "histogram_quantile(0.99, sum by (le, query_type) (rate(kube_rightsize_prometheus_query_duration_seconds_bucket[5m])))" }],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "type": "stat",
          "title": "Query Errors",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 57 },
          "targets": [{ "expr": "sum(rate(kube_rightsize_prometheus_query_errors_total[5m]))" }],
          "fieldConfig": { "defaults": { "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 0.01 }] } } }
        }
      ],
      "schemaVersion": 39,
      "tags": ["kube-rightsize", "kubernetes"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "title": "kube-rightsize",
      "uid": "kube-rightsize"
    }
{{- end }}

{{- /* This dashboard is generated from deploy/grafana/dashboard.json.
       Run hack/verify-dashboard-metrics.sh (or make verify-dashboard-metrics)
       to confirm charts/kube-rightsize/files/grafana-dashboard.json is in sync. */ -}}
{{- if .Values.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kube-rightsize.fullname" . }}-dashboard
  labels:
    {{- include "kube-rightsize.labels" . | nindent 4 }}
    grafana_dashboard: "1"
    {{- with .Values.grafanaDashboard.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  kube-rightsize.json: |-
{{ .Files.Get "files/grafana-dashboard.json" | indent 4 }}
{{- end }}

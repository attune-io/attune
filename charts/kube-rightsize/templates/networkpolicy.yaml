{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kube-rightsize.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-rightsize.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kube-rightsize.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  {{- if or .Values.webhooks.enabled .Values.metrics.enabled }}
  ingress:
    {{- if .Values.webhooks.enabled }}
    # Webhook server port
    - ports:
        - port: 9443
          protocol: TCP
    {{- end }}
    {{- if .Values.metrics.enabled }}
    # Metrics endpoint port
    - ports:
        - port: {{ .Values.metrics.port }}
          protocol: TCP
    {{- end }}
  {{- else }}
  # Deny all ingress when webhook and metrics endpoints are disabled
  ingress: []
  {{- end }}
  egress:
    # Kubernetes API server
    - ports:
        - port: 443
          protocol: TCP
    # DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Prometheus (configurable port)
    - ports:
        - port: {{ .Values.networkPolicy.prometheusPort | default 80 }}
          protocol: TCP
{{- end }}

{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kube-rightsize.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-rightsize.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kube-rightsize.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Health probes (liveness/readiness on port 8081, required by kubelet)
    - ports:
        - port: 8081
          protocol: TCP
    {{- if .Values.webhooks.enabled }}
    # Webhook server port
    - ports:
        - port: 9443
          protocol: TCP
    {{- end }}
    {{- if .Values.metrics.enabled }}
    # Metrics endpoint port
    - ports:
        - port: {{ .Values.metrics.port }}
          protocol: TCP
    {{- end }}
  egress:
    # Kubernetes API server
    - ports:
        - port: 443
          protocol: TCP
    # DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Prometheus backend pods (configurable port)
    - ports:
        - port: {{ .Values.networkPolicy.prometheusPort | default 9090 }}
          protocol: TCP
{{- end }}

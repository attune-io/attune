{{- if .Values.webhooks.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "kube-rightsize.fullname" . }}-mutating
  labels:
    {{- include "kube-rightsize.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "kube-rightsize.fullname" . }}-webhook
webhooks:
  - name: defaulting.rightsize.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: {{ include "kube-rightsize.fullname" . }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /mutate-rightsize-io-v1alpha1-rightsizepolicy
    failurePolicy: Fail
    rules:
      - apiGroups: ["rightsize.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["rightsizepolicies"]
    sideEffects: None
{{- if .Values.initialSizing.enabled }}
  - name: pod-initial-sizing.rightsize.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: {{ include "kube-rightsize.fullname" . }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /mutate-v1-pod
    failurePolicy: Ignore
    reinvocationPolicy: IfNeeded
    namespaceSelector:
      matchExpressions:
        - key: rightsize.io/initial-sizing
          operator: In
          values: ["enabled"]
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
    sideEffects: None
{{- end }}
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "kube-rightsize.fullname" . }}-validating
  labels:
    {{- include "kube-rightsize.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "kube-rightsize.fullname" . }}-webhook
webhooks:
  - name: validation.rightsize.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: {{ include "kube-rightsize.fullname" . }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /validate-rightsize-io-v1alpha1-rightsizepolicy
    failurePolicy: Fail
    rules:
      - apiGroups: ["rightsize.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["rightsizepolicies"]
    sideEffects: None
  - name: validation-defaults.rightsize.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: {{ include "kube-rightsize.fullname" . }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /validate-rightsize-io-v1alpha1-rightsizedefaults
    failurePolicy: Fail
    rules:
      - apiGroups: ["rightsize.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["rightsizedefaults"]
    sideEffects: None
  - name: validation-namespace-defaults.rightsize.io
    admissionReviewVersions: ["v1"]
    clientConfig:
      service:
        name: {{ include "kube-rightsize.fullname" . }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /validate-rightsize-io-v1alpha1-rightsizenamespacedefaults
    failurePolicy: Fail
    rules:
      - apiGroups: ["rightsize.io"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["rightsizenamespacedefaults"]
    sideEffects: None
{{- end }}

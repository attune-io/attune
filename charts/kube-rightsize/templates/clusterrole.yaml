apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kube-rightsize.fullname" . }}
  labels:
    {{- include "kube-rightsize.labels" . | nindent 4 }}
rules:
  # RightSizePolicy CRDs: read + patch (annotations)
  - apiGroups:
      - rightsize.io
    resources:
      - rightsizepolicies
    verbs:
      - get
      - list
      - watch
      - patch
  - apiGroups:
      - rightsize.io
    resources:
      - rightsizepolicies/status
    verbs:
      - get
      - update
  # RightSizeDefaults: read-only
  - apiGroups:
      - rightsize.io
    resources:
      - rightsizedefaults
    verbs:
      - get
      - list
      - watch
  # Workload controllers: read-only
  - apiGroups:
      - apps
    resources:
      - deployments
      - statefulsets
      - daemonsets
    verbs:
      - get
      - list
      - watch
  # Pods: read + update (tracking annotations) + resize subresource
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - update
      - watch
  - apiGroups:
      - ""
    resources:
      - pods/resize
    verbs:
      - update
      - patch
  # Events: read (OOMKill detection) + create (operator events)
  - apiGroups:
      - events.k8s.io
    resources:
      - events
    verbs:
      - get
      - list
      - watch
      - create
      - patch
  # HPA: read-only (conflict detection)
  - apiGroups:
      - autoscaling
    resources:
      - horizontalpodautoscalers
    verbs:
      - get
      - list
      - watch
  # VPA: read-only (conflict detection)
  - apiGroups:
      - autoscaling.k8s.io
    resources:
      - verticalpodautoscalers
    verbs:
      - get
      - list
      - watch
  # Prometheus Operator: read-only (auto-discovery)
  - apiGroups:
      - monitoring.coreos.com
    resources:
      - prometheuses
    verbs:
      - get
      - list
  # Nodes: read-only (capacity pre-check before resize)
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
      - list
      - watch
  # Services: read-only (Prometheus auto-discovery via well-known service names)
  - apiGroups:
      - ""
    resources:
      - services
    verbs:
      - get
  # ResourceQuotas and LimitRanges: read-only (pre-resize compatibility checks)
  - apiGroups:
      - ""
    resources:
      - resourcequotas
      - limitranges
    verbs:
      - get
      - list
      - watch

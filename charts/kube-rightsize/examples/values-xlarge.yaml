# kube-rightsize values for extra-large clusters (5,000+ workloads)
#
# Install with: helm install kube-rightsize ./charts/kube-rightsize -f examples/values-xlarge.yaml
# Or simply:    helm install kube-rightsize ./charts/kube-rightsize --set clusterSize=xlarge
#
# See docs/guides/scaling.md for details.

clusterSize: xlarge

# HA is strongly recommended at this scale.
leaderElection:
  enabled: true
priorityClassName: system-cluster-critical

# Equivalent explicit values (for reference):
#   replicaCount: 2              (auto-set by xlarge preset)
#   resources:
#     requests: { cpu: 1000m, memory: 1Gi }
#     limits:   { cpu: 4000m, memory: 4Gi }
#   prometheusQPS: 80
#   prometheusBurst: 160

# Recommended RightSizePolicy CRD settings for extra-large clusters:
#   cooldown: "4h"
#   historyWindow: "48h"     # 2 days (critical for Prometheus at this scale)
#   queryStep: "30m"
#   maxConcurrentResizes: 20

# Prometheus considerations at this scale:
# - Ensure your Prometheus has at least 8Gi memory and fast SSD storage
# - Consider using Thanos or Cortex for query federation
# - Use recording rules to pre-aggregate kube-rightsize queries
# - Monitor kube-rightsize operator memory; increase limits if OOMKilled

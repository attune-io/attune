---
# attune Helm chart values

# -- Number of operator replicas (use 2 for HA with leader election)
replicaCount: 1

image:
  # -- Container image repository
  repository: ghcr.io/attune-io/attune
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (defaults to Chart appVersion)
  tag: ""

# -- Image pull secrets
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""
# -- Override the full name
fullnameOverride: ""

serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- Annotations to add to the ServiceAccount
  annotations: {}
  # -- ServiceAccount name (generated if not set)
  name: ""

# -- Pod annotations
podAnnotations: {}

# -- Pod security context
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# -- Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532

# -- Operator pod resources. When empty, defaults are derived from clusterSize (or "small" if clusterSize is also empty). Set explicit values for production.
resources: {}

# -- Priority class name for the operator pod (recommended: system-cluster-critical for production)
priorityClassName: ""

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules
affinity: {}

# -- Topology spread constraints
topologySpreadConstraints: []

# -- Leader election (enable for HA with replicaCount > 1)
leaderElection:
  enabled: true

# Prometheus address is configured per-policy in AttunePolicy.spec.metricsSource.prometheus.address
# or globally via the AttuneDefaults CRD. It is NOT a chart value.

# -- Metrics endpoint
metrics:
  enabled: true
  port: 8080
  serviceMonitor:
    # -- Create a ServiceMonitor for Prometheus Operator
    enabled: false
    # -- Additional labels for the ServiceMonitor
    additionalLabels: {}
    # -- Scrape interval
    interval: 30s
  prometheusRule:
    # -- Create a PrometheusRule for out-of-the-box alerting.
    # Requires the Prometheus Operator CRDs (monitoring.coreos.com/v1).
    enabled: false
    # -- Additional labels for the PrometheusRule
    additionalLabels: {}
    # -- Override default alert rules. Each key matches a rule name;
    # set enabled: false to disable individual rules.
    rules:
      reconcileErrors:
        enabled: true
        # -- Error rate threshold (per second, averaged over 5m)
        threshold: "0"
        # -- How long the condition must persist before firing
        for: 10m
        severity: warning
      prometheusUnreachable:
        enabled: true
        for: 10m
        severity: warning
      degraded:
        enabled: true
        for: 5m
        severity: critical
      highRevertRate:
        enabled: true
        # -- Revert rate threshold (fraction, e.g. 0.5 = 50%)
        threshold: "0.5"
        # -- How long the condition must persist before firing
        for: 15m
        severity: critical
      reconcileStale:
        enabled: true
        # -- Fire when no reconcile completes within this duration
        staleDuration: 30m
        for: 5m
        severity: warning

grafanaDashboard:
  # -- Create a ConfigMap with the Grafana dashboard (auto-discovered by Grafana sidecar)
  enabled: false
  # -- Additional labels for the dashboard ConfigMap (e.g., for folder selection)
  additionalLabels: {}

# -- Webhook configuration (requires cert-manager installed in the cluster)
webhooks:
  # -- Enable admission webhooks for defaulting and validation. Requires cert-manager to be installed for TLS certificate provisioning.
  enabled: true

# -- Initial sizing webhook configuration.
# When enabled, a mutating webhook sets pod resource requests at creation time
# based on existing AttunePolicy recommendations. Requires namespace label
# attune.io/initial-sizing=enabled and initialSizing: true on the policy.
initialSizing:
  # -- Enable the pod initial sizing mutating webhook.
  enabled: false

# -- NetworkPolicy configuration for operator ingress and egress ports
networkPolicy:
  # -- Enable NetworkPolicy for the operator pod
  enabled: true
  # -- TCP port allowed by NetworkPolicy for Prometheus backend pods
  prometheusPort: 9090

# -- Cluster-wide defaults (creates a AttuneDefaults CR)
defaults:
  # -- Create a AttuneDefaults resource with the values below
  enabled: false
  # -- Prometheus metrics source defaults. Set `metricsSource.prometheus.address`
  # to share a Prometheus endpoint across all policies.
  # metricsSource:
  #   prometheus:
  #     address: "http://prometheus-server.monitoring:80"
  #   historyWindow: "168h"
  #   minimumDataPoints: 48
  #   queryStep: "5m"
  # -- CPU resource configuration defaults
  # cpu:
  #   percentile: 95
  #   overhead: "20"
  #   minAllowed: "50m"
  #   maxAllowed: "4000m"
  # -- Memory resource configuration defaults
  # memory:
  #   percentile: 99
  #   overhead: "30"
  #   minAllowed: "64Mi"
  #   maxAllowed: "8Gi"
  # -- Cost pricing defaults for savings estimates
  # costPricing:
  #   cpuPerCorePerHour: "0.031"
  #   memoryPerGiBPerHour: "0.004"
  # -- Default update strategy applied to all policies that don't override it
  updateStrategy:
    # -- Resize type: Observe, Recommend, OneShot, Canary, Auto
    type: Recommend
    # -- Cooldown between resize cycles (Go duration, minimum 1m)
    cooldown: "1h"
    # -- Auto-revert unsafe resizes
    autoRevert: true
    # -- Resize method: InPlaceOnly or InPlaceOrRecreate
    resizeMethod: InPlaceOnly
    # -- Max concurrent pod resizes per cycle (1-50)
    maxConcurrentResizes: 1
    # -- Schedule restrictions (optional)
    # schedule:
    #   windows:
    #     - start: "02:00"
    #       end: "06:00"
    #   daysOfWeek: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"]
    #   timezone: "UTC"
    # -- Per-cycle budget caps (optional)
    # maxTotalCpuIncrease: "2000m"
    # maxTotalMemoryIncrease: "4Gi"

# -- Cluster size preset: sets resources, rate limits, and replica count.
# Valid values: small, medium, large, xlarge, or "" (no preset).
# Any explicitly set value overrides the preset. See docs/guides/scaling.md for details.
clusterSize: ""

# -- Prometheus query rate limit (queries per second). Higher values reduce reconcile latency but increase Prometheus load.
prometheusQPS: 10

# -- Prometheus query burst allowance.
prometheusBurst: 20

# -- Collector cache TTL for unused Prometheus connections (Go duration, e.g. "10m", "1h")
collectorTTL: "10m"

# -- Maximum time for workload processing (including Prometheus queries) per reconciliation cycle (Go duration). If exceeded, partial results are used and the status condition indicates the timeout.
prometheusTimeout: "5m"

# -- Maximum number of AttunePolicy reconciles running in parallel.
# Increase for large clusters with many policies (e.g. 4 for 200+ policies).
maxConcurrentReconciles: ""

# -- Namespaces to watch for AttunePolicy resources. Empty means all namespaces (cluster-scoped).
# Set this to reduce informer cache memory on large clusters where policies exist in only a few
# namespaces. Cluster-scoped resources (Nodes, AttuneDefaults) are always watched regardless.
watchNamespaces: []

# -- Logging configuration
logging:
  # -- Log level (debug, info, warn, error)
  level: info
  # -- Log format (json, text)
  format: json

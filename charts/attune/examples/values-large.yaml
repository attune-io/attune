# attune values for large clusters (~500-5,000 workloads)
#
# Install with: helm install attune ./charts/attune -f examples/values-large.yaml
# Or simply:    helm install attune ./charts/attune --set clusterSize=large
#
# See docs/guides/scaling.md for details.

clusterSize: large

# For production, consider enabling HA:
leaderElection:
  enabled: true
priorityClassName: system-cluster-critical

# Equivalent explicit values (for reference):
#   replicaCount: 2              (auto-set by large preset)
#   resources:
#     requests: { cpu: 500m, memory: 512Mi }
#     limits:   { cpu: 2000m, memory: 2Gi }
#   prometheusQPS: 40
#   prometheusBurst: 80

# Recommended AttunePolicy CRD settings for large clusters:
#   cooldown: "2h"
#   historyWindow: "72h"     # 3 days (reduces Prometheus response size)
#   queryStep: "15m"
#   maxConcurrentResizes: 10

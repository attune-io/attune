# attune values for medium clusters (~100-500 workloads)
#
# Install with: helm install attune ./charts/attune -f examples/values-medium.yaml
# Or simply:    helm install attune ./charts/attune --set clusterSize=medium
#
# See docs/guides/scaling.md for details.

clusterSize: medium

# Equivalent explicit values (for reference):
#   replicaCount: 1
#   resources:
#     requests: { cpu: 250m, memory: 256Mi }
#     limits:   { cpu: 1000m, memory: 512Mi }
#   prometheusQPS: 20
#   prometheusBurst: 40

# Recommended AttunePolicy CRD settings for medium clusters:
#   cooldown: "1h"
#   historyWindow: "168h"    # 7 days
#   queryStep: "5m"
#   maxConcurrentResizes: 3

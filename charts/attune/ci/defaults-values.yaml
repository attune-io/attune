---
# CI test: defaults enabled with cpu/memory/costPricing/updateStrategy
defaults:
  enabled: true
  cpu:
    percentile: 95
    overhead: "20"
    maxIncreasePercent: 80
    maxDecreasePercent: 20
  memory:
    percentile: 99
    overhead: "30"
    allowDecrease: false
  costPricing:
    cpuPerCoreHour: "0.031"
    memoryPerGiBHour: "0.004"
  updateStrategy:
    type: Recommend
    cooldown: "1h"
    autoRevert: true
    resizeMethod: InPlaceOnly
    maxConcurrentResizes: 1
webhooks:
  enabled: false

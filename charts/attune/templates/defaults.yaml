{{- if .Values.defaults.enabled }}
apiVersion: attune.io/v1alpha1
kind: AttuneDefaults
metadata:
  name: {{ include "attune.fullname" . }}-defaults
  labels:
    {{- include "attune.labels" . | nindent 4 }}
spec:
  {{- with .Values.defaults.metricsSource }}
  metricsSource:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.defaults.cpu }}
  cpu:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.defaults.memory }}
  memory:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.defaults.costPricing }}
  costPricing:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if kindIs "bool" .Values.defaults.excludeKnownSidecars }}
  excludeKnownSidecars: {{ .Values.defaults.excludeKnownSidecars }}
  {{- end }}
  {{- with .Values.defaults.updateStrategy }}
  updateStrategy:
    type: {{ .type | default "Recommend" }}
    {{- if .cooldown }}
    cooldown: {{ .cooldown }}
    {{- end }}
    {{- if kindIs "bool" .autoRevert }}
    autoRevert: {{ .autoRevert }}
    {{- else }}
    autoRevert: true
    {{- end }}
    resizeMethod: {{ .resizeMethod | default "InPlaceOnly" }}
    maxConcurrentResizes: {{ .maxConcurrentResizes | default 1 }}
    {{- with .schedule }}
    schedule:
      {{- with .windows }}
      windows:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .daysOfWeek }}
      daysOfWeek:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .timezone }}
      timezone: {{ . }}
      {{- end }}
    {{- end }}
    {{- with .maxTotalCpuIncrease }}
    maxTotalCpuIncrease: {{ . }}
    {{- end }}
    {{- with .maxTotalMemoryIncrease }}
    maxTotalMemoryIncrease: {{ . }}
    {{- end }}
    {{- with .safetyObservationPeriod }}
    safetyObservationPeriod: {{ . }}
    {{- end }}
    {{- with .canary }}
    canary:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with .export }}
    export:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- if kindIs "bool" .initialSizing }}
    initialSizing: {{ .initialSizing }}
    {{- end }}
    {{- with .sloGuardrails }}
    sloGuardrails:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}
{{- end }}

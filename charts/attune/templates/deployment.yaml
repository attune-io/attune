apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "attune.fullname" . }}
  labels:
    {{- include "attune.labels" . | nindent 4 }}
spec:
  replicas: {{ include "attune.replicaCount" . }}
  selector:
    matchLabels:
      {{- include "attune.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "attune.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "attune.serviceAccountName" . }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      terminationGracePeriodSeconds: 60
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --health-probe-bind-address=:8081
            {{- if .Values.metrics.enabled }}
            - --metrics-bind-address=:{{ .Values.metrics.port }}
            {{- else }}
            - --metrics-bind-address=0
            {{- end }}
            {{- if .Values.leaderElection.enabled }}
            - --leader-elect
            {{- end }}
            {{- if hasKey .Values "webhooks" }}
            {{- if not .Values.webhooks.enabled }}
            - --enable-webhooks=false
            {{- end }}
            {{- end }}
            - --prometheus-qps={{ include "attune.prometheusQPS" . | trim }}
            - --prometheus-burst={{ include "attune.prometheusBurst" . | trim }}
            {{- if .Values.collectorTTL }}
            - --collector-ttl={{ .Values.collectorTTL }}
            {{- end }}
            {{- if .Values.prometheusTimeout }}
            - --prometheus-timeout={{ .Values.prometheusTimeout }}
            {{- end }}
            {{- $mcr := include "attune.maxConcurrentReconciles" . | trim }}
            {{- if $mcr }}
            - --max-concurrent-reconciles={{ $mcr }}
            {{- end }}
            {{- if .Values.watchNamespaces }}
            - --watch-namespaces={{ join "," .Values.watchNamespaces }}
            {{- end }}
            {{- with .Values.logging }}
            {{- if .level }}
            - --zap-log-level={{ .level }}
            {{- end }}
            {{- if eq .format "text" }}
            - --zap-encoder=console
            {{- end }}
            {{- end }}
          {{- if .Values.fips.enabled }}
          env:
            - name: GODEBUG
              value: "fips140={{ .Values.fips.mode }}"
          {{- end }}
          ports:
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
            - name: health
              containerPort: 8081
              protocol: TCP
            {{- if .Values.webhooks.enabled }}
            - name: webhook
              containerPort: 9443
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- include "attune.resources" . | nindent 12 }}
          {{- if .Values.webhooks.enabled }}
          volumeMounts:
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
          {{- end }}
      {{- if .Values.webhooks.enabled }}
      volumes:
        - name: webhook-certs
          secret:
            secretName: {{ include "attune.fullname" . }}-webhook-tls
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}

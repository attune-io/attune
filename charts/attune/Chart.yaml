apiVersion: v2
name: attune
description: Safe, in-place Kubernetes pod resource right-sizing operator
type: application
version: 0.1.15
appVersion: 0.1.15
icon: https://raw.githubusercontent.com/attune-io/attune/main/docs/logo.png
home: https://github.com/attune-io/attune
sources:
  - https://github.com/attune-io/attune
maintainers:
  - name: SebTardif
    url: https://github.com/SebTardif
keywords:
  - kubernetes
  - operator
  - attune
  - vpa
  - autoscaling
  - cost-optimization
  - finops
  - in-place-resize
kubeVersion: '>= 1.32.0-0'
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/operator: 'true'
  artifacthub.io/category: monitoring-logging
  artifacthub.io/operatorCapabilities: Auto Pilot
  artifacthub.io/crds: |
    - kind: AttunePolicy
      version: v1alpha1
      name: attunepolicies.attune.io
      displayName: Attune Policy
      description: Defines resource right-sizing policy for matched pods
    - kind: AttuneDefaults
      version: v1alpha1
      name: attunedefaults.attune.io
      displayName: Attune Defaults
      description: Cluster-wide default values for Attune policies
    - kind: AttuneNamespaceDefaults
      version: v1alpha1
      name: attunenamespacedefaults.attune.io
      displayName: Attune Namespace Defaults
      description: Namespace-scoped default values for Attune policies
  artifacthub.io/links: |
    - name: Documentation
      url: https://attune-io.github.io/attune/
    - name: Source
      url: https://github.com/attune-io/attune
  artifacthub.io/images: |
    - name: attune
      image: ghcr.io/attune-io/attune:latest

suite: defaults tests
templates:
  - templates/defaults.yaml
tests:
  - it: should not render when defaults.enabled is false
    set:
      defaults:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render AttuneDefaults with default values
    set:
      defaults:
        enabled: true
    asserts:
      - isKind:
          of: AttuneDefaults
      - equal:
          path: spec.updateStrategy.type
          value: Recommend
      - equal:
          path: spec.updateStrategy.autoRevert
          value: true
      - equal:
          path: spec.updateStrategy.resizeMethod
          value: InPlaceOnly
      - equal:
          path: spec.updateStrategy.maxConcurrentResizes
          value: 1
      - equal:
          path: spec.updateStrategy.cooldown
          value: "1h"

  - it: should render autoRevert false when explicitly disabled
    set:
      defaults:
        enabled: true
        updateStrategy:
          autoRevert: false
    asserts:
      - equal:
          path: spec.updateStrategy.autoRevert
          value: false

  - it: should render maxChangePercent in cpu and memory
    set:
      defaults:
        enabled: true
        cpu:
          maxChangePercent: 25
        memory:
          maxChangePercent: 50
    asserts:
      - equal:
          path: spec.cpu.maxChangePercent
          value: 25
      - equal:
          path: spec.memory.maxChangePercent
          value: 50

  - it: should render export.configMap as boolean
    set:
      defaults:
        enabled: true
        updateStrategy:
          export:
            configMap: true
    asserts:
      - equal:
          path: spec.updateStrategy.export.configMap
          value: true

  - it: should render schedule windows
    set:
      defaults:
        enabled: true
        updateStrategy:
          schedule:
            windows:
              - start: "02:00"
                end: "06:00"
            daysOfWeek:
              - Monday
              - Wednesday
            timezone: US/Eastern
    asserts:
      - equal:
          path: spec.updateStrategy.schedule.windows[0].start
          value: "02:00"
      - equal:
          path: spec.updateStrategy.schedule.windows[0].end
          value: "06:00"
      - equal:
          path: spec.updateStrategy.schedule.daysOfWeek[0]
          value: Monday
      - equal:
          path: spec.updateStrategy.schedule.timezone
          value: US/Eastern

  - it: should render budget caps
    set:
      defaults:
        enabled: true
        updateStrategy:
          maxTotalCpuIncrease: "2000m"
          maxTotalMemoryIncrease: "4Gi"
    asserts:
      - equal:
          path: spec.updateStrategy.maxTotalCpuIncrease
          value: "2000m"
      - equal:
          path: spec.updateStrategy.maxTotalMemoryIncrease
          value: "4Gi"

  - it: should render initialSizing when set
    set:
      defaults:
        enabled: true
        updateStrategy:
          initialSizing: true
    asserts:
      - equal:
          path: spec.updateStrategy.initialSizing
          value: true

  - it: should render sloGuardrails when set
    set:
      defaults:
        enabled: true
        updateStrategy:
          sloGuardrails:
            - name: error-rate
              query: 'rate(http_errors_total{namespace="{{ .Namespace }}"}[5m])'
              threshold: "0.01"
              comparison: above
    asserts:
      - equal:
          path: spec.updateStrategy.sloGuardrails[0].name
          value: error-rate
      - equal:
          path: spec.updateStrategy.sloGuardrails[0].threshold
          value: "0.01"
      - equal:
          path: spec.updateStrategy.sloGuardrails[0].comparison
          value: above
  - it: should render excludeKnownSidecars when set to false
    set:
      defaults:
        enabled: true
        excludeKnownSidecars: false
    asserts:
      - equal:
          path: spec.excludeKnownSidecars
          value: false

  - it: should omit excludeKnownSidecars when unset
    set:
      defaults:
        enabled: true
    asserts:
      - notExists:
          path: spec.excludeKnownSidecars

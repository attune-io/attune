suite: servicemonitor tests
templates:
  - templates/servicemonitor.yaml
tests:
  - it: should not render when serviceMonitor disabled
    set:
      metrics.enabled: true
      metrics.serviceMonitor.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when serviceMonitor enabled
    set:
      metrics.enabled: true
      metrics.serviceMonitor.enabled: true
    asserts:
      - isKind:
          of: ServiceMonitor
      - equal:
          path: spec.endpoints[0].port
          value: metrics
      - equal:
          path: spec.endpoints[0].interval
          value: 30s

  - it: should use custom interval
    set:
      metrics.enabled: true
      metrics.serviceMonitor.enabled: true
      metrics.serviceMonitor.interval: 15s
    asserts:
      - equal:
          path: spec.endpoints[0].interval
          value: 15s

  - it: should include additional labels
    set:
      metrics.enabled: true
      metrics.serviceMonitor.enabled: true
      metrics.serviceMonitor.additionalLabels:
        team: platform
    asserts:
      - equal:
          path: metadata.labels.team
          value: platform
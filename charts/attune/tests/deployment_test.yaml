suite: deployment tests
templates:
  - templates/deployment.yaml
tests:
  - it: should render deployment with defaults
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true

  - it: should set replicas from values
    set:
      replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should enable leader election when set
    set:
      leaderElection.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --leader-elect

  - it: should expose webhook port when webhooks enabled
    set:
      webhooks.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: webhook
            containerPort: 9443
            protocol: TCP

  - it: should mount webhook certs when webhooks enabled
    set:
      webhooks.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: webhook-certs
            mountPath: /tmp/k8s-webhook-server/serving-certs
            readOnly: true

  - it: should pass collector-ttl arg with default value
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --collector-ttl=10m

  - it: should pass custom collector-ttl arg
    set:
      collectorTTL: "30m"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --collector-ttl=30m

  - it: should accept compound Go duration for collector-ttl
    set:
      collectorTTL: "1h30m"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --collector-ttl=1h30m

  - it: should pass prometheus-timeout arg with default value
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --prometheus-timeout=5m

  - it: should pass custom prometheus-timeout arg
    set:
      prometheusTimeout: "10m"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --prometheus-timeout=10m

  - it: should disable metrics server when metrics disabled
    set:
      metrics.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --metrics-bind-address=0

  - it: should disable webhooks via flag
    set:
      webhooks.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --enable-webhooks=false
      - notContains:
          path: spec.template.spec.containers[0].ports
          content:
            name: webhook
          any: true

  # --- Prometheus rate limit args ---

  - it: should pass default prometheus-qps and prometheus-burst args
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --prometheus-qps=10
      - contains:
          path: spec.template.spec.containers[0].args
          content: --prometheus-burst=20

  - it: should pass explicit prometheus-qps override
    set:
      prometheusQPS: 50
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --prometheus-qps=50

  - it: should pass explicit prometheus-burst override
    set:
      prometheusBurst: 100
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --prometheus-burst=100

  # --- clusterSize presets ---

  - it: should apply small preset defaults with no clusterSize
    asserts:
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.template.spec.containers[0].resources
          value:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi

  - it: should apply medium preset values
    set:
      clusterSize: medium
    asserts:
      - equal:
          path: spec.replicas
          value: 1
      - contains:
          path: spec.template.spec.containers[0].args
          content: --prometheus-qps=20
      - contains:
          path: spec.template.spec.containers[0].args
          content: --prometheus-burst=40
      - equal:
          path: spec.template.spec.containers[0].resources
          value:
            limits:
              cpu: 1000m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi

  - it: should apply large preset values with 2 replicas
    set:
      clusterSize: large
    asserts:
      - equal:
          path: spec.replicas
          value: 2
      - contains:
          path: spec.template.spec.containers[0].args
          content: --prometheus-qps=40
      - contains:
          path: spec.template.spec.containers[0].args
          content: --prometheus-burst=80
      - equal:
          path: spec.template.spec.containers[0].resources
          value:
            limits:
              cpu: 2000m
              memory: 2Gi
            requests:
              cpu: 500m
              memory: 512Mi

  - it: should apply xlarge preset values
    set:
      clusterSize: xlarge
    asserts:
      - equal:
          path: spec.replicas
          value: 2
      - contains:
          path: spec.template.spec.containers[0].args
          content: --prometheus-qps=80
      - contains:
          path: spec.template.spec.containers[0].args
          content: --prometheus-burst=160
      - equal:
          path: spec.template.spec.containers[0].resources
          value:
            limits:
              cpu: 4000m
              memory: 4Gi
            requests:
              cpu: 1000m
              memory: 1Gi

  # --- maxConcurrentReconciles ---

  - it: should not pass max-concurrent-reconciles when empty (default)
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --max-concurrent-reconciles=
          any: true

  - it: should pass explicit max-concurrent-reconciles
    set:
      maxConcurrentReconciles: 4
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --max-concurrent-reconciles=4

  - it: should apply max-concurrent-reconciles from medium preset
    set:
      clusterSize: medium
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --max-concurrent-reconciles=2

  - it: should apply max-concurrent-reconciles from xlarge preset
    set:
      clusterSize: xlarge
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --max-concurrent-reconciles=8

  # --- watchNamespaces ---

  - it: should not pass watch-namespaces when empty (default)
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: --watch-namespaces=
          any: true

  - it: should pass watch-namespaces as comma-separated list
    set:
      watchNamespaces:
        - production
        - staging
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --watch-namespaces=production,staging

  - it: should pass single watch-namespace
    set:
      watchNamespaces:
        - my-namespace
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --watch-namespaces=my-namespace

  - it: should let explicit values override large preset
    set:
      clusterSize: large
      prometheusQPS: 60
      replicaCount: 3
      resources:
        requests:
          cpu: 999m
          memory: 999Mi
        limits:
          cpu: 3000m
          memory: 3Gi
    asserts:
      - equal:
          path: spec.replicas
          value: 3
      - contains:
          path: spec.template.spec.containers[0].args
          content: --prometheus-qps=60
      - contains:
          path: spec.template.spec.containers[0].args
          content: --prometheus-burst=80
      - equal:
          path: spec.template.spec.containers[0].resources
          value:
            limits:
              cpu: 3000m
              memory: 3Gi
            requests:
              cpu: 999m
              memory: 999Mi

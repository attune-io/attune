<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="hex" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A90E2"/>
      <stop offset="100%" stop-color="#3B78D0"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#34A853"/>
      <stop offset="100%" stop-color="#4CC764"/>
    </linearGradient>
  </defs>
  <!-- Hexagonal background (Kubernetes-style) -->
  <path d="M256 32 L460 150 L460 362 L256 480 L52 362 L52 150 Z"
        fill="url(#hex)" stroke="none"/>
  <!-- Left face shadow for 3D depth -->
  <path d="M256 480 L52 362 L52 150 L256 268 Z"
        fill="#3568B8" opacity="0.35"/>
  <!-- Circular target / resize gauge -->
  <g transform="translate(256,256)">
    <!-- Outer ring -->
    <path d="M0,-110 A110,110 0 1,1 -95.26,55 L-68,39.3 A78,78 0 1,0 0,-78 Z"
          fill="white"/>
    <!-- Bottom-left segment -->
    <path d="M-95.26,55 A110,110 0 0,1 95.26,55 L67.6,39 A78,78 0 0,0 -67.6,39 Z"
          fill="white"/>
    <!-- Right segment -->
    <path d="M95.26,55 A110,110 0 0,1 0,-110 L0,-78 A78,78 0 0,0 67.6,39 Z"
          fill="white"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="22" fill="white"/>
  </g>
  <!-- Green upward arrow -->
  <g transform="translate(256,256)">
    <path d="M-10,60 L-10,-20 L-35,-20 L10,-80 L55,-20 L30,-20 L30,60 Z"
          fill="url(#arrow)" transform="rotate(-35)"/>
  </g>
</svg>